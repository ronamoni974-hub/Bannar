<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BannerPro | Advanced Canvas Editor</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Anek+Bangla:wght@400;700&family=Baloo+Da+2:wght@500;700&family=Galada&family=Hind+Siliguri:wght@400;600;700&family=Mina:wght@400;700&family=Noto+Sans+Bengali:wght@400;700&family=Tiro+Bangla:ital@0;1&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Poppins', 'Hind Siliguri', sans-serif; height: 100vh; display: flex; flex-direction: column; background-color: #f3f4f6; overflow: hidden; }
        
        /* Custom Scrollbar for sleek look */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-thumb { background: #a78bfa; border-radius: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* Font List Item Hover */
        .font-item:hover { border-color: #6366f1; background-color: #fef8ff; }
        .font-item.selected { border-color: #4f46e5; background-color: #e0e7ff; box-shadow: inset 0 0 0 1px #4f46e5; }

        /* Canvas Ruler Mockup Background */
        .canvas-area {
            background-image: 
                linear-gradient(to right, #e5e7eb 1px, transparent 1px),
                linear-gradient(to bottom, #e5e7eb 1px, transparent 1px);
            background-size: 50px 50px;
            background-position: center;
        }
        
        .canvas-shadow {
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
    </style>
</head>
<body>

    <header class="bg-white shadow-sm border-b px-6 py-3 flex justify-between items-center z-20 shrink-0">
        <div class="flex items-center gap-3">
            <div class="bg-indigo-600 text-white p-2 rounded-lg">
                <i class="fa-solid fa-layer-group text-xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">ব্যানার<span class="text-indigo-600">প্রো</span></h1>
        </div>
        <div>
            <button onclick="downloadBanner()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-full font-semibold transition flex items-center gap-2 text-sm shadow-md">
                <i class="fa-solid fa-cloud-download"></i> হাই-কোয়ালিটি ডাউনলোড
            </button>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        
        <aside class="w-[380px] bg-white border-r flex flex-col overflow-hidden shrink-0 shadow-lg z-10">
            
            <div class="flex border-b text-sm font-semibold shrink-0">
                <button id="templatesTabBtn" onclick="openTab('templatesTab')" class="flex-1 py-4 text-center text-indigo-600 border-b-2 border-indigo-600 transition">টেমপ্লেট</button>
                <button id="toolsTabBtn" onclick="openTab('toolsTab')" class="flex-1 py-4 text-center text-gray-500 hover:text-indigo-600 transition">এডিট টুলস</button>
            </div>

            <div class="flex-1 overflow-hidden relative">
                
                <div id="templatesTab" class="tab-content active h-full overflow-y-auto p-4">
                    <div id="templateList" class="grid grid-cols-2 md:grid-cols-3 gap-3">
                        </div>
                </div>

                <div id="toolsTab" class="tab-content h-full overflow-y-auto p-5 space-y-6">
                    
                    <div>
                        <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">যোগ করুন</h3>
                        <div class="flex gap-2">
                            <button onclick="addText()" class="flex-1 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 py-2.5 rounded-lg font-medium text-sm border border-indigo-100 transition">
                                <i class="fa-solid fa-t mr-1"></i> টেক্সট
                            </button>
                            <label class="flex-1 bg-green-50 hover:bg-green-100 text-green-700 py-2.5 rounded-lg font-medium text-sm border border-green-100 transition cursor-pointer text-center">
                                <i class="fa-solid fa-image mr-1"></i> ছবি
                                <input type="file" id="imageLoader" class="hidden" accept="image/*">
                            </label>
                            <button onclick="deleteObject()" class="w-10 bg-red-50 hover:bg-red-100 text-red-600 rounded-lg border border-red-100 transition">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </div>
                    </div>

                    <hr class="border-gray-100">

                    <div>
                        <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">প্রপার্টিজ</h3>
                        <div class="flex gap-4 items-center">
                            <div class="flex-1">
                                <span class="text-xs text-gray-500 block mb-1">রঙ</span>
                                <div class="flex items-center gap-2 p-1 border rounded-lg">
                                    <input type="color" id="colorPicker" onchange="changeColor(this.value)" class="w-8 h-8 rounded cursor-pointer border-none p-0">
                                    <span id="colorHex" class="text-xs text-gray-600 font-mono">#000000</span>
                                </div>
                            </div>
                            <div class="flex-1">
                                <span class="text-xs text-gray-500 block mb-1">অচ্ছতা (Opacity)</span>
                                <input type="range" min="0" max="1" step="0.1" value="1" oninput="changeOpacity(this.value)" class="w-full h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-indigo-600">
                            </div>
                        </div>
                    </div>

                    <hr class="border-gray-100">

                    <div class="flex-1 flex flex-col pb-4 text-properties" style="display: none;">
                        <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">ফন্ট লিস্ট (ক্লিক করুন)</h3>
                        <div id="fontListContainer" class="flex-1 overflow-y-auto space-y-2 pr-1">
                            </div>
                    </div>

                </div>
            </div>
        </aside>

        <main class="flex-1 bg-gray-200 canvas-area flex flex-col items-center justify-center p-4 relative">
            
            <div class="absolute top-0 left-0 right-0 h-6 bg-white border-b flex items-end text-[9px] text-gray-400 select-none px-12 overflow-hidden z-0">
                <div class="flex-1 flex justify-between">
                    <span>0</span><span>100</span><span>200</span><span>300</span><span>400</span><span>500</span><span>600</span><span>700</span><span>800</span><span>900</span><span>1000</span>
                </div>
            </div>
            
            <div class="absolute top-0 left-0 bottom-0 w-6 bg-white border-r flex flex-col justify-between items-center text-[9px] text-gray-400 select-none py-12 overflow-hidden z-0" style="writing-mode: vertical-rl; transform: rotate(180deg);">
                <div class="flex-1 flex justify-between w-full">
                    <span>1200</span><span>1000</span><span>800</span><span>600</span><span>400</span><span>200</span><span>0</span>
                </div>
            </div>

            <div id="canvasWrapper" class="relative z-10 canvas-shadow bg-white flex items-center justify-center">
                <canvas id="bannerCanvas"></canvas>
            </div>

        </main>
    </div>

    <script>
        // --- ১. ক্যানভাস সেটআপ (Portrait Mode for Posters) ---
        const CANVAS_WIDTH = 900;
        const CANVAS_HEIGHT = 1200; // Portrait/Poster aspect ratio

        const canvas = new fabric.Canvas('bannerCanvas', {
            width: CANVAS_WIDTH,
            height: CANVAS_HEIGHT,
            backgroundColor: '#ffffff',
            preserveObjectStacking: true
        });

        // Responsive Resizing logic
        function resizeCanvas() {
            const wrapper = document.getElementById('canvasWrapper');
            const container = wrapper.parentNode;
            
            const containerWidth = container.clientWidth - 40; 
            const containerHeight = container.clientHeight - 40;
            
            const scaleX = containerWidth / CANVAS_WIDTH;
            const scaleY = containerHeight / CANVAS_HEIGHT;
            const scale = Math.min(scaleX, scaleY, 0.95); 

            canvas.setZoom(scale);
            canvas.setWidth(CANVAS_WIDTH * scale);
            canvas.setHeight(CANVAS_HEIGHT * scale);
        }
        window.addEventListener('resize', resizeCanvas);
        setTimeout(resizeCanvas, 100);

        // --- ২. ফন্ট লাইব্রেরি ও UI রেন্ডারিং ---
        // Mapping custom names to Google Fonts loaded in the <head>
        const fontLibrary = [
            { id: 'f1', name: 'কাব্যলিপি (Kabyalipi)', family: 'Tiro Bangla' },
            { id: 'f2', name: 'আধুনিক রেখা (Adhunik Rekha)', family: 'Anek Bangla' },
            { id: 'f3', name: 'নব্যচিত্র (Nabyachitra)', family: 'Noto Sans Bengali' },
            { id: 'f4', name: 'শিল্প লিপি (Shilpa Lipi)', family: 'Galada' },
            { id: 'f5', name: 'সারল্য (Saralya)', family: 'Hind Siliguri' },
            { id: 'f6', name: 'গল্প-পাঠক (Galpa-Pathak)', family: 'Mina' },
            { id: 'f7', name: 'আলোড়ন লিপি (Aloron Lipi)', family: 'Baloo Da 2' },
            { id: 'f8', name: 'ইংলিশ মডার্ন (English Modern)', family: 'Poppins' },
            { id: 'f9', name: 'ঐতিহ্য-চিত্রক (Oitijja-Chitrak)', family: 'Tiro Bangla' },
            { id: 'f10', name: 'ভবিষ্য-রেখা (Bhabishya-Rekha)', family: 'Anek Bangla' }
        ];

        function initFonts() {
            const container = document.getElementById('fontListContainer');
            fontLibrary.forEach(font => {
                const div = document.createElement('div');
                div.className = "font-item cursor-pointer border border-gray-200 rounded-lg p-3 transition";
                div.onclick = () => applyFont(font.family, div);
                
                div.innerHTML = `
                    <div class="text-xs text-gray-500 mb-1">${font.name}</div>
                    <div class="text-xl text-gray-800 truncate" style="font-family: '${font.family}', sans-serif;">ফন্ট নমুনা (Sample)</div>
                `;
                container.appendChild(div);
            });
        }
        initFonts();

        function applyFont(fontFamily, element) {
            // UI Selection update
            document.querySelectorAll('.font-item').forEach(el => el.classList.remove('selected'));
            if(element) element.classList.add('selected');

            // Canvas Text update
            const activeObject = canvas.getActiveObject();
            if (activeObject && activeObject.type === 'i-text') {
                activeObject.set("fontFamily", fontFamily);
                canvas.requestRenderAll();
            }
        }

        // --- ৩. টেমপ্লেট ডেটাবেস (৫০টি টেমপ্লেট লজিক) ---
        const bannerTemplates = [];

        // ১. স্পেশাল হ্যান্ডক্রাফটেড টেমপ্লেট (আপনার দেওয়া ছবির মতো)
        bannerTemplates.push({
            id: 1, name: 'ছাত্র সমিতি (ডিজাইন ১)', type: 'portrait', bgColor: '#0b4d44',
            data: {"version":"5.3.0","objects":[{"type":"rect","left":0,"top":0,"width":900,"height":1200,"fill":"#0b4d44","selectable":false},{"type":"circle","left":150,"top":350,"radius":300,"fill":"transparent","stroke":"#4ade80","strokeWidth":10},{"type":"circle","left":170,"top":370,"radius":280,"fill":"#e5e7eb"},{"type":"i-text","left":450,"top":120,"text":"পাবনা জেলা ছাত্র সমিতি","fontFamily":"Anek Bangla","fontSize":65,"fill":"#4ade80","fontWeight":"bold","originX":"center"},{"type":"i-text","left":450,"top":200,"text":"চট্টগ্রাম বিশ্ববিদ্যালয়","fontFamily":"Hind Siliguri","fontSize":45,"fill":"#ffffff","originX":"center"},{"type":"rect","left":250,"top":280,"width":400,"height":60,"fill":"#166534","rx":15,"ry":15},{"type":"i-text","left":450,"top":290,"text":"কার্যকরী কমিটি ২০২৩","fontFamily":"Hind Siliguri","fontSize":35,"fill":"#ffffff","originX":"center"},{"type":"rect","left":400,"top":850,"width":450,"height":80,"fill":"#ffffff","stroke":"#4ade80","strokeWidth":5,"rx":40,"ry":40},{"type":"i-text","left":625,"top":865,"text":"সাঈদ আল সাহাব","fontFamily":"Anek Bangla","fontSize":40,"fill":"#166534","fontWeight":"bold","originX":"center"},{"type":"i-text","left":450,"top":1020,"text":"সাংগঠনিক সম্পাদক","fontFamily":"Baloo Da 2","fontSize":75,"fill":"#ffffff","fontWeight":"bold","originX":"center"}]}
        });

        // ২. স্পেশাল হ্যান্ডক্রাফটেড টেমপ্লেট (স্বাধীনতা দিবস)
        bannerTemplates.push({
            id: 2, name: 'স্বাধীনতা দিবস', type: 'portrait', bgColor: '#064e3b',
            data: {"version":"5.3.0","objects":[{"type":"rect","left":0,"top":0,"width":900,"height":1200,"fill":"#064e3b","selectable":false},{"type":"circle","left":250,"top":250,"radius":200,"fill":"#ef4444"},{"type":"i-text","left":450,"top":300,"text":"২৬ শে মার্চ","fontFamily":"Tiro Bangla","fontSize":80,"fill":"#ffffff","fontWeight":"bold","originX":"center"},{"type":"i-text","left":450,"top":480,"text":"স্বাধীনতা দিবস","fontFamily":"Baloo Da 2","fontSize":110,"fill":"#ffffff","fontWeight":"bold","originX":"center"},{"type":"i-text","left":450,"top":800,"text":"মহান স্বাধীনতা দিবসে বিনম্র শ্রদ্ধা","fontFamily":"Hind Siliguri","fontSize":40,"fill":"#ffffff","originX":"center"}]}
        });

        // বাকি ৪৮টি টেমপ্লেট অটো-জেনারেট করা হচ্ছে লুপের মাধ্যমে
        const colors = ['#1e3a8a', '#831843', '#14532d', '#701a75', '#0f172a', '#b45309', '#0f766e', '#be123c'];
        const types = ['কমিটি ডিজাইন', 'অভিনন্দন', 'সেমিনার', 'বিজ্ঞপ্তি', 'শুভ জন্মদিন'];

        for(let i = 3; i <= 50; i++) {
            let color = colors[i % colors.length];
            let typeName = types[i % types.length];
            bannerTemplates.push({
                id: i, 
                name: `${typeName} ${i}`,
                bgColor: color,
                data: {"version":"5.3.0","objects":[{"type":"rect","left":0,"top":0,"width":900,"height":1200,"fill":color,"selectable":false},{"type":"i-text","left":450,"top":400,"text":"ডেমো টেমপ্লেট "+i,"fontFamily":"Hind Siliguri","fontSize":70,"fill":"#ffffff","fontWeight":"bold","originX":"center"},{"type":"i-text","left":450,"top":520,"text":typeName,"fontFamily":"Anek Bangla","fontSize":40,"fill":"#fcd34d","originX":"center"}]}
            });
        }

        // রেন্ডার টেমপ্লেট লিস্ট (Grid View like the image)
        function initTemplates() {
            const list = document.getElementById('templateList');
            bannerTemplates.forEach(template => {
                const card = document.createElement('button');
                card.className = "flex flex-col bg-gray-50 border rounded-lg overflow-hidden transition hover:shadow-md hover:border-indigo-300 group";
                card.onclick = () => loadTemplate(template.id);
                
                // Generating a small CSS visual placeholder based on data
                card.innerHTML = `
                    <div style="background-color: ${template.bgColor}" class="w-full aspect-[3/4] flex items-center justify-center p-2 relative overflow-hidden">
                        <div class="absolute w-12 h-12 rounded-full border-2 border-white/30"></div>
                        <div class="w-3/4 h-2 bg-white/50 rounded-full mt-16"></div>
                    </div>
                    <div class="p-2 w-full text-center bg-white border-t group-hover:bg-indigo-50">
                        <span class="text-[10px] font-semibold text-gray-700 truncate block">${template.name}</span>
                    </div>
                `;
                list.appendChild(card);
            });
            // Load the first specific template initially
            loadTemplate(1);
        }
        initTemplates();

        function loadTemplate(id) {
            const template = bannerTemplates.find(t => t.id === id);
            if (!template) return;
            canvas.loadFromJSON(JSON.stringify(template.data), () => {
                canvas.requestRenderAll();
                openTab('toolsTab');
            });
        }

        // --- ৪. এডিটিং ইভেন্ট লিসেনার্স ---
        canvas.on('selection:created', onObjectSelected);
        canvas.on('selection:updated', onObjectSelected);
        canvas.on('selection:cleared', onSelectionCleared);

        function onObjectSelected(e) {
            const selectedObject = e.target;
            document.querySelectorAll('.text-properties').forEach(el => el.style.display = 'none');
            
            if (selectedObject.type === 'i-text') {
                document.querySelectorAll('.text-properties').forEach(el => el.style.display = 'flex');
                openTab('toolsTab');
            }
            
            if(selectedObject.fill && typeof selectedObject.fill === 'string') {
                document.getElementById('colorPicker').value = selectedObject.fill;
                document.getElementById('colorHex').textContent = selectedObject.fill;
            }
        }

        function onSelectionCleared() {
            document.querySelectorAll('.text-properties').forEach(el => el.style.display = 'none');
            document.querySelectorAll('.font-item').forEach(el => el.classList.remove('selected'));
        }

        // Tools Functions
        function addText() {
            const newText = new fabric.IText('নতুন টেক্সট', { 
                left: CANVAS_WIDTH / 2, top: CANVAS_HEIGHT / 2, originX: 'center', originY: 'center',
                fontFamily: 'Hind Siliguri', fontSize: 60, fill: '#000000'
            });
            canvas.add(newText);
            canvas.setActiveObject(newText);
            newText.enterEditing();
        }

        document.getElementById('imageLoader').addEventListener('change', function (e) {
            const reader = new FileReader();
            reader.onload = function (event) {
                const imgObj = new Image();
                imgObj.src = event.target.result;
                imgObj.onload = function () {
                    const img = new fabric.Image(imgObj);
                    const scale = (CANVAS_WIDTH * 0.4) / img.width; 
                    img.set({ left: CANVAS_WIDTH / 2, top: CANVAS_HEIGHT / 2, originX: 'center', originY: 'center', scaleX: scale, scaleY: scale });
                    canvas.add(img);
                    canvas.setActiveObject(img);
                }
            }
            reader.readAsDataURL(e.target.files[0]);
        });

        function changeColor(color) {
            const activeObject = canvas.getActiveObject();
            if (activeObject) {
                activeObject.set("fill", color);
                document.getElementById('colorHex').textContent = color.toUpperCase();
                canvas.requestRenderAll();
            }
        }
        
        function changeOpacity(value) {
            const activeObject = canvas.getActiveObject();
            if (activeObject) {
                activeObject.set("opacity", parseFloat(value));
                canvas.requestRenderAll();
            }
        }

        function deleteObject() {
            const activeObjects = canvas.getActiveObjects();
            if (activeObjects.length > 0) {
                activeObjects.forEach(obj => canvas.remove(obj));
                canvas.discardActiveObject();
            }
        }

        function downloadBanner() {
            canvas.discardActiveObject();
            canvas.requestRenderAll();
            const dataURL = canvas.toDataURL({ format: 'png', quality: 1, multiplier: 2 }); // Multiplier 2 for HD output
            const link = document.createElement('a');
            link.href = dataURL;
            link.download = 'BannerPro-Export.png';
            link.click();
        }

        // Tabs Logic
        function openTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            
            document.getElementById('templatesTabBtn').className = "flex-1 py-4 text-center text-gray-500 hover:text-indigo-600 transition border-b-2 border-transparent";
            document.getElementById('toolsTabBtn').className = "flex-1 py-4 text-center text-gray-500 hover:text-indigo-600 transition border-b-2 border-transparent";

            document.getElementById(tabId + 'Btn').className = "flex-1 py-4 text-center text-indigo-600 border-b-2 border-indigo-600 transition";
        }
    </script>
</body>
</html>
