<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BannerPro | Mobile App</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Anek+Bangla:wght@400;700&family=Baloo+Da+2:wght@500;700&family=Galada&family=Hind+Siliguri:wght@400;600;700&family=Mina:wght@400;700&family=Noto+Sans+Bengali:wght@400;700&family=Tiro+Bangla:ital@0;1&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <script src="templates.js"></script>

    <style>
        body { font-family: 'Poppins', 'Hind Siliguri', sans-serif; height: 100vh; display: flex; flex-direction: column; background-color: #f8fafc; overflow: hidden; overscroll-behavior-y: none; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .font-item.selected { border-color: #4f46e5; background-color: #e0e7ff; }
        .canvas-container { touch-action: none; margin: 0 auto; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); border-radius: 8px; overflow: hidden; }
        .history-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    </style>
</head>
<body class="text-gray-800">

    <header class="bg-white shadow-sm px-4 py-3 flex justify-between items-center z-20 shrink-0">
        <div class="flex items-center gap-2">
            <h1 class="text-lg font-bold text-gray-800"><i class="fa-solid fa-layer-group text-indigo-600 mr-1"></i>ব্যানার<span class="text-indigo-600">প্রো</span></h1>
        </div>
        
        <div class="flex items-center gap-3">
            <button id="undoBtn" onclick="undo()" class="history-btn text-gray-600 text-lg" disabled><i class="fa-solid fa-rotate-left"></i></button>
            <button id="redoBtn" onclick="redo()" class="history-btn text-gray-600 text-lg" disabled><i class="fa-solid fa-rotate-right"></i></button>
            <div class="w-px h-6 bg-gray-300 mx-1"></div>
            <button onclick="downloadBanner()" class="bg-indigo-600 active:bg-indigo-700 text-white px-4 py-2 rounded-lg font-medium transition text-sm flex items-center gap-1 shadow">
                <i class="fa-solid fa-download"></i> সেভ
            </button>
        </div>
    </header>

    <main class="flex-none bg-gray-200 flex items-center justify-center p-3 relative" style="height: 45vh;">
        <div id="canvasWrapper" class="relative w-full h-full flex items-center justify-center">
            <canvas id="bannerCanvas"></canvas>
        </div>
    </main>

    <div class="flex-none bg-white border-b border-t shadow-sm z-10 flex">
        <button id="templatesTabBtn" onclick="openTab('templatesTab')" class="flex-1 py-3 text-sm font-semibold text-indigo-600 border-b-2 border-indigo-600">টেমপ্লেট (১০০+)</button>
        <button id="toolsTabBtn" onclick="openTab('toolsTab')" class="flex-1 py-3 text-sm font-semibold text-gray-500">এডিট টুলস</button>
    </div>

    <div class="flex-1 overflow-y-auto bg-white relative pb-10">
        
        <div id="templatesTab" class="tab-content active p-4">
            <div id="templateList" class="grid grid-cols-2 gap-3"></div>
        </div>

        <div id="toolsTab" class="tab-content p-4 space-y-5">
            <div class="grid grid-cols-3 gap-2">
                <button onclick="addText()" class="bg-indigo-50 active:bg-indigo-100 text-indigo-700 py-3 rounded-lg font-medium text-xs border border-indigo-100 flex flex-col items-center gap-1">
                    <i class="fa-solid fa-t text-base"></i> টেক্সট
                </button>
                <label class="bg-green-50 active:bg-green-100 text-green-700 py-3 rounded-lg font-medium text-xs border border-green-100 flex flex-col items-center gap-1 cursor-pointer">
                    <i class="fa-solid fa-image text-base"></i> ছবি
                    <input type="file" id="imageLoader" class="hidden" accept="image/*">
                </label>
                <button onclick="deleteObject()" class="bg-red-50 active:bg-red-100 text-red-600 py-3 rounded-lg font-medium text-xs border border-red-100 flex flex-col items-center gap-1">
                    <i class="fa-solid fa-trash text-base"></i> মুছুন
                </button>
            </div>

            <div id="textEditPanel" class="hidden space-y-4 border-t pt-4">
                <div class="flex justify-between items-center gap-4">
                    <div class="flex-1">
                        <label class="text-xs text-gray-500 mb-1 block">কালার পরিবর্তন</label>
                        <input type="color" id="colorPicker" onchange="changeColor(this.value)" class="w-full h-10 rounded cursor-pointer border px-1">
                    </div>
                    <div class="flex gap-2 text-properties">
                        <button onclick="changeAlignment('left')" class="p-2.5 bg-gray-50 rounded border text-gray-600"><i class="fa-solid fa-align-left"></i></button>
                        <button onclick="changeAlignment('center')" class="p-2.5 bg-gray-50 rounded border text-gray-600"><i class="fa-solid fa-align-center"></i></button>
                        <button onclick="changeAlignment('right')" class="p-2.5 bg-gray-50 rounded border text-gray-600"><i class="fa-solid fa-align-right"></i></button>
                    </div>
                </div>

                <div class="text-properties">
                    <label class="text-xs text-gray-500 mb-2 block">ফন্ট পরিবর্তন (ক্লিক করুন)</label>
                    <div id="fontListContainer" class="grid grid-cols-1 gap-2 max-h-48 overflow-y-auto pr-1"></div>
                </div>
            </div>

            <div id="noSelectionPanel" class="text-center text-sm text-gray-400 py-6 border-t mt-4">
                এডিট করতে ক্যানভাসের কোনো টেক্সট বা ছবির ওপর ক্লিক করুন।
            </div>
        </div>
    </div>

    <script>
        const CANVAS_WIDTH = 900;
        const CANVAS_HEIGHT = 1200;

        const canvas = new fabric.Canvas('bannerCanvas', {
            width: CANVAS_WIDTH,
            height: CANVAS_HEIGHT,
            backgroundColor: '#ffffff',
            preserveObjectStacking: true
        });

        // --- Undo / Redo History Logic ---
        let historyData = [];
        let historyIndex = -1;
        let isHistoryUpdating = false;

        function saveHistory() {
            if (isHistoryUpdating) return;
            // Clear future history if we make a new change after undoing
            historyData = historyData.slice(0, historyIndex + 1);
            historyData.push(JSON.stringify(canvas.toJSON()));
            historyIndex++;
            updateHistoryButtons();
        }

        function updateHistoryButtons() {
            document.getElementById('undoBtn').disabled = historyIndex <= 0;
            document.getElementById('redoBtn').disabled = historyIndex >= historyData.length - 1;
        }

        function undo() {
            if (historyIndex > 0) {
                isHistoryUpdating = true;
                historyIndex--;
                canvas.loadFromJSON(historyData[historyIndex], function() {
                    canvas.renderAll();
                    isHistoryUpdating = false;
                    updateHistoryButtons();
                });
            }
        }

        function redo() {
            if (historyIndex < historyData.length - 1) {
                isHistoryUpdating = true;
                historyIndex++;
                canvas.loadFromJSON(historyData[historyIndex], function() {
                    canvas.renderAll();
                    isHistoryUpdating = false;
                    updateHistoryButtons();
                });
            }
        }

        // Save history on any canvas change
        canvas.on('object:modified', saveHistory);
        canvas.on('object:added', saveHistory);
        canvas.on('object:removed', saveHistory);

        // --- Canvas Resizing ---
        function resizeCanvas() {
            const wrapper = document.getElementById('canvasWrapper');
            const scale = Math.min(wrapper.clientWidth / CANVAS_WIDTH, wrapper.clientHeight / CANVAS_HEIGHT); 
            canvas.setZoom(scale);
            canvas.setWidth(CANVAS_WIDTH * scale);
            canvas.setHeight(CANVAS_HEIGHT * scale);
        }
        window.addEventListener('resize', resizeCanvas);
        setTimeout(resizeCanvas, 200);

        // --- Single Click Text Edit ---
        canvas.on('mouse:down', function(options) {
            if (options.target && options.target.type === 'i-text') {
                options.target.enterEditing();
                // Select all text only on the first click to easily replace
                if (options.target.selectionStart === options.target.selectionEnd) {
                    options.target.selectAll();
                }
                canvas.requestRenderAll();
            }
        });

        // --- Load Templates from external templates.js ---
        function initTemplates() {
            const list = document.getElementById('templateList');
            if (window.bannerTemplates) {
                window.bannerTemplates.forEach(template => {
                    const btn = document.createElement('button');
                    btn.className = "flex flex-col bg-white border border-gray-200 rounded-lg overflow-hidden active:bg-gray-50 shadow-sm";
                    btn.onclick = () => loadTemplate(template.id);
                    btn.innerHTML = `
                        <div style="background-color: ${template.bgColor}" class="w-full aspect-[3/4] flex items-center justify-center p-2 relative">
                            <div class="w-8 h-8 rounded-full border border-white/40"></div>
                            <div class="absolute bottom-4 w-1/2 h-1 bg-white/50 rounded"></div>
                        </div>
                        <div class="p-2 text-center w-full">
                            <span class="text-xs font-semibold text-gray-700">${template.name}</span>
                        </div>
                    `;
                    list.appendChild(btn);
                });
                loadTemplate(1); // Load first template initially
            }
        }
        
        // Ensure templates are loaded
        window.onload = function() {
            initTemplates();
        };

        function loadTemplate(id) {
            const template = window.bannerTemplates.find(t => t.id === id);
            if (!template) return;
            
            isHistoryUpdating = true; // Prevent saving half-loaded state
            canvas.loadFromJSON(JSON.stringify(template.data), () => {
                canvas.requestRenderAll();
                openTab('toolsTab');
                onSelectionCleared();
                
                // Save initial state for this template
                isHistoryUpdating = false;
                historyData = [];
                historyIndex = -1;
                saveHistory(); 
            });
        }

        // --- Fonts ---
        const fonts = [
            { name: 'আনেক বাংলা (বোল্ড)', family: 'Anek Bangla' },
            { name: 'বালু দা ২ (হেডিং)', family: 'Baloo Da 2' },
            { name: 'গালাদা (স্টাইলিশ)', family: 'Galada' },
            { name: 'হিন্দ শিলিগুড়ি (পঠনযোগ্য)', family: 'Hind Siliguri' },
            { name: 'তীরো বাংলা (ক্লাসিক)', family: 'Tiro Bangla' },
            { name: 'মিনা (সিম্পল)', family: 'Mina' },
            { name: 'ইংলিশ (মডার্ন)', family: 'Poppins' }
        ];

        function initFonts() {
            const container = document.getElementById('fontListContainer');
            fonts.forEach(font => {
                const div = document.createElement('div');
                div.className = "font-item cursor-pointer border rounded p-2 text-center text-sm active:bg-gray-100";
                div.style.fontFamily = `'${font.family}', sans-serif`;
                div.innerText = font.name;
                div.onclick = () => {
                    document.querySelectorAll('.font-item').forEach(el => el.classList.remove('selected'));
                    div.classList.add('selected');
                    const activeObj = canvas.getActiveObject();
                    if(activeObj && activeObj.type === 'i-text') {
                        activeObj.set('fontFamily', font.family);
                        canvas.requestRenderAll();
                        saveHistory();
                    }
                };
                container.appendChild(div);
            });
        }
        initFonts();

        // Canvas UI Events
        canvas.on('selection:created', onObjectSelected);
        canvas.on('selection:updated', onObjectSelected);
        canvas.on('selection:cleared', onSelectionCleared);

        function onObjectSelected(e) {
            const obj = e.target;
            document.getElementById('noSelectionPanel').classList.add('hidden');
            document.getElementById('textEditPanel').classList.remove('hidden');
            
            if (obj.type === 'i-text') {
                document.querySelectorAll('.text-properties').forEach(el => el.style.display = 'flex');
                document.getElementById('colorPicker').value = obj.fill;
            } else {
                document.querySelectorAll('.text-properties').forEach(el => el.style.display = 'none');
                if (obj.fill && typeof obj.fill === 'string' && !obj.fill.startsWith('url')) {
                    document.getElementById('colorPicker').value = obj.fill;
                }
            }
        }

        function onSelectionCleared() {
            document.getElementById('textEditPanel').classList.add('hidden');
            document.getElementById('noSelectionPanel').classList.remove('hidden');
            document.querySelectorAll('.font-item').forEach(el => el.classList.remove('selected'));
        }

        function addText() {
            const text = new fabric.IText('আপনার লেখা', { 
                left: CANVAS_WIDTH/2, top: CANVAS_HEIGHT/2, originX: 'center', originY: 'center',
                fontFamily: 'Hind Siliguri', fontSize: 60, fill: '#000000'
            });
            canvas.add(text);
            canvas.setActiveObject(text);
        }

        // --- আপডেটেড ইমেজ মাস্কিং লজিক (ইমেজ মুভ করার জন্য) ---
        document.getElementById('imageLoader').addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (event) {
                const imgObj = new Image();
                imgObj.src = event.target.result;
                imgObj.onload = function () {
                    const activeObj = canvas.getActiveObject();

                    // যদি ইউজার গোল বৃত্ত সিলেক্ট করে থাকে
                    if (activeObj && activeObj.type === 'circle') {
                        const img = new fabric.Image(imgObj);
                        
                        // ছবিটিকে বৃত্তের সাইজে স্কেল করা
                        const targetSize = activeObj.radius * 2 * activeObj.scaleX;
                        const scale = Math.max(targetSize / img.width, targetSize / img.height);
                        
                        img.set({
                            left: activeObj.left,
                            top: activeObj.top,
                            originX: activeObj.originX,
                            originY: activeObj.originY,
                            scaleX: scale,
                            scaleY: scale
                        });

                        // ছবির ওপর ক্লিপ-পাথ (মাস্ক) বসানো যাতে গোল হয়ে থাকে
                        const clipPath = new fabric.Circle({
                            radius: img.width / 2, // Original unscaled width
                            originX: 'center',
                            originY: 'center'
                        });
                        img.set({ clipPath: clipPath });

                        // আগের ডামি বৃত্ত মুছে নতুন গোল ছবি বসানো
                        canvas.add(img);
                        canvas.remove(activeObj);
                        canvas.setActiveObject(img);
                    } 
                    // যদি কিছু সিলেক্ট না করে ছবি আপলোড করে
                    else {
                        const img = new fabric.Image(imgObj);
                        const minDim = Math.min(img.width, img.height);
                        
                        const circleClip = new fabric.Circle({
                            radius: minDim / 2,
                            originX: 'center',
                            originY: 'center'
                        });

                        const scale = (CANVAS_WIDTH * 0.4) / minDim; 

                        img.set({ 
                            left: CANVAS_WIDTH/2, top: CANVAS_HEIGHT/2, 
                            originX: 'center', originY: 'center', 
                            scaleX: scale, scaleY: scale,
                            clipPath: circleClip 
                        });
                        
                        canvas.add(img);
                        canvas.setActiveObject(img);
                    }
                    e.target.value = ''; // Reset input
                }
            }
            reader.readAsDataURL(file);
        });

        function changeColor(color) {
            const obj = canvas.getActiveObject();
            if (obj) { obj.set("fill", color); canvas.requestRenderAll(); saveHistory(); }
        }

        function changeAlignment(align) {
            const obj = canvas.getActiveObject();
            if (obj && obj.type === 'i-text') { obj.set("textAlign", align); canvas.requestRenderAll(); saveHistory(); }
        }

        function deleteObject() {
            const activeObjects = canvas.getActiveObjects();
            if (activeObjects.length) {
                activeObjects.forEach(obj => canvas.remove(obj));
                canvas.discardActiveObject();
                saveHistory();
            } else {
                alert('প্রথমে ক্যানভাস থেকে কিছু সিলেক্ট করুন');
            }
        }

        function downloadBanner() {
            canvas.discardActiveObject();
            canvas.requestRenderAll();
            const dataURL = canvas.toDataURL({ format: 'jpeg', quality: 0.9, multiplier: 2 }); 
            const link = document.createElement('a');
            link.href = dataURL;
            link.download = 'BannerPro-HD.jpg';
            link.click();
        }

        function openTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.getElementById('templatesTabBtn').className = "flex-1 py-3 text-sm font-semibold text-gray-500 border-b-2 border-transparent";
            document.getElementById('toolsTabBtn').className = "flex-1 py-3 text-sm font-semibold text-gray-500 border-b-2 border-transparent";
            document.getElementById(tabId + 'Btn').className = "flex-1 py-3 text-sm font-semibold text-indigo-600 border-b-2 border-indigo-600";
        }
    </script>
</body>
</html>
