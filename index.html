<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProBanner - Advanced Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; touch-action: manipulation; background-color: #f1f5f9; }
        .canvas-container { margin: 0 auto; box-shadow: 0 12px 35px rgba(0,0,0,0.08); border-radius: 8px; overflow: hidden; background: white; }
        
        /* Hidden Scrollbar */
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Pro Color Picker */
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: 2px solid white; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.15); }
        
        /* Beautiful Modern Range Sliders */
        input[type=range] { -webkit-appearance: none; background: transparent; width: 100%; outline: none; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%; background: #4f46e5; cursor: pointer; margin-top: -6px; box-shadow: 0 2px 6px rgba(79, 70, 229, 0.4); border: 2px solid white; transition: transform 0.1s; }
        input[type=range]::-webkit-slider-thumb:active { transform: scale(1.2); }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 6px; cursor: pointer; background: #e2e8f0; border-radius: 4px; box-shadow: inset 0 1px 2px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="h-[100dvh] w-full overflow-hidden text-gray-800 flex flex-col selection:bg-indigo-100">

    <header class="h-14 bg-white/95 backdrop-blur-md border-b flex items-center justify-between px-4 shadow-sm shrink-0 z-30">
        <div class="flex items-center gap-3">
            <h1 class="text-lg font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-purple-600 tracking-tight">ProBanner</h1>
        </div>
        
        <div class="flex items-center gap-2 sm:gap-4">
            <button onclick="undo()" class="text-gray-500 hover:text-indigo-600 w-8 h-8 flex items-center justify-center rounded-full active:bg-gray-100 transition" title="Undo"><i class="fas fa-undo text-sm"></i></button>
            <button onclick="redo()" class="text-gray-500 hover:text-indigo-600 w-8 h-8 flex items-center justify-center rounded-full active:bg-gray-100 transition" title="Redo"><i class="fas fa-redo text-sm"></i></button>
            <div class="w-px h-5 bg-gray-200 mx-1"></div>
            <button onclick="exportBanner()" class="bg-indigo-600 text-white px-5 py-1.5 rounded-full hover:bg-indigo-700 font-semibold shadow-lg shadow-indigo-200 text-sm transition-all transform hover:-translate-y-0.5">
                Export
            </button>
        </div>
    </header>

    <main id="workspace" class="flex-1 relative flex justify-center items-center overflow-hidden w-full p-4 bg-gray-100">
        <canvas id="bannerCanvas"></canvas>
        
        <div id="floatingAction" class="absolute hidden bg-white rounded-full shadow-2xl p-1.5 flex gap-2 border border-gray-100 z-50 transition-all transform scale-95">
            <button onclick="confirmChanges()" class="w-10 h-10 rounded-full bg-green-50 text-green-600 flex items-center justify-center hover:bg-green-500 hover:text-white transition-all shadow-sm" title="Save & Deselect">
                <i class="fas fa-check text-lg"></i>
            </button>
            <button onclick="discardChanges()" class="w-10 h-10 rounded-full bg-red-50 text-red-500 flex items-center justify-center hover:bg-red-500 hover:text-white transition-all shadow-sm" title="Discard & Deselect">
                <i class="fas fa-times text-lg"></i>
            </button>
        </div>
    </main>

    <div id="propertiesPanel" class="h-auto py-4 bg-white border-t flex items-center px-4 gap-6 overflow-x-auto hide-scroll shrink-0 shadow-[0_-15px_30px_rgba(0,0,0,0.05)] transition-transform duration-300 translate-y-full absolute bottom-[72px] w-full z-20">
        
        <div id="propColor" class="flex-col items-center shrink-0 hidden">
            <span class="text-[10px] font-extrabold text-gray-400 mb-2 uppercase tracking-widest">Color</span>
            <input type="color" id="itemColor" onchange="changeColor(this.value)" class="w-9 h-9 cursor-pointer bg-transparent">
        </div>

        <div id="divColor" class="w-px h-10 bg-gray-200 shrink-0 hidden"></div>

        <div id="propShapeImage" class="flex-col items-center shrink-0 hidden">
            <span class="text-[10px] font-extrabold text-indigo-400 mb-2 uppercase tracking-widest">Add Image</span>
            <input type="file" id="shapeImgInput" class="hidden" accept="image/*" onchange="fillShapeWithImage(event)">
            <button onclick="document.getElementById('shapeImgInput').click()" class="w-9 h-9 bg-indigo-50 text-indigo-600 rounded-lg flex items-center justify-center hover:bg-indigo-100 transition shadow-sm border border-indigo-100">
                <i class="fas fa-image"></i>
            </button>
        </div>

        <div id="propPatternScale" class="flex-col shrink-0 min-w-[120px] hidden">
            <div class="flex justify-between w-full mb-1">
                <span class="text-[10px] font-extrabold text-indigo-500 uppercase tracking-widest">Image Size</span>
                <span id="scaleVal" class="text-[10px] font-bold text-gray-600">1x</span>
            </div>
            <input type="range" id="itemPatternScale" min="0.1" max="3" step="0.1" value="1" onchange="changePatternScale(this.value)" oninput="document.getElementById('scaleVal').innerText=this.value+'x'" class="w-full mt-1.5 accent-indigo-500">
        </div>

        <div id="divShapeImage" class="w-px h-10 bg-gray-200 shrink-0 hidden"></div>

        <div id="propOpacity" class="flex-col shrink-0 min-w-[130px] hidden">
            <div class="flex justify-between w-full mb-1">
                <span class="text-[10px] font-extrabold text-gray-400 uppercase tracking-widest">Fill Opacity</span>
                <span id="opVal" class="text-[10px] font-bold text-indigo-600">100%</span>
            </div>
            <input type="range" id="itemOpacity" min="0" max="1" step="0.05" value="1" onchange="changeOpacity(this.value)" oninput="document.getElementById('opVal').innerText=Math.round(this.value*100)+'%'" class="w-full mt-1.5">
        </div>

        <div id="divOpacity" class="w-px h-10 bg-gray-200 shrink-0 hidden"></div>

        <div id="propStroke" class="flex-col shrink-0 hidden">
            <span class="text-[10px] font-extrabold text-gray-400 mb-2 uppercase tracking-widest">Stroke / Border</span>
            <div class="flex items-center gap-2 bg-gray-50 p-1 rounded-xl border border-gray-100 shadow-inner">
                <input type="color" id="strokeColor" onchange="changeStroke(this.value, null)" class="w-7 h-7 cursor-pointer bg-transparent">
                <input type="number" id="strokeWidth" value="0" min="0" max="30" onchange="changeStroke(null, this.value)" class="w-12 h-7 border-none bg-white rounded-lg text-xs outline-none focus:ring-2 focus:ring-indigo-400 text-center font-bold text-gray-700 shadow-sm">
            </div>
        </div>

        <div id="divStroke" class="w-px h-10 bg-gray-200 shrink-0 hidden"></div>

        <div id="propDelete" class="flex-col items-center shrink-0 pr-4 hidden">
            <span class="text-[10px] font-extrabold text-red-400 mb-2 uppercase tracking-widest">Delete</span>
            <button onclick="deleteObject()" class="text-red-500 bg-red-50 hover:bg-red-500 hover:text-white w-9 h-9 rounded-full flex items-center justify-center transition-all shadow-sm border border-red-100">
                <i class="fas fa-trash-alt"></i>
            </button>
        </div>
    </div>

    <div class="h-[72px] bg-white border-t shrink-0 z-30 pb-safe relative overflow-hidden shadow-[0_-5px_25px_rgba(0,0,0,0.04)]">
        
        <nav id="mainMenu" class="absolute inset-0 flex items-center justify-around px-2 transition-transform duration-300 transform translate-x-0">
            <button onclick="addText()" class="flex flex-col items-center text-gray-500 hover:text-indigo-600 p-2 w-16 transition group">
                <div class="w-10 h-10 rounded-2xl bg-gray-50 group-hover:bg-indigo-50 group-hover:shadow-md flex items-center justify-center mb-1 transition-all">
                    <i class="fas fa-font text-lg"></i>
                </div>
                <span class="text-[10px] font-bold">Text</span>
            </button>
            
            <input type="file" id="imageInput" class="hidden" accept="image/*" onchange="addImage(event)">
            <button onclick="document.getElementById('imageInput').click()" class="flex flex-col items-center text-gray-500 hover:text-indigo-600 p-2 w-16 transition group">
                <div class="w-10 h-10 rounded-2xl bg-gray-50 group-hover:bg-indigo-50 group-hover:shadow-md flex items-center justify-center mb-1 transition-all">
                    <i class="fas fa-image text-lg"></i>
                </div>
                <span class="text-[10px] font-bold">Image</span>
            </button>
            
            <button onclick="toggleShapeMenu(true)" class="flex flex-col items-center text-gray-500 hover:text-indigo-600 p-2 w-16 transition group">
                <div class="w-10 h-10 rounded-2xl bg-gray-50 group-hover:bg-indigo-50 group-hover:shadow-md flex items-center justify-center mb-1 transition-all">
                    <i class="fas fa-shapes text-lg"></i>
                </div>
                <span class="text-[10px] font-bold">Shapes</span>
            </button>

            <div class="flex flex-col items-center text-gray-500 p-2 w-16 relative group">
                <input type="color" onchange="changeBgColor(this.value)" value="#ffffff" class="w-10 h-10 rounded-2xl cursor-pointer border-0 p-0 absolute top-2 opacity-0 z-10">
                <div class="w-10 h-10 rounded-2xl bg-gradient-to-tr from-cyan-400 to-indigo-500 mb-1 shadow-md flex items-center justify-center text-white transition transform group-hover:scale-110 border-2 border-white">
                    <i class="fas fa-fill-drip text-sm"></i>
                </div>
                <span class="text-[10px] font-bold">Canvas BG</span>
            </div>
        </nav>

        <nav id="shapeMenu" class="absolute inset-0 flex items-center justify-start gap-4 px-4 transition-transform duration-300 transform translate-x-full bg-white overflow-x-auto hide-scroll">
            <button onclick="toggleShapeMenu(false)" class="flex flex-col items-center text-gray-400 hover:text-gray-800 p-2 shrink-0 transition">
                <div class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center mb-1 shadow-inner">
                    <i class="fas fa-arrow-left text-lg"></i>
                </div>
                <span class="text-[10px] font-bold">Back</span>
            </button>
            
            <div class="w-px h-8 bg-gray-200 shrink-0"></div>

            <button onclick="addShape('rect')" class="flex flex-col items-center hover:scale-110 shrink-0 transition">
                <i class="fas fa-square text-3xl text-blue-500 shadow-sm rounded"></i>
            </button>
            <button onclick="addShape('circle')" class="flex flex-col items-center hover:scale-110 shrink-0 transition">
                <i class="fas fa-circle text-3xl text-pink-500 shadow-sm rounded-full"></i>
            </button>
            <button onclick="addShape('triangle')" class="flex flex-col items-center hover:scale-110 shrink-0 transition">
                <i class="fas fa-caret-up text-4xl text-yellow-500"></i>
            </button>
            <button onclick="addShape('star')" class="flex flex-col items-center hover:scale-110 shrink-0 transition">
                <i class="fas fa-star text-3xl text-purple-500 drop-shadow-sm"></i>
            </button>
            <button onclick="addShape('hexagon')" class="flex flex-col items-center hover:scale-110 shrink-0 transition">
                <i class="fas fa-cube text-3xl text-emerald-500 drop-shadow-sm"></i>
            </button>
        </nav>
    </div>

    <script>
        let canvas, undoStack = [], redoStack = [], objectInitialState = null, isProgrammaticSelection = false;

        const workspace = document.getElementById('workspace');
        const floatingAction = document.getElementById('floatingAction');
        const propertiesPanel = document.getElementById('propertiesPanel');
        const mainMenu = document.getElementById('mainMenu');
        const shapeMenu = document.getElementById('shapeMenu');

        window.onload = function() {
            let canvasWidth = window.innerWidth > 800 ? 800 : window.innerWidth - 32;
            let canvasHeight = canvasWidth * 0.5625;

            canvas = new fabric.Canvas('bannerCanvas', {
                width: canvasWidth, height: canvasHeight, backgroundColor: '#ffffff', preserveObjectStacking: true
            });

            canvas.on('selection:created', handleSelection);
            canvas.on('selection:updated', handleSelection);
            canvas.on('object:moving', updateFloatingPosition);
            canvas.on('object:scaling', updateFloatingPosition);
            canvas.on('object:rotating', updateFloatingPosition);
            canvas.on('selection:cleared', handleDeselection);
            saveHistory();
        };

        // --- Core Helpers ---
        function hexToRgba(hex, alpha) {
            let r = parseInt(hex.slice(1, 3), 16) || 0;
            let g = parseInt(hex.slice(3, 5), 16) || 0;
            let b = parseInt(hex.slice(5, 7), 16) || 0;
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        function toggleShapeMenu(show) {
            if(show) {
                mainMenu.classList.replace('translate-x-0', '-translate-x-full');
                shapeMenu.classList.replace('translate-x-full', 'translate-x-0');
            } else {
                shapeMenu.classList.replace('translate-x-0', 'translate-x-full');
                mainMenu.classList.replace('-translate-x-full', 'translate-x-0');
            }
        }

        // --- Undo / Redo ---
        function saveHistory() {
            if(redoStack.length > 0) redoStack = [];
            undoStack.push(JSON.stringify(canvas));
        }
        function undo() { if (undoStack.length > 1) { redoStack.push(undoStack.pop()); loadCanvasState(undoStack[undoStack.length - 1]); } }
        function redo() { if (redoStack.length > 0) { const next = redoStack.pop(); undoStack.push(next); loadCanvasState(next); } }
        function loadCanvasState(jsonStr) {
            isProgrammaticSelection = true;
            canvas.loadFromJSON(jsonStr, function() { canvas.renderAll(); isProgrammaticSelection = false; });
        }

        // --- Smart Selection & UI ---
        function handleSelection() {
            if(isProgrammaticSelection) return;
            const obj = canvas.getActiveObject();
            if(!obj) return;
            
            objectInitialState = JSON.stringify(obj.toObject());
            configureSmartProperties(obj);
            propertiesPanel.classList.remove('translate-y-full');
            floatingAction.classList.remove('hidden');
            updateFloatingPosition();
        }

        function handleDeselection() {
            floatingAction.classList.add('hidden');
            propertiesPanel.classList.add('translate-y-full');
            objectInitialState = null;
        }

        function updateFloatingPosition() {
            const obj = canvas.getActiveObject();
            if(!obj) return;
            const bound = obj.getBoundingRect();
            const canvasOffset = document.querySelector('.canvas-container').getBoundingClientRect();
            const workspaceOffset = workspace.getBoundingClientRect();
            
            let topPos = (canvasOffset.top - workspaceOffset.top) + bound.top - 60;
            let leftPos = (canvasOffset.left - workspaceOffset.left) + bound.left + (bound.width / 2);
            if (topPos < 10) topPos = 10;

            floatingAction.style.top = `${topPos}px`;
            floatingAction.style.left = `${leftPos}px`;
            floatingAction.style.transform = `translateX(-50%)`;
        }

        function configureSmartProperties(obj) {
            const isText = obj.type === 'i-text';
            const isImage = obj.type === 'image';
            const isShape = obj.type === 'rect' || obj.type === 'circle' || obj.type === 'triangle' || obj.type === 'polygon';
            const hasPattern = isShape && obj.fill && obj.fill.source;

            // Reset UI
            ['propColor', 'divColor', 'propShapeImage', 'propPatternScale', 'divShapeImage', 'propOpacity', 'divOpacity', 'propStroke', 'divStroke', 'propDelete'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
                document.getElementById(id).classList.remove('flex');
            });

            if(isText) {
                document.getElementById('propColor').classList.replace('hidden', 'flex');
                document.getElementById('divColor').classList.replace('hidden', 'block');
                document.getElementById('propStroke').classList.replace('hidden', 'flex');
                document.getElementById('divStroke').classList.replace('hidden', 'block');
            } else if (isShape) {
                document.getElementById('propColor').classList.replace('hidden', 'flex');
                document.getElementById('propShapeImage').classList.replace('hidden', 'flex');
                document.getElementById('divColor').classList.replace('hidden', 'block');
                
                if(hasPattern) {
                    document.getElementById('propPatternScale').classList.replace('hidden', 'flex');
                    document.getElementById('itemPatternScale').value = obj.patternScale || 1;
                    document.getElementById('scaleVal').innerText = (obj.patternScale || 1) + 'x';
                }
                document.getElementById('divShapeImage').classList.replace('hidden', 'block');
                document.getElementById('propStroke').classList.replace('hidden', 'flex');
                document.getElementById('divStroke').classList.replace('hidden', 'block');
            }
            
            // Common
            document.getElementById('propOpacity').classList.replace('hidden', 'flex');
            document.getElementById('divOpacity').classList.replace('hidden', 'block');
            document.getElementById('propDelete').classList.replace('hidden', 'flex');

            // Values
            if(typeof obj.baseFillColor === 'string') document.getElementById('itemColor').value = obj.baseFillColor;
            else if(typeof obj.fill === 'string' && obj.fill.startsWith('#')) document.getElementById('itemColor').value = obj.fill;
            
            document.getElementById('itemOpacity').value = obj.customOpacity || 1;
            document.getElementById('opVal').innerText = Math.round((obj.customOpacity || 1)*100)+'%';
            document.getElementById('strokeWidth').value = obj.strokeWidth || 0;
            if(obj.stroke) document.getElementById('strokeColor').value = obj.stroke;
        }

        function confirmChanges() { saveHistory(); canvas.discardActiveObject(); canvas.renderAll(); }
        function discardChanges() {
            const obj = canvas.getActiveObject();
            if(obj && objectInitialState) { obj.set(JSON.parse(objectInitialState)); }
            canvas.discardActiveObject(); canvas.renderAll();
        }

        // --- Tools ---
        function addText() {
            const text = new fabric.IText('Edit Text', {
                left: canvas.width/2 - 60, top: canvas.height/2 - 20, fontFamily: 'Inter', fill: '#1e293b', fontSize: 36, fontWeight: '800'
            });
            canvas.add(text); canvas.setActiveObject(text);
        }

        function addShape(type) {
            let shape;
            const cx = canvas.width/2 - 40, cy = canvas.height/2 - 40;
            if(type === 'rect') shape = new fabric.Rect({ left: cx, top: cy, fill: '#3b82f6', width: 80, height: 80, rx: 12, ry: 12 });
            else if (type === 'circle') shape = new fabric.Circle({ left: cx, top: cy, fill: '#ec4899', radius: 45 });
            else if (type === 'triangle') shape = new fabric.Triangle({ left: cx, top: cy, fill: '#eab308', width: 80, height: 80 });
            else if (type === 'star') {
                const points = [{x: 40, y: 0}, {x: 49, y: 28}, {x: 78, y: 28}, {x: 54, y: 46}, {x: 63, y: 73}, {x: 40, y: 56}, {x: 17, y: 73}, {x: 26, y: 46}, {x: 2, y: 28}, {x: 31, y: 28}];
                shape = new fabric.Polygon(points, { left: cx, top: cy, fill: '#a855f7' });
            }
            else if (type === 'hexagon') {
                const points = [{x: 40, y: 0}, {x: 80, y: 20}, {x: 80, y: 60}, {x: 40, y: 80}, {x: 0, y: 60}, {x: 0, y: 20}];
                shape = new fabric.Polygon(points, { left: cx, top: cy, fill: '#10b981' });
            }
            shape.set('baseFillColor', shape.fill); // Store base color for smart opacity
            shape.set('customOpacity', 1);
            canvas.add(shape); canvas.setActiveObject(shape); toggleShapeMenu(false);
        }

        function addImage(e) {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(f) {
                fabric.Image.fromURL(f.target.result, function(img) {
                    img.scaleToWidth(canvas.width / 2.5);
                    img.set({ selectable: true, evented: true, rx: 10, ry: 10, customOpacity: 1 });
                    canvas.add(img); canvas.centerObject(img); canvas.setActiveObject(img); saveHistory();
                });
            };
            reader.readAsDataURL(file); e.target.value = ''; 
        }

        // --- Shape Image Fill (Masking) ---
        function fillShapeWithImage(e) {
            const file = e.target.files[0]; if(!file) return;
            const obj = canvas.getActiveObject();
            if(!obj || obj.type === 'i-text' || obj.type === 'image') return;

            const reader = new FileReader();
            reader.onload = function(f) {
                const imgElement = new Image();
                imgElement.src = f.target.result;
                imgElement.onload = function() {
                    const pattern = new fabric.Pattern({ source: imgElement, repeat: 'no-repeat' });
                    obj.set('fill', pattern);
                    obj.set('patternScale', 1); // Default scale
                    configureSmartProperties(obj); // Refresh UI to show scale slider
                    canvas.renderAll(); saveHistory();
                }
            };
            reader.readAsDataURL(file); e.target.value = ''; 
        }

        function changePatternScale(val) {
            const obj = canvas.getActiveObject();
            if(obj && obj.fill && obj.fill.source) {
                obj.fill.matrix = [parseFloat(val), 0, 0, parseFloat(val), 0, 0];
                obj.set('patternScale', val);
                canvas.renderAll();
            }
        }

        function changeBgColor(color) { canvas.backgroundColor = color; canvas.renderAll(); saveHistory(); }

        // --- Properties Actions ---
        function changeColor(hex) {
            const obj = canvas.getActiveObject();
            if(obj) { 
                obj.set('baseFillColor', hex);
                let op = obj.customOpacity || 1;
                obj.set('fill', op < 1 ? hexToRgba(hex, op) : hex);
                canvas.renderAll(); 
            }
        }

        function changeOpacity(val) {
            const obj = canvas.getActiveObject();
            if(!obj) return;
            
            obj.set('customOpacity', parseFloat(val));
            
            if (obj.type === 'image' || obj.type === 'i-text' || (obj.fill && obj.fill.source)) {
                // For images, text, and Pattern Filled shapes: use global opacity
                obj.set('opacity', parseFloat(val));
            } else {
                // For Solid Shapes: Smart Opacity (Preserve Stroke)
                let baseColor = obj.baseFillColor || obj.fill;
                if(typeof baseColor === 'string' && baseColor.startsWith('#')) {
                    obj.set('fill', hexToRgba(baseColor, parseFloat(val)));
                    obj.set('opacity', 1); // Keep stroke fully visible
                }
            }
            canvas.renderAll();
        }

        function changeStroke(color, width) {
            const obj = canvas.getActiveObject();
            if(obj) {
                if(color !== null) obj.set('stroke', color);
                if(width !== null) obj.set('strokeWidth', parseInt(width));
                canvas.renderAll();
            }
        }

        function deleteObject() {
            const activeObjects = canvas.getActiveObjects();
            if (activeObjects.length) {
                canvas.discardActiveObject();
                activeObjects.forEach(obj => canvas.remove(obj));
                saveHistory();
            }
        }

        function exportBanner() {
            canvas.discardActiveObject(); canvas.renderAll();
            const dataURL = canvas.toDataURL({ format: 'png', quality: 1, multiplier: 3 }); 
            const link = document.createElement('a');
            link.download = 'ProBanner-HighRes.png';
            link.href = dataURL; document.body.appendChild(link); link.click(); document.body.removeChild(link);
        }
    </script>
</body>
</html>
