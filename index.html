<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProBanner - Professional Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; touch-action: manipulation; background-color: #f0f4f8; }
        .canvas-container { margin: 0 auto; box-shadow: 0 10px 30px rgba(0,0,0,0.08); border-radius: 8px; overflow: hidden; }
        
        /* Smooth Scrollbar */
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Custom Color Picker Styling */
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: 2px solid #e5e7eb; border-radius: 50%; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.1); }
        
        /* Custom Range Slider */
        input[type=range] { -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: #2563eb; cursor: pointer; margin-top: -6px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: #cbd5e1; border-radius: 2px; }
    </style>
</head>
<body class="h-[100dvh] w-full overflow-hidden text-gray-800 flex flex-col selection:bg-blue-100">

    <header class="h-14 bg-white/90 backdrop-blur-md border-b flex items-center justify-between px-4 shadow-sm shrink-0 z-30">
        <div class="flex items-center gap-3">
            <h1 class="text-base font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-indigo-600">ProBanner</h1>
        </div>
        
        <div class="flex items-center gap-2 sm:gap-4">
            <button onclick="undo()" class="text-gray-500 hover:text-blue-600 w-8 h-8 flex items-center justify-center rounded-full active:bg-gray-100 transition" title="Undo"><i class="fas fa-undo text-sm"></i></button>
            <button onclick="redo()" class="text-gray-500 hover:text-blue-600 w-8 h-8 flex items-center justify-center rounded-full active:bg-gray-100 transition" title="Redo"><i class="fas fa-redo text-sm"></i></button>
            <div class="w-px h-5 bg-gray-200 mx-1"></div>
            <button onclick="exportBanner()" class="bg-indigo-600 text-white px-4 py-1.5 rounded-full hover:bg-indigo-700 font-medium shadow-md shadow-indigo-200 text-sm transition-all transform hover:scale-105">
                Export
            </button>
        </div>
    </header>

    <main id="workspace" class="flex-1 relative flex justify-center items-center overflow-hidden w-full p-3 bg-[#eef2f6]">
        <canvas id="bannerCanvas"></canvas>
        
        <div id="floatingAction" class="absolute hidden bg-white rounded-full shadow-xl p-1.5 flex gap-2 border border-gray-100 z-50 transition-all transform">
            <button onclick="confirmChanges()" class="w-9 h-9 rounded-full bg-green-50 text-green-600 flex items-center justify-center hover:bg-green-500 hover:text-white transition-all shadow-sm" title="Save & Deselect">
                <i class="fas fa-check"></i>
            </button>
            <button onclick="discardChanges()" class="w-9 h-9 rounded-full bg-red-50 text-red-500 flex items-center justify-center hover:bg-red-500 hover:text-white transition-all shadow-sm" title="Discard & Deselect">
                <i class="fas fa-times"></i>
            </button>
        </div>
    </main>

    <div id="propertiesPanel" class="h-auto py-3 bg-white border-t flex items-center px-4 gap-6 overflow-x-auto hide-scroll shrink-0 shadow-[0_-10px_20px_rgba(0,0,0,0.03)] transition-transform duration-300 translate-y-full absolute bottom-[72px] w-full z-20">
        
        <div id="propColor" class="flex-col items-center shrink-0 hidden">
            <span class="text-[10px] font-bold text-gray-400 mb-1.5 uppercase tracking-wider">Color</span>
            <input type="color" id="itemColor" onchange="changeColor(this.value)" class="w-8 h-8 cursor-pointer bg-transparent">
        </div>

        <div id="divColor" class="w-px h-8 bg-gray-200 shrink-0 hidden"></div>

        <div id="propGradient" class="flex-col items-center shrink-0 hidden">
            <span class="text-[10px] font-bold text-gray-400 mb-1.5 uppercase tracking-wider">Gradient</span>
            <div class="flex items-center gap-1.5 bg-gray-50 p-1 rounded-lg border border-gray-100">
                <input type="color" id="gradColor1" value="#ff00cc" class="w-6 h-6 cursor-pointer bg-transparent">
                <input type="color" id="gradColor2" value="#333399" class="w-6 h-6 cursor-pointer bg-transparent">
                <button onclick="applyGradient()" class="bg-white hover:bg-gray-100 text-gray-700 px-2 py-0.5 rounded shadow-sm text-[10px] font-bold border border-gray-200">Apply</button>
            </div>
        </div>

        <div id="divGradient" class="w-px h-8 bg-gray-200 shrink-0 hidden"></div>

        <div id="propOpacity" class="flex-col shrink-0 min-w-[120px] hidden">
            <div class="flex justify-between w-full mb-1">
                <span class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Opacity</span>
                <span id="opVal" class="text-[10px] font-bold text-indigo-600">100%</span>
            </div>
            <input type="range" id="itemOpacity" min="0" max="1" step="0.05" value="1" onchange="changeOpacity(this.value)" oninput="document.getElementById('opVal').innerText=Math.round(this.value*100)+'%'" class="w-full mt-1.5">
        </div>

        <div id="divOpacity" class="w-px h-8 bg-gray-200 shrink-0 hidden"></div>

        <div id="propStroke" class="flex-col shrink-0 hidden">
            <span class="text-[10px] font-bold text-gray-400 mb-1.5 uppercase tracking-wider">Stroke</span>
            <div class="flex items-center gap-2 bg-gray-50 p-1 rounded-lg border border-gray-100">
                <input type="color" id="strokeColor" onchange="changeStroke(this.value, null)" class="w-6 h-6 cursor-pointer bg-transparent">
                <input type="number" id="strokeWidth" value="0" min="0" max="20" onchange="changeStroke(null, this.value)" class="w-10 h-6 border bg-white rounded text-xs outline-none focus:border-indigo-400 text-center font-medium">
            </div>
        </div>

        <div id="divStroke" class="w-px h-8 bg-gray-200 shrink-0 hidden"></div>

        <div id="propDelete" class="flex-col items-center shrink-0 pr-2 hidden">
            <span class="text-[10px] font-bold text-red-400 mb-1.5 uppercase tracking-wider">Delete</span>
            <button onclick="deleteObject()" class="text-red-500 bg-red-50 hover:bg-red-500 hover:text-white w-8 h-8 rounded-full flex items-center justify-center transition-all shadow-sm border border-red-100">
                <i class="fas fa-trash-alt text-xs"></i>
            </button>
        </div>
    </div>

    <div class="h-[72px] bg-white border-t shrink-0 z-30 pb-safe relative overflow-hidden shadow-[0_-4px_20px_rgba(0,0,0,0.04)]">
        
        <nav id="mainMenu" class="absolute inset-0 flex items-center justify-around px-2 transition-transform duration-300 transform translate-x-0">
            <button onclick="addText()" class="flex flex-col items-center text-gray-500 hover:text-indigo-600 p-2 w-16 transition group">
                <div class="w-10 h-10 rounded-full bg-gray-50 group-hover:bg-indigo-50 flex items-center justify-center mb-1 transition">
                    <i class="fas fa-font text-lg"></i>
                </div>
                <span class="text-[10px] font-semibold">Text</span>
            </button>
            
            <input type="file" id="imageInput" class="hidden" accept="image/*" onchange="addImage(event)">
            <button onclick="document.getElementById('imageInput').click()" class="flex flex-col items-center text-gray-500 hover:text-indigo-600 p-2 w-16 transition group">
                <div class="w-10 h-10 rounded-full bg-gray-50 group-hover:bg-indigo-50 flex items-center justify-center mb-1 transition">
                    <i class="fas fa-image text-lg"></i>
                </div>
                <span class="text-[10px] font-semibold">Image</span>
            </button>
            
            <button onclick="toggleShapeMenu(true)" class="flex flex-col items-center text-gray-500 hover:text-indigo-600 p-2 w-16 transition group">
                <div class="w-10 h-10 rounded-full bg-gray-50 group-hover:bg-indigo-50 flex items-center justify-center mb-1 transition">
                    <i class="fas fa-shapes text-lg"></i>
                </div>
                <span class="text-[10px] font-semibold">Shapes</span>
            </button>

            <div class="flex flex-col items-center text-gray-500 hover:text-indigo-600 p-2 w-16 relative group">
                <input type="color" onchange="changeBgColor(this.value)" value="#ffffff" class="w-10 h-10 rounded-full cursor-pointer border-0 p-0 absolute top-2 opacity-0 z-10">
                <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-cyan-400 to-blue-500 mb-1 shadow-sm flex items-center justify-center text-white transition group-hover:scale-105">
                    <i class="fas fa-fill-drip text-sm"></i>
                </div>
                <span class="text-[10px] font-semibold">Background</span>
            </div>
        </nav>

        <nav id="shapeMenu" class="absolute inset-0 flex items-center justify-start gap-2 px-4 transition-transform duration-300 transform translate-x-full bg-white">
            <button onclick="toggleShapeMenu(false)" class="flex flex-col items-center text-gray-400 hover:text-gray-800 p-2 mr-2 transition">
                <div class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center mb-1">
                    <i class="fas fa-arrow-left text-lg"></i>
                </div>
                <span class="text-[10px] font-semibold">Back</span>
            </button>
            
            <div class="w-px h-8 bg-gray-200 mx-1"></div>

            <button onclick="addShape('rect')" class="flex flex-col items-center text-gray-600 hover:text-indigo-600 p-2 transition">
                <i class="fas fa-square text-2xl mb-1 text-blue-500"></i>
                <span class="text-[10px] font-semibold">Square</span>
            </button>

            <button onclick="addShape('circle')" class="flex flex-col items-center text-gray-600 hover:text-indigo-600 p-2 transition">
                <i class="fas fa-circle text-2xl mb-1 text-pink-500"></i>
                <span class="text-[10px] font-semibold">Circle</span>
            </button>

            <button onclick="addShape('triangle')" class="flex flex-col items-center text-gray-600 hover:text-indigo-600 p-2 transition">
                <i class="fas fa-caret-up text-3xl mb-0 text-yellow-500"></i>
                <span class="text-[10px] font-semibold mt-[-2px]">Triangle</span>
            </button>
        </nav>
    </div>

    <script>
        let canvas;
        let undoStack = [];
        let redoStack = [];
        let objectInitialState = null;
        let isProgrammaticSelection = false;

        const workspace = document.getElementById('workspace');
        const floatingAction = document.getElementById('floatingAction');
        const propertiesPanel = document.getElementById('propertiesPanel');
        
        // Menus
        const mainMenu = document.getElementById('mainMenu');
        const shapeMenu = document.getElementById('shapeMenu');

        window.onload = function() {
            let canvasWidth = window.innerWidth > 800 ? 800 : window.innerWidth - 32;
            let canvasHeight = canvasWidth * 0.5625;

            canvas = new fabric.Canvas('bannerCanvas', {
                width: canvasWidth, 
                height: canvasHeight, 
                backgroundColor: '#ffffff',
                preserveObjectStacking: true
            });

            canvas.on('selection:created', handleSelection);
            canvas.on('selection:updated', handleSelection);
            canvas.on('object:moving', updateFloatingPosition);
            canvas.on('object:scaling', updateFloatingPosition);
            canvas.on('object:rotating', updateFloatingPosition);
            canvas.on('selection:cleared', handleDeselection);

            saveHistory();
        };

        // --- Menu Toggles ---
        function toggleShapeMenu(show) {
            if(show) {
                mainMenu.classList.replace('translate-x-0', '-translate-x-full');
                shapeMenu.classList.replace('translate-x-full', 'translate-x-0');
            } else {
                shapeMenu.classList.replace('translate-x-0', 'translate-x-full');
                mainMenu.classList.replace('-translate-x-full', 'translate-x-0');
            }
        }

        // --- Undo / Redo ---
        function saveHistory() {
            if(redoStack.length > 0) redoStack = [];
            undoStack.push(JSON.stringify(canvas));
        }

        function undo() {
            if (undoStack.length > 1) {
                redoStack.push(undoStack.pop());
                loadCanvasState(undoStack[undoStack.length - 1]);
            }
        }

        function redo() {
            if (redoStack.length > 0) {
                const nextState = redoStack.pop();
                undoStack.push(nextState);
                loadCanvasState(nextState);
            }
        }

        function loadCanvasState(jsonStr) {
            isProgrammaticSelection = true;
            canvas.loadFromJSON(jsonStr, function() {
                canvas.renderAll();
                isProgrammaticSelection = false;
            });
        }

        // --- Selection & Floating Menu Logic ---
        function handleSelection(e) {
            if(isProgrammaticSelection) return;
            const obj = canvas.getActiveObject();
            if(!obj) return;
            
            objectInitialState = JSON.stringify(obj.toObject());

            configureSmartProperties(obj);
            
            propertiesPanel.classList.remove('translate-y-full');
            
            floatingAction.classList.remove('hidden');
            updateFloatingPosition();
        }

        function handleDeselection() {
            floatingAction.classList.add('hidden');
            propertiesPanel.classList.add('translate-y-full');
            objectInitialState = null;
        }

        function updateFloatingPosition() {
            const obj = canvas.getActiveObject();
            if(!obj) return;
            
            const bound = obj.getBoundingRect();
            const canvasOffset = document.querySelector('.canvas-container').getBoundingClientRect();
            const workspaceOffset = workspace.getBoundingClientRect();
            
            let topPos = (canvasOffset.top - workspaceOffset.top) + bound.top - 55;
            let leftPos = (canvasOffset.left - workspaceOffset.left) + bound.left + (bound.width / 2);

            if (topPos < 10) topPos = 10;

            floatingAction.style.top = `${topPos}px`;
            floatingAction.style.left = `${leftPos}px`;
            floatingAction.style.transform = `translateX(-50%)`;
        }

        // --- Smart Properties Configurator ---
        function configureSmartProperties(obj) {
            const isText = obj.type === 'i-text';
            const isImage = obj.type === 'image';
            const isShape = obj.type === 'rect' || obj.type === 'circle' || obj.type === 'triangle';

            // Reset UI
            ['propColor', 'divColor', 'propGradient', 'divGradient', 'propOpacity', 'divOpacity', 'propStroke', 'divStroke', 'propDelete'].forEach(id => document.getElementById(id).classList.add('hidden'));
            ['propColor', 'divColor', 'propGradient', 'divGradient', 'propOpacity', 'divOpacity', 'propStroke', 'divStroke', 'propDelete'].forEach(id => document.getElementById(id).classList.remove('flex'));

            // Show relevant options based on type
            if(isText) {
                document.getElementById('propColor').classList.replace('hidden', 'flex');
                document.getElementById('divColor').classList.replace('hidden', 'block');
                document.getElementById('propStroke').classList.replace('hidden', 'flex');
                document.getElementById('divStroke').classList.replace('hidden', 'block');
            } else if (isShape) {
                document.getElementById('propColor').classList.replace('hidden', 'flex');
                document.getElementById('divColor').classList.replace('hidden', 'block');
                document.getElementById('propGradient').classList.replace('hidden', 'flex');
                document.getElementById('divGradient').classList.replace('hidden', 'block');
                document.getElementById('propStroke').classList.replace('hidden', 'flex');
                document.getElementById('divStroke').classList.replace('hidden', 'block');
            }
            
            // Opacity and Delete are common for all
            document.getElementById('propOpacity').classList.replace('hidden', 'flex');
            document.getElementById('divOpacity').classList.replace('hidden', 'block');
            document.getElementById('propDelete').classList.replace('hidden', 'flex');

            // Set Values
            if(typeof obj.fill === 'string') document.getElementById('itemColor').value = obj.fill;
            document.getElementById('itemOpacity').value = obj.opacity || 1;
            document.getElementById('opVal').innerText = Math.round((obj.opacity || 1)*100)+'%';
            document.getElementById('strokeWidth').value = obj.strokeWidth || 0;
            if(obj.stroke) document.getElementById('strokeColor').value = obj.stroke;
        }

        // --- ✅ Tick & ❌ Cross Actions ---
        function confirmChanges() {
            saveHistory(); 
            canvas.discardActiveObject();
            canvas.renderAll();
        }

        function discardChanges() {
            const obj = canvas.getActiveObject();
            if(obj && objectInitialState) {
                const prevData = JSON.parse(objectInitialState);
                obj.set(prevData);
            }
            canvas.discardActiveObject();
            canvas.renderAll();
        }

        // --- Tools ---
        function addText() {
            const text = new fabric.IText('Edit Text', {
                left: canvas.width/2 - 60, top: canvas.height/2 - 20, 
                fontFamily: 'Inter', fill: '#1e293b', fontSize: 36, fontWeight: 'bold'
            });
            canvas.add(text);
            canvas.setActiveObject(text);
        }

        function addShape(type) {
            let shape;
            if(type === 'rect') shape = new fabric.Rect({ left: canvas.width/2 - 40, top: canvas.height/2 - 40, fill: '#3b82f6', width: 80, height: 80, rx: 12, ry: 12 });
            else if (type === 'circle') shape = new fabric.Circle({ left: canvas.width/2 - 40, top: canvas.height/2 - 40, fill: '#ec4899', radius: 45 });
            else if (type === 'triangle') shape = new fabric.Triangle({ left: canvas.width/2 - 40, top: canvas.height/2 - 40, fill: '#eab308', width: 80, height: 80 });
            
            canvas.add(shape);
            canvas.setActiveObject(shape);
            toggleShapeMenu(false); // Go back to main menu after adding shape
        }

        function addImage(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(f) {
                fabric.Image.fromURL(f.target.result, function(img) {
                    img.scaleToWidth(canvas.width / 2.5);
                    img.set({ selectable: true, evented: true, rx: 10, ry: 10 }); // Keeps it unlocked
                    canvas.add(img);
                    canvas.centerObject(img);
                    canvas.setActiveObject(img);
                    saveHistory();
                });
            };
            reader.readAsDataURL(file);
            e.target.value = ''; 
        }

        function changeBgColor(color) {
            canvas.backgroundColor = color;
            canvas.renderAll();
            saveHistory();
        }

        // --- Properties Actions ---
        function changeColor(color) {
            const activeObj = canvas.getActiveObject();
            if(activeObj) { activeObj.set('fill', color); canvas.renderAll(); }
        }

        function applyGradient() {
            const activeObj = canvas.getActiveObject();
            const color1 = document.getElementById('gradColor1').value;
            const color2 = document.getElementById('gradColor2').value;
            
            if(activeObj && activeObj.type !== 'image' && activeObj.type !== 'i-text') {
                const grad = new fabric.Gradient({
                    type: 'linear', gradientUnits: 'pixels', 
                    coords: { x1: 0, y1: 0, x2: activeObj.width, y2: activeObj.height },
                    colorStops:[ { offset: 0, color: color1 }, { offset: 1, color: color2 } ]
                });
                activeObj.set('fill', grad); 
                canvas.renderAll();
            }
        }

        function changeOpacity(val) {
            const activeObj = canvas.getActiveObject();
            if(activeObj) { activeObj.set('opacity', parseFloat(val)); canvas.renderAll(); }
        }

        function changeStroke(color, width) {
            const activeObj = canvas.getActiveObject();
            if(activeObj) {
                if(color !== null) activeObj.set('stroke', color);
                if(width !== null) activeObj.set('strokeWidth', parseInt(width));
                canvas.renderAll();
            }
        }

        function deleteObject() {
            const activeObjects = canvas.getActiveObjects();
            if (activeObjects.length) {
                canvas.discardActiveObject();
                activeObjects.forEach(function(object) { canvas.remove(object); });
                saveHistory();
            }
        }

        function exportBanner() {
            canvas.discardActiveObject(); 
            canvas.renderAll();
            const dataURL = canvas.toDataURL({ format: 'png', quality: 1, multiplier: 3 }); 
            const link = document.createElement('a');
            link.download = 'ProBanner-HighRes.png';
            link.href = dataURL;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
