<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Banner Maker | প্রফেশনাল ব্যানার তৈরি করুন</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Playfair+Display:wght@700&family=Poppins:wght@400;600&family=Montserrat:wght@500;700&family=AdorshoLipi:wght@400;700&family=Galada&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Poppins', 'Hind Siliguri', sans-serif; height: 100vh; display: flex; flex-direction: column; background-color: #f8fafc; }
        .canvas-container { box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08); border-radius: 12px; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .template-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <header class="bg-white shadow-sm border-b px-4 md:px-6 py-3 flex justify-between items-center z-10 shrink-0">
        <div class="flex items-center gap-2">
            <i class="fa-solid fa-layer-group text-indigo-600 text-2xl md:text-3xl"></i>
            <h1 class="text-xl md:text-2xl font-bold text-gray-900">ব্যানার<span class="text-indigo-600">প্রো</span></h1>
        </div>
        <div class="flex items-center">
            <button onclick="downloadBanner()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-2 md:px-5 md:py-2.5 rounded-full font-semibold transition flex items-center gap-2 text-xs md:text-sm shadow">
                <i class="fa-solid fa-cloud-download"></i> <span class="hidden md:inline">হাই-কোয়ালিটি</span> ডাউনলোড
            </button>
        </div>
    </header>

    <div class="flex flex-col-reverse md:flex-row flex-1 overflow-hidden">
        
        <aside class="w-full md:w-80 h-1/2 md:h-full bg-white border-t md:border-t-0 md:border-r flex flex-col overflow-hidden shrink-0">
            
            <div class="flex border-b text-sm font-medium shrink-0">
                <button id="templatesTabBtn" onclick="openTab('templatesTab')" class="flex-1 py-3 text-center text-indigo-600 border-b-2 border-indigo-600 active-tab">টেমপ্লেট</button>
                <button id="toolsTabBtn" onclick="openTab('toolsTab')" class="flex-1 py-3 text-center text-gray-500 hover:text-indigo-600">এডিট টুলস</button>
            </div>

            <div class="flex-1 overflow-y-auto p-4 md:p-5">
                
                <div id="templatesTab" class="tab-content active">
                    <h2 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-4">জনপ্রিয় টেমপ্লেটসমূহ</h2>
                    <div id="templateList" class="grid grid-cols-2 gap-3">
                        </div>
                </div>

                <div id="toolsTab" class="tab-content space-y-5">
                    <section>
                        <h2 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">যোগ করুন</h2>
                        <div class="grid grid-cols-2 gap-3">
                            <button onclick="addText()" class="w-full flex items-center justify-center gap-2 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 px-4 py-3 rounded-xl font-medium transition text-sm border border-indigo-100">
                                <i class="fa-solid fa-t"></i> টেক্সট
                            </button>
                            <label class="w-full flex items-center justify-center gap-2 bg-green-50 hover:bg-green-100 text-green-700 px-4 py-3 rounded-xl font-medium transition cursor-pointer text-sm border border-green-100">
                                <i class="fa-solid fa-image"></i> ছবি/লোগো
                                <input type="file" id="imageLoader" class="hidden" accept="image/*">
                            </label>
                        </div>
                    </section>

                    <hr class="border-gray-100">

                    <section id="propertiesPanel" class="space-y-4">
                        <h2 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">প্রপার্টিজ</h2>
                        
                        <div class="text-properties hidden">
                            <label class="block text-xs text-gray-500 mb-1.5 font-medium">ফন্ট স্টাইল</label>
                            <select id="fontFamily" onchange="changeFont(this.value)" class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-1 focus:ring-indigo-400">
                                <option value="Poppins">Poppins (English Modern)</option>
                                <option value="Hind Siliguri">Hind Siliguri (বাংলা বোল্ড)</option>
                                <option value="Galada">Galada (বাংলা স্টাইলিশ)</option>
                                <option value="AdorshoLipi">AdorshoLipi (বাংলা ফরমাল)</option>
                                <option value="Montserrat">Montserrat (English Compact)</option>
                                <option value="Playfair Display">Playfair (English Classic)</option>
                            </select>
                        </div>

                        <div class="flex gap-4">
                            <div class="flex-1">
                                <label class="block text-xs text-gray-500 mb-1.5 font-medium">রঙ</label>
                                <div class="flex items-center gap-2 p-1.5 border rounded-lg">
                                    <input type="color" id="colorPicker" onchange="changeColor(this.value)" class="w-10 h-10 rounded-lg cursor-pointer border-none p-0">
                                    <span id="colorHex" class="text-xs text-gray-500 font-mono">#000000</span>
                                </div>
                            </div>
                            <div class="flex-1">
                                <label class="block text-xs text-gray-500 mb-1.5 font-medium">অচ্ছতা (Opacity)</label>
                                <input type="range" min="0" max="1" step="0.1" value="1" oninput="changeOpacity(this.value)" class="w-full mt-3 h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-indigo-600">
                            </div>
                        </div>

                        <div class="text-properties hidden grid grid-cols-2 gap-2 pt-2">
                            <button onclick="changeAlignment('left')" class="p-2.5 bg-gray-50 rounded-lg border text-gray-600 hover:bg-gray-100"><i class="fa-solid fa-align-left"></i></button>
                            <button onclick="changeAlignment('center')" class="p-2.5 bg-gray-50 rounded-lg border text-gray-600 hover:bg-gray-100"><i class="fa-solid fa-align-center"></i></button>
                        </div>
                    </section>

                    <hr class="border-gray-100">

                    <section class="mt-auto pb-4">
                        <button onclick="deleteObject()" class="w-full flex items-center justify-center gap-2 bg-red-50 hover:bg-red-100 text-red-600 px-4 py-3 rounded-xl font-medium transition text-sm border border-red-100">
                            <i class="fa-solid fa-trash-can"></i> সিলেক্টেড অবজেক্ট মুছুন
                        </button>
                    </section>
                </div>
            </div>
        </aside>

        <main class="flex-1 w-full h-1/2 md:h-full bg-gray-100 flex flex-col items-center justify-center p-2 md:p-8 overflow-hidden relative">
            <div id="canvasWrapper" class="relative max-w-full max-h-full flex items-center justify-center">
                <canvas id="bannerCanvas"></canvas>
            </div>
        </main>
    </div>

    <script>
        // ক্যানভাস সাইজ (Facebook/Web Banner standard)
        const CANVAS_WIDTH = 1200;
        const CANVAS_HEIGHT = 628;

        const canvas = new fabric.Canvas('bannerCanvas', {
            width: CANVAS_WIDTH,
            height: CANVAS_HEIGHT,
            backgroundColor: '#ffffff',
            preserveObjectStacking: true
        });

        // ক্যানভাসকে রেসপন্সিভ করার উন্নত ফাংশন
        function resizeCanvas() {
            const wrapper = document.getElementById('canvasWrapper');
            const container = wrapper.parentNode;
            
            // Container এর আসল প্যানিং ও মার্জিন বাদ দিয়ে সাইজ নেওয়া
            const style = window.getComputedStyle(container);
            const paddingX = parseFloat(style.paddingLeft) + parseFloat(style.paddingRight);
            const paddingY = parseFloat(style.paddingTop) + parseFloat(style.paddingBottom);
            
            const containerWidth = container.clientWidth - paddingX;
            const containerHeight = container.clientHeight - paddingY;
            
            // স্কেলিং রেশিও বের করা
            const scaleX = containerWidth / CANVAS_WIDTH;
            const scaleY = containerHeight / CANVAS_HEIGHT;
            const scale = Math.min(scaleX, scaleY, 1); 

            canvas.setZoom(scale);
            canvas.setWidth(CANVAS_WIDTH * scale);
            canvas.setHeight(CANVAS_HEIGHT * scale);
        }
        
        window.addEventListener('resize', resizeCanvas);
        // ক্যানভাস লোড হওয়ার পর রি-সাইজ নিশ্চিত করা
        setTimeout(resizeCanvas, 100);

        // Object Selection Listener
        canvas.on('selection:created', onObjectSelected);
        canvas.on('selection:updated', onObjectSelected);
        canvas.on('selection:cleared', onSelectionCleared);

        function onObjectSelected(e) {
            const selectedObject = e.target;
            document.querySelectorAll('.text-properties').forEach(el => el.style.display = 'none');
            
            if (selectedObject.type === 'i-text') {
                document.querySelectorAll('.text-properties').forEach(el => el.style.display = 'block');
                document.getElementById('fontFamily').value = selectedObject.fontFamily;
                openTab('toolsTab');
            }
            
            document.getElementById('colorPicker').value = selectedObject.fill;
            document.getElementById('colorHex').textContent = selectedObject.fill;
            canvas.requestRenderAll();
        }

        function onSelectionCleared() {
            document.querySelectorAll('.text-properties').forEach(el => el.style.display = 'none');
        }

        // --- টেমপ্লেট লাইব্রেরি ---
        const bannerTemplates = [
            { id: 1, name: 'বিজয় দিবস শুভেচ্ছা', data: {"version":"5.3.0","objects":[{"type":"rect","left":0,"top":0,"width":1200,"height":628,"fill":"#880e4f","selectable":false,"evented":false},{"type":"rect","left":300,"top":20,"width":600,"height":588,"fill":"#004d40","rx":10,"ry":10},{"type":"i-text","left":400,"top":180,"width":400,"height":60,"fill":"#ffffff","text":"মহান বিজয় দিবস","fontFamily":"Hind Siliguri","fontSize":60,"fontWeight":"bold","textAlign":"center"},{"type":"i-text","left":450,"top":270,"width":300,"height":30,"fill":"#ffeb3b","text":"সবাইকে লাল সবুজ শুভেচ্ছা","fontFamily":"AdorshoLipi","fontSize":30,"textAlign":"center"}]} },
            { id: 2, name: 'ফ্ল্যাশ সেল', data: {"version":"5.3.0","objects":[{"type":"rect","left":0,"top":0,"width":1200,"height":628,"fill":"#311b92","selectable":false,"evented":false},{"type":"i-text","left":100,"top":150,"text":"ফ্ল্যাশ সেল!","fontFamily":"Poppins","fontSize":90,"fontWeight":"bold","fill":"#ffeb3b"},{"type":"i-text","left":100,"top":280,"text":"সব পণ্যে ৫০% পর্যন্ত ছাড়","fontFamily":"Galada","fontSize":50,"fill":"#ffffff"}]} },
            { id: 3, name: 'কোর্স ভর্তি', data: {"version":"5.3.0","objects":[{"type":"rect","left":0,"top":0,"width":1200,"height":628,"fill":"#0d47a1","selectable":false,"evented":false},{"type":"i-text","left":80,"top":120,"text":"প্রফেশনাল গ্রাফিক্স ডিজাইন","fontFamily":"Hind Siliguri","fontSize":60,"fontWeight":"bold","fill":"#ffffff"},{"type":"i-text","left":80,"top":210,"text":"ভর্তি চলছে! আজই জয়েন করুন।","fontFamily":"Hind Siliguri","fontSize":35,"fill":"#bbdefb"}]} },
            { id: 4, name: 'ফুড রেস্তোরাঁ', data: {"version":"5.3.0","objects":[{"type":"rect","left":0,"top":0,"width":1200,"height":628,"fill":"#f44336","selectable":false,"evented":false},{"type":"i-text","left":450,"top":180,"text":"টেস্টি স্বর্গ","fontFamily":"Galada","fontSize":75,"fill":"#ffffff","fontWeight":"bold"},{"type":"i-text","left":450,"top":280,"text":"নিউ ইয়র্ক স্টাইল পিৎজা","fontFamily":"Poppins","fontSize":40,"fill":"#ffeb3b"}]} },
            { id: 5, name: 'স্বপ্নের বাড়ি', data: {"version":"5.3.0","objects":[{"type":"rect","left":0,"top":0,"width":1200,"height":628,"fill":"#212121","selectable":false,"evented":false},{"type":"i-text","left":70,"top":150,"text":"আপনার স্বপ্নের বাড়ি কিনুন","fontFamily":"Hind Siliguri","fontSize":60,"fill":"#ffffff","fontWeight":"bold"},{"type":"i-text","left":70,"top":250,"text":"মাত্র ২ কিমিতে মেট্রো স্টেশন","fontFamily":"Hind Siliguri","fontSize":35,"fill":"#8bc34a"}]} },
            { id: 6, name: 'এজেন্সি সার্ভিস', data: {"version":"5.3.0","objects":[{"type":"rect","left":0,"top":0,"width":1200,"height":628,"fill":"#ff9800","selectable":false,"evented":false},{"type":"i-text","left":650,"top":100,"text":"আপনার ব্যবসা বৃদ্ধি করুন","fontFamily":"Hind Siliguri","fontSize":55,"fill":"#ffffff","fontWeight":"bold"},{"type":"i-text","left":650,"top":190,"text":"ডিজিটাল মার্কেটিং সলিউশন","fontFamily":"Galada","fontSize":40,"fill":"#212121"}]} }
        ];

        function initTemplates() {
            const list = document.getElementById('templateList');
            bannerTemplates.forEach(template => {
                const card = document.createElement('button');
                card.className = "template-card bg-gray-50 border rounded-xl overflow-hidden text-left transition";
                card.onclick = () => loadTemplate(template.id);
                
                const bgColor = template.data.objects[0].fill || '#cccccc';
                const mainTextColor = (template.data.objects[1] && template.data.objects[1].fill) ? template.data.objects[1].fill : '#ffffff';

                card.innerHTML = `
                    <div style="background-color: ${bgColor}" class="w-full aspect-[1.91/1] flex flex-col p-2 space-y-1">
                        <div style="background-color: ${mainTextColor}" class="w-2/3 h-2 rounded-sm opacity-60"></div>
                        <div style="background-color: ${mainTextColor}" class="w-full h-1.5 rounded-sm opacity-40"></div>
                    </div>
                    <div class="p-2.5">
                        <span class="text-sm font-semibold text-gray-800">${template.name}</span>
                    </div>
                `;
                list.appendChild(card);
            });
            loadTemplate(bannerTemplates[0].id);
        }
        initTemplates();

        function loadTemplate(id) {
            const template = bannerTemplates.find(t => t.id === id);
            if (!template) return;
            canvas.loadFromJSON(JSON.stringify(template.data), () => {
                canvas.requestRenderAll();
                openTab('toolsTab');
            });
        }

        // --- এডিটিং টুলস ---
        function addText() {
            const newText = new fabric.IText('আপনার টেক্সট লিখুন', { 
                left: CANVAS_WIDTH / 2, top: CANVAS_HEIGHT / 2, originX: 'center', originY: 'center',
                fontFamily: 'Hind Siliguri', fontSize: 45, fill: '#000000', padding: 10
            });
            canvas.add(newText);
            canvas.setActiveObject(newText);
            newText.enterEditing();
        }

        document.getElementById('imageLoader').addEventListener('change', function (e) {
            const reader = new FileReader();
            reader.onload = function (event) {
                const imgObj = new Image();
                imgObj.src = event.target.result;
                imgObj.onload = function () {
                    const img = new fabric.Image(imgObj);
                    const scale = (CANVAS_HEIGHT * 0.5) / img.height; 
                    img.set({ left: CANVAS_WIDTH / 2, top: CANVAS_HEIGHT / 2, originX: 'center', originY: 'center', scaleX: scale, scaleY: scale });
                    canvas.add(img);
                    canvas.setActiveObject(img);
                }
            }
            reader.readAsDataURL(e.target.files[0]);
        });

        function changeFont(fontName) {
            const activeObject = canvas.getActiveObject();
            if (activeObject && activeObject.type === 'i-text') {
                activeObject.set("fontFamily", fontName);
                canvas.requestRenderAll();
            }
        }

        function changeColor(color) {
            const activeObject = canvas.getActiveObject();
            if (activeObject) {
                activeObject.set("fill", color);
                document.getElementById('colorHex').textContent = color.toUpperCase();
                canvas.requestRenderAll();
            }
        }
        
        function changeOpacity(value) {
            const activeObject = canvas.getActiveObject();
            if (activeObject) {
                activeObject.set("opacity", parseFloat(value));
                canvas.requestRenderAll();
            }
        }
        
        function changeAlignment(align) {
            const activeObject = canvas.getActiveObject();
            if (activeObject && activeObject.type === 'i-text') {
                activeObject.set("textAlign", align);
                canvas.requestRenderAll();
            }
        }

        function deleteObject() {
            const activeObjects = canvas.getActiveObjects();
            if (activeObjects.length > 0) {
                activeObjects.forEach(obj => canvas.remove(obj));
                canvas.discardActiveObject();
            } else {
                alert("প্রথমে একটি অংশ সিলেক্ট করুন!");
            }
        }

        function downloadBanner() {
            canvas.discardActiveObject();
            canvas.requestRenderAll();
            const dataURL = canvas.toDataURL({ format: 'png', quality: 1, multiplier: 1 }); 
            const link = document.createElement('a');
            link.href = dataURL;
            link.download = 'প্রফেশনাল-ব্যানার-pro.png';
            link.click();
        }

        function openTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            
            document.getElementById('templatesTabBtn').className = "flex-1 py-3 text-center text-gray-500 hover:text-indigo-600";
            document.getElementById('toolsTabBtn').className = "flex-1 py-3 text-center text-gray-500 hover:text-indigo-600";

            document.getElementById(tabId + 'Btn').className = "flex-1 py-3 text-center text-indigo-600 border-b-2 border-indigo-600 active-tab";
        }
    </script>
</body>
</html>
