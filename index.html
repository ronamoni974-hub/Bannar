        // ========== FABRIC EDITOR CORE ==========
        let canvas, undoStack = [], redoStack = [], isProgrammaticSelection = false;
        let cropMode = false, cropRect = null, originalImageObj = null;

        function initCanvas() {
            if(!canvas) {
                let canvasWidth = window.innerWidth > 800 ? 800 : window.innerWidth - 32; let canvasHeight = canvasWidth * 0.5625; 
                canvas = new fabric.Canvas('bannerCanvas', { width: canvasWidth, height: canvasHeight, backgroundColor: '#ffffff', preserveObjectStacking: true });
                canvas.on('selection:created', handleSelection); canvas.on('selection:updated', handleSelection); canvas.on('selection:cleared', handleDeselection);
                canvas.on('object:modified', syncOverlays); canvas.on('object:moving', syncOverlays); canvas.on('object:scaling', syncOverlays);
                canvas.on('object:rotating', syncOverlays);
                canvas.on('object:removed', function(opt) { if(opt.target.id && !opt.target.isOverlay) { canvas.getObjects().forEach(o => { if(o.isOverlay && o.targetId === opt.target.id) canvas.remove(o); }); } });
            }
        }
        function syncOverlays(opt) { if (opt.target && opt.target.id && !opt.target.isOverlay) { let overlays = canvas.getObjects().filter(o => o.isOverlay && o.targetId === opt.target.id); overlays.forEach(overlay => { overlay.set({ left: opt.target.left, top: opt.target.top, scaleX: opt.target.scaleX, scaleY: opt.target.scaleY, angle: opt.target.angle, width: opt.target.width, height: opt.target.height }); }); } }
        function setCanvasSize(ratio) { let canvasWidth = window.innerWidth > 800 ? 800 : window.innerWidth - 32; let canvasHeight = canvasWidth / ratio; if(canvasHeight > window.innerHeight * 0.6) { canvasHeight = window.innerHeight * 0.6; canvasWidth = canvasHeight * ratio; } canvas.setDimensions({ width: canvasWidth, height: canvasHeight }); document.getElementById('resizeModal').classList.add('hidden'); canvas.getObjects().forEach(obj => { canvas.centerObject(obj); obj.setCoords(); }); canvas.renderAll(); saveHistory(); }
        function applyCustomSize() { let w = parseInt(document.getElementById('customWidth').value); let h = parseInt(document.getElementById('customHeight').value); if(!w || !h || w < 50 || h < 50) return showToast("Valid dimensions", "error"); setCanvasSize(w / h); }
        function toggleShapeMenu(show) { if(show) { mainMenu.classList.replace('translate-x-0', '-translate-x-full'); shapeMenu.classList.replace('translate-x-full', 'translate-x-0'); } else { shapeMenu.classList.replace('translate-x-0', 'translate-x-full'); mainMenu.classList.replace('-translate-x-full', 'translate-x-0'); } }
        function toggleLayerMenu(show) { if(show) { layerMenu.classList.replace('translate-x-full', 'translate-x-0'); mainMenu.classList.replace('translate-x-0', '-translate-x-full'); } else { layerMenu.classList.replace('translate-x-0', 'translate-x-full'); mainMenu.classList.replace('-translate-x-full', 'translate-x-0'); } }
        function layerAction(action) { const obj = canvas.getActiveObject(); if(!obj) return; if(action === 'front') canvas.bringToFront(obj); if(action === 'up') canvas.bringForward(obj); if(action === 'down') canvas.sendBackwards(obj); if(action === 'back') canvas.sendToBack(obj); if(obj.id) { let objIndex = canvas.getObjects().indexOf(obj); let overlays = canvas.getObjects().filter(o => o.isOverlay && o.targetId === obj.id); overlays.forEach((overlay, i) => { overlay.moveTo(objIndex + 1 + i); }); } canvas.renderAll(); saveHistory(); }
        function saveHistory() { if(redoStack.length > 0) redoStack = []; undoStack.push(JSON.stringify(canvas)); }
        function undo() { if (undoStack.length > 1) { redoStack.push(undoStack.pop()); loadCanvasState(undoStack[undoStack.length - 1]); } }
        function redo() { if (redoStack.length > 0) { const next = redoStack.pop(); undoStack.push(next); loadCanvasState(next); } }
        function loadCanvasState(json) { isProgrammaticSelection = true; canvas.loadFromJSON(json, function() { canvas.renderAll(); isProgrammaticSelection = false; }); }
        function handleSelection() { if(isProgrammaticSelection) return; const obj = canvas.getActiveObject(); if(!obj) return; configureSmartProperties(obj); propertiesPanel.classList.remove('translate-y-full'); }
        function handleDeselection() { propertiesPanel.classList.add('translate-y-full'); }
        function openBgPanel() { canvas.discardActiveObject(); setTimeout(() => { Array.from(propertiesPanel.children).forEach(child => { child.classList.add('hidden'); child.classList.remove('flex', 'block'); }); document.getElementById('propColor').classList.replace('hidden', 'flex'); document.getElementById('propGradient').classList.replace('hidden', 'flex'); document.getElementById('divSep1').classList.replace('hidden', 'block'); if(typeof canvas.backgroundColor === 'string') document.getElementById('itemColor').value = canvas.backgroundColor; propertiesPanel.classList.remove('translate-y-full'); }, 50); }

        // GROUP FUNCTIONALITY
        function toggleGroup() { const activeObj = canvas.getActiveObject(); if (!activeObj) return; if (activeObj.type === 'activeSelection') { activeObj.toGroup(); canvas.requestRenderAll(); showToast("Grouped", "success"); } else if (activeObj.type === 'group') { activeObj.toActiveSelection(); canvas.requestRenderAll(); showToast("Ungrouped", "success"); } configureSmartProperties(canvas.getActiveObject()); saveHistory(); }

        // IMAGE REPLACE & CROP
        function replaceImage() { const obj = canvas.getActiveObject(); if(!obj || !obj.isMainImage) return; const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.onchange = (e) => { const file = e.target.files[0]; if(file) { const reader = new FileReader(); reader.onload = (f) => { fabric.Image.fromURL(f.target.result, (newImg) => { newImg.set({ left: obj.left, top: obj.top, scaleX: obj.scaleX, scaleY: obj.scaleY, angle: obj.angle, isMainImage: true, customStrokeWidth: obj.customStrokeWidth, customStroke: obj.customStroke, strokeWidth: 0, clipPath: obj.clipPath }); canvas.add(newImg); canvas.remove(obj); canvas.setActiveObject(newImg); saveHistory(); showToast("Image replaced", "success"); }); }; reader.readAsDataURL(file); } }; input.click(); }
        
        function startCrop() { if(cropMode) return; const obj = canvas.getActiveObject(); if(!obj || !obj.isMainImage) { showToast("Select an image to crop", "error"); return; } cropMode = true; originalImageObj = obj; const bounds = obj.getBoundingRect(); cropRect = new fabric.Rect({ left: bounds.left, top: bounds.top, width: bounds.width/2, height: bounds.height/2, fill: 'rgba(0,0,0,0.5)', stroke: '#fff', strokeWidth: 2, strokeDashArray: [5,5], hasControls: true, hasBorders: true, lockRotation: true, transparentCorners: false, cornerColor: '#4f46e5', cornerSize: 8 }); canvas.add(cropRect); canvas.setActiveObject(cropRect); showToast("Resize crop area and press Enter", "info"); const confirmCrop = (e) => { if(e.key === 'Enter') { applyCrop(); document.removeEventListener('keydown', confirmCrop); } }; document.addEventListener('keydown', confirmCrop); }
        function applyCrop() { if(!cropMode || !cropRect || !originalImageObj) return; const img = originalImageObj; const cropArea = cropRect.getBoundingRect(); const imgBounds = img.getBoundingRect(); const scaleX = img.width / imgBounds.width; const scaleY = img.height / imgBounds.height; const cropLeft = (cropArea.left - imgBounds.left) * scaleX; const cropTop = (cropArea.top - imgBounds.top) * scaleY; const cropWidth = cropArea.width * scaleX; const cropHeight = cropArea.height * scaleY; const dataURL = img.toDataURL({ left: cropLeft, top: cropTop, width: cropWidth, height: cropHeight }); fabric.Image.fromURL(dataURL, (croppedImg) => { croppedImg.set({ left: cropArea.left, top: cropArea.top, scaleX: 1, scaleY: 1, angle: img.angle, isMainImage: true, customStrokeWidth: img.customStrokeWidth, customStroke: img.customStroke }); canvas.add(croppedImg); canvas.remove(img); canvas.remove(cropRect); canvas.setActiveObject(croppedImg); cropMode = false; cropRect = null; originalImageObj = null; saveHistory(); showToast("Cropped", "success"); }); }

        // FIXED REMOVE BG (preserves size)
        async function removeBackground() { const obj = canvas.getActiveObject(); if (!obj || !obj.isMainImage) return showToast("Select an image", "error"); document.getElementById('fullLoader').classList.remove('hidden'); document.getElementById('loaderText').innerText = "AI Removing Background..."; try { const oldScaledWidth = obj.getScaledWidth(); const oldScaledHeight = obj.getScaledHeight(); const base64Data = obj.toDataURL({format: 'png'}); const base64Image = base64Data.split(',')[1]; const formData = new FormData(); formData.append('image_file_b64', base64Image); const response = await fetch('https://api.remove.bg/v1.0/removebg', { method: 'POST', headers: { 'X-Api-Key': 'r5M6W8PLCnGS6ABQwhoN2f7i' }, body: formData }); if (!response.ok) throw new Error("API Error"); const blob = await response.blob(); const reader = new FileReader(); reader.readAsDataURL(blob); reader.onloadend = function() { fabric.Image.fromURL(reader.result, function(newImg) { const scaleX = oldScaledWidth / newImg.width; const scaleY = oldScaledHeight / newImg.height; newImg.set({ left: obj.left, top: obj.top, scaleX: scaleX, scaleY: scaleY, angle: obj.angle, isMainImage: true, customStrokeWidth: obj.customStrokeWidth, customStroke: obj.customStroke, strokeWidth: 0, clipPath: obj.clipPath }); canvas.add(newImg); canvas.remove(obj); canvas.setActiveObject(newImg); saveHistory(); showToast("Background removed", "success"); }); }; } catch(e) { showToast(e.message, "error"); } finally { document.getElementById('fullLoader').classList.add('opacity-0'); setTimeout(() => document.getElementById('fullLoader').classList.add('hidden'), 300); } }

        function configureSmartProperties(obj) { const isText = obj.type === 'i-text', isShape = ['rect','circle','triangle','polygon','path'].includes(obj.type), isImage = obj.isMainImage === true, isSelection = obj.type === 'activeSelection', isGroup = obj.type === 'group'; Array.from(propertiesPanel.children).forEach(child => { child.classList.add('hidden'); child.classList.remove('flex','block'); }); if(isSelection || isGroup) { document.getElementById('propGroup').classList.replace('hidden','flex'); document.getElementById('groupBtnIcon').className = isGroup ? 'fas fa-object-ungroup text-indigo-500' : 'fas fa-object-group text-indigo-500'; } if(isText && !isSelection && !isGroup) { document.getElementById('propTextEdit').classList.replace('hidden','flex'); document.getElementById('propFont').classList.replace('hidden','flex'); document.getElementById('divSepText').classList.replace('hidden','block'); document.getElementById('propColor').classList.replace('hidden','flex'); document.getElementById('propGradient').classList.replace('hidden','flex'); document.getElementById('propStroke').classList.replace('hidden','flex'); document.getElementById('divSep1').classList.replace('hidden','block'); document.getElementById('propShadow').classList.replace('hidden','flex'); document.getElementById('propOpacity').classList.replace('hidden','flex'); document.getElementById('propDirectionalOpacity').classList.replace('hidden','flex'); document.getElementById('textEditInput').value = obj.text; document.getElementById('currentFontBtn').innerHTML = `${obj.fontFamily || 'Inter'} <i class="fas fa-chevron-down text-[10px] text-gray-400"></i>`; } else if (isImage && !isSelection && !isGroup) { document.getElementById('propRemoveBg').classList.replace('hidden','flex'); document.getElementById('propImageActions').classList.replace('hidden','flex'); document.getElementById('propImageShape').classList.replace('hidden','flex'); document.getElementById('propStroke').classList.replace('hidden','flex'); document.getElementById('divSep1').classList.replace('hidden','block'); document.getElementById('propShadow').classList.replace('hidden','flex'); document.getElementById('propOpacity').classList.replace('hidden','flex'); document.getElementById('propDirectionalOpacity').classList.replace('hidden','flex'); } else if (isShape && !isSelection && !isGroup) { document.getElementById('propColor').classList.replace('hidden','flex'); document.getElementById('propGradient').classList.replace('hidden','flex'); document.getElementById('propStroke').classList.replace('hidden','flex'); document.getElementById('divSep1').classList.replace('hidden','block'); document.getElementById('propShadow').classList.replace('hidden','flex'); document.getElementById('propOpacity').classList.replace('hidden','flex'); document.getElementById('propDirectionalOpacity').classList.replace('hidden','flex'); } else if (isGroup || isSelection) { document.getElementById('propOpacity').classList.replace('hidden','flex'); } document.getElementById('propDelete').classList.replace('hidden','flex'); if(obj.fill && typeof obj.fill === 'string' && obj.fill.startsWith('#')) document.getElementById('itemColor').value = obj.fill; document.getElementById('generalOpacity').value = obj.opacity !== undefined ? obj.opacity : 1; document.getElementById('opValStr').innerText = Math.round((obj.opacity !== undefined ? obj.opacity : 1)*100)+'%'; let strokeC = obj.customStroke || obj.stroke || '#000000', strokeW = obj.customStrokeWidth !== undefined ? obj.customStrokeWidth : (obj.strokeWidth || 0); document.getElementById('strokeWidth').value = strokeW; document.getElementById('strokeVal').innerText = strokeW; if(strokeC) document.getElementById('strokeColor').value = strokeC; if(obj.shadow) { document.getElementById('shadowBlur').value = obj.shadow.blur; document.getElementById('shadowColor').value = obj.shadow.color; } else { document.getElementById('shadowBlur').value = 0; } }
        function updateTextContent(val) { const obj = canvas.getActiveObject(); if (obj && obj.type === 'i-text') { obj.set('text', val); canvas.renderAll(); } }
        function changeFont(fontName) { const obj = canvas.getActiveObject(); if(obj && obj.type === 'i-text') { obj.set('fontFamily', fontName); document.getElementById('currentFontBtn').innerHTML = `${fontName} <i class="fas fa-chevron-down text-[10px] text-gray-400"></i>`; canvas.renderAll(); saveHistory(); } }
        function addText() { const text = new fabric.IText('আপনার টেক্সট\nYour Text', { left: canvas.width/2 - 60, top: canvas.height/2 - 20, fontFamily: 'Hind Siliguri', fill: '#1e293b', fontSize: 36, fontWeight: '700', textAlign: 'center' }); canvas.add(text); canvas.setActiveObject(text); saveHistory(); }
        function addShape(type) { let shape; const cx = canvas.width/2 - 40, cy = canvas.height/2 - 40; const defaultShadow = new fabric.Shadow({ color: 'rgba(0,0,0,0.15)', blur: 10, offsetX: 3, offsetY: 3 }); if(type === 'rect') shape = new fabric.Rect({ left: cx, top: cy, fill: '#3b82f6', width: 80, height: 80, shadow: defaultShadow }); else if (type === 'rounded-rect') shape = new fabric.Rect({ left: cx, top: cy, fill: '#06b6d4', width: 80, height: 80, rx: 15, ry: 15, shadow: defaultShadow }); else if (type === 'circle') shape = new fabric.Circle({ left: cx, top: cy, fill: '#ec4899', radius: 45, shadow: defaultShadow }); else if (type === 'triangle') shape = new fabric.Triangle({ left: cx, top: cy, fill: '#eab308', width: 80, height: 80, shadow: defaultShadow }); else if (type === 'star') shape = new fabric.Polygon([{x: 40, y: 0}, {x: 49, y: 28}, {x: 78, y: 28}, {x: 54, y: 46}, {x: 63, y: 73}, {x: 40, y: 56}, {x: 17, y: 73}, {x: 26, y: 46}, {x: 2, y: 28}, {x: 31, y: 28}], { left: cx, top: cy, fill: '#a855f7', shadow: defaultShadow }); else if (type === 'hexagon') shape = new fabric.Polygon([{x: 40, y: 0}, {x: 80, y: 20}, {x: 80, y: 60}, {x: 40, y: 80}, {x: 0, y: 60}, {x: 0, y: 20}], { left: cx, top: cy, fill: '#10b981', shadow: defaultShadow }); else if (type === 'heart') { const path = "M 273.514 142.111 C 273.514 142.111 270.81 120.402 248.875 102.59 C 226.941 84.778 198.814 84.778 181.258 101.916 C 181.258 101.916 169.102 113.844 159.25 125.771 C 149.398 113.844 137.242 101.916 137.242 101.916 C 119.686 84.778 91.559 84.778 69.625 102.59 C 47.69 120.402 44.986 142.111 44.986 142.111 C 44.986 142.111 36.884 191.094 65.571 230.134 C 94.258 269.174 159.25 311.968 159.25 311.968 C 159.25 311.968 224.242 269.174 252.929 230.134 C 281.616 191.094 273.514 142.111 273.514 142.111 Z"; shape = new fabric.Path(path, { left: cx, top: cy, fill: '#ef4444', scaleX: 0.3, scaleY: 0.3, shadow: defaultShadow }); } shape.set({ strokeWidth: 0 }); canvas.add(shape); canvas.setActiveObject(shape); toggleShapeMenu(false); saveHistory(); }
        function setImageShape(type) { const obj = canvas.getActiveObject(); if(!obj || !obj.isMainImage) return; let w = obj.width, h = obj.height; if (type === 'original') obj.set('clipPath', null); else if (type === 'square') { let size = Math.min(w, h); const clipPath = new fabric.Rect({ width: size, height: size, originX: 'center', originY: 'center' }); obj.set('clipPath', clipPath); } else if (type === 'rounded') { let size = Math.min(w, h); const clipPath = new fabric.Rect({ width: size, height: size, rx: size * 0.15, ry: size * 0.15, originX: 'center', originY: 'center' }); obj.set('clipPath', clipPath); } else if (type === 'circle') { let size = Math.min(w, h); const clipPath = new fabric.Circle({ radius: size / 2, originX: 'center', originY: 'center' }); obj.set('clipPath', clipPath); } obj.dirty = true; canvas.renderAll(); saveHistory(); }
        function changeColor(hex) { const obj = canvas.getActiveObject(); if(obj && !obj.isMainImage) { obj.set('fill', hex); canvas.renderAll(); } else if (!obj) { canvas.backgroundColor = hex; canvas.renderAll(); } }
        function applyCustomGradient() { const obj = canvas.getActiveObject(), c1 = document.getElementById('grad1').value, c2 = document.getElementById('grad2').value; if(obj && !obj.isMainImage) { const grad = new fabric.Gradient({ type: 'linear', gradientUnits: 'pixels', coords: { x1: 0, y1: 0, x2: obj.width, y2: obj.height }, colorStops:[ { offset: 0, color: c1 }, { offset: 1, color: c2 } ] }); obj.set('fill', grad); canvas.renderAll(); } else if (!obj) { const grad = new fabric.Gradient({ type: 'linear', gradientUnits: 'pixels', coords: { x1: 0, y1: 0, x2: canvas.width, y2: canvas.height }, colorStops:[ { offset: 0, color: c1 }, { offset: 1, color: c2 } ] }); canvas.backgroundColor = grad; canvas.renderAll(); } }
        function changeStroke(color, width) { const obj = canvas.getActiveObject(); if(obj) { let c = color !== null ? color : (obj.customStroke || obj.stroke || '#000000'), w = width !== null ? parseInt(width) : (obj.customStrokeWidth !== undefined ? obj.customStrokeWidth : obj.strokeWidth || 0); if (obj.isMainImage) { obj.set({ customStroke: c, customStrokeWidth: w, strokeWidth: 0 }); obj.dirty = true; } else { obj.set({ stroke: c, strokeWidth: w, customStrokeWidth: 0 }); } document.getElementById('strokeVal').innerText = w; if(width !== null) document.getElementById('strokeWidth').value = w; canvas.renderAll(); } }
        function changeShadow() { const obj = canvas.getActiveObject(); if(obj) { let blur = parseInt(document.getElementById('shadowBlur').value), color = document.getElementById('shadowColor').value; if(blur > 0) { obj.set('shadow', new fabric.Shadow({ color: color, blur: blur, offsetX: blur/2, offsetY: blur/2 })); } else { obj.set('shadow', null); } canvas.renderAll(); } }
        function changeOpacity(val) { const obj = canvas.getActiveObject(); if(obj) { obj.set('opacity', parseFloat(val)); document.getElementById('opValStr').innerText = Math.round(val * 100) + '%'; canvas.renderAll(); } }
        function applyDirectionalOpacity() { const obj = canvas.getActiveObject(); if(!obj) return; const dir = document.getElementById('opacityDirection').value; const amount = parseFloat(document.getElementById('fadeOpacity').value); const fadeColor = document.getElementById('fadeColor').value; if (dir === 'none') { removeLinkedOverlay(obj.id, 'fade'); canvas.renderAll(); return; } applyLinkedOverlay(obj, dir, amount, fadeColor, 'fade'); }
        function applyLinkedOverlay(obj, dir, amount, color, type) { if(!obj.id) obj.id = 'obj_' + Date.now(); removeLinkedOverlay(obj.id, type); let x1 = 0, y1 = 0, x2 = 0, y2 = 0; if (dir === 'right') { x1 = 0; x2 = 1; } else if (dir === 'left') { x1 = 1; x2 = 0; } else if (dir === 'bottom') { y1 = 0; y2 = 1; } else if (dir === 'top') { y1 = 1; y2 = 0; } const alphaColor = hexToRgba(color, 0); const grad = new fabric.Gradient({ type: 'linear', gradientUnits: 'percentage', coords: { x1, y1, x2, y2 }, colorStops: [ { offset: 0, color: alphaColor }, { offset: amount, color: color } ] }); const overlay = new fabric.Rect({ left: obj.left, top: obj.top, width: obj.width, height: obj.height, scaleX: obj.scaleX, scaleY: obj.scaleY, angle: obj.angle, originX: obj.originX, originY: obj.originY, fill: grad, selectable: false, evented: false, isOverlay: true, targetId: obj.id, overlayType: type }); canvas.add(overlay); let objIndex = canvas.getObjects().indexOf(obj); overlay.moveTo(objIndex + 1); canvas.renderAll(); }
        function removeLinkedOverlay(targetId, type) { let overlays = canvas.getObjects().filter(o => o.isOverlay && o.targetId === targetId && o.overlayType === type); overlays.forEach(o => canvas.remove(o)); }
        function hexToRgba(hex, alpha) { let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16); return `rgba(${r}, ${g}, ${b}, ${alpha})`; }
        function deleteObject() { const activeObjects = canvas.getActiveObjects(); if (activeObjects.length) { canvas.discardActiveObject(); activeObjects.forEach(obj => { canvas.remove(obj); }); saveHistory(); handleDeselection(); showToast("Deleted", "success"); } }
        function exportBanner() { canvas.discardActiveObject(); canvas.renderAll(); const dataURL = canvas.toDataURL({ format: 'png', quality: 1, multiplier: 3 }); const link = document.createElement('a'); link.download = 'ProBanner-Export.png'; link.href = dataURL; document.body.appendChild(link); link.click(); document.body.removeChild(link); showToast("Exported!", "success"); }
