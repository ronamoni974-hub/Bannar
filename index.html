<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BannerPro | Premium Advanced Editor</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Anek+Bangla:wght@400;700&family=Baloo+Da+2:wght@500;700&family=Galada&family=Hind+Siliguri:wght@400;600;700&family=Mina:wght@400;700&family=Noto+Sans+Bengali:wght@400;700&family=Tiro+Bangla:ital@0;1&family=Poppins:wght@400;600&family=Pacifico&family=Caveat:wght@400;700&family=Dancing+Script:wght@400;700&family=Lobster&display=swap" rel="stylesheet">

    <script src="templates.js"></script>

    <style>
        body { font-family: 'Poppins', 'Hind Siliguri', sans-serif; height: 100vh; display: flex; flex-direction: column; background-color: #f1f5f9; overflow: hidden; touch-action: manipulation; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        
        .tab-content { display: none; opacity: 0; transition: opacity 0.3s ease; }
        .tab-content.active { display: block; opacity: 1; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .font-item.selected { border-color: #4f46e5; background-color: #eef2ff; color: #4338ca; font-weight: 600; border-width: 2px; }
        .canvas-container { margin: 0 auto; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); border-radius: 4px; overflow: hidden; touch-action: none; }
        .history-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        
        .custom-textarea { resize: none; border: 2px solid #e2e8f0; transition: border-color 0.2s; }
        .custom-textarea:focus { border-color: #6366f1; outline: none; }
        
        .grad-btn:active { transform: scale(0.9); transition: transform 0.1s; }
    </style>
</head>
<body class="text-gray-800 flex flex-col h-screen">

    <header class="bg-white px-4 py-3 flex justify-between items-center z-20 shrink-0 shadow-sm">
        <div class="flex items-center gap-2">
            <div class="bg-indigo-600 p-1.5 rounded-md flex items-center justify-center text-white">
                <i class="fa-solid fa-layer-group text-sm"></i>
            </div>
            <h1 class="text-xl font-bold text-gray-800 tracking-tight">ব্যানার<span class="text-indigo-600">প্রো</span></h1>
        </div>
        
        <div class="flex items-center gap-3">
            <div class="flex gap-2 bg-gray-100 px-3 py-1.5 rounded-full">
                <button id="undoBtn" onclick="undo()" class="history-btn text-gray-700 text-lg active:scale-90 transition-transform" disabled><i class="fa-solid fa-arrow-rotate-left"></i></button>
                <div class="w-px h-5 bg-gray-300 self-center"></div>
                <button id="redoBtn" onclick="redo()" class="history-btn text-gray-700 text-lg active:scale-90 transition-transform" disabled><i class="fa-solid fa-arrow-rotate-right"></i></button>
            </div>
            <button onclick="downloadBanner()" class="bg-indigo-600 hover:bg-indigo-700 active:scale-95 text-white px-4 py-2 rounded-full font-medium transition-all text-sm flex items-center gap-1.5 shadow-md shadow-indigo-200">
                <i class="fa-solid fa-cloud-arrow-down"></i> সেভ
            </button>
        </div>
    </header>

    <main class="flex-none flex items-center justify-center p-3 relative bg-slate-200" style="height: 48vh;">
        <div id="canvasWrapper" class="relative w-full h-full flex items-center justify-center">
            <canvas id="bannerCanvas"></canvas>
        </div>
    </main>

    <div class="flex-1 flex flex-col bg-white rounded-t-2xl shadow-[0_-4px_20px_rgba(0,0,0,0.08)] z-10 overflow-hidden relative -mt-3 pt-2">
        
        <div class="flex px-4 pt-2 border-b border-gray-100 shrink-0 bg-white z-20">
            <button id="templatesTabBtn" onclick="openTab('templatesTab')" class="flex-1 pb-3 text-sm font-semibold text-indigo-600 border-b-2 border-indigo-600 transition-colors">
                <i class="fa-regular fa-clone mr-1"></i> টেমপ্লেট

            <button id="toolsTabBtn" onclick="openTab('toolsTab')" class="flex-1 pb-3 text-sm font-semibold text-gray-400 hover:text-gray-600 transition-colors border-b-2 border-transparent">
                <i class="fa-solid fa-pen-nib mr-1"></i> এডিট টুলস
            </button>
        </div>

        <div class="flex-1 overflow-y-auto pb-32"> <div id="templatesTab" class="tab-content active p-4">
                <div id="templateList" class="grid grid-cols-2 gap-4"></div>
            </div>

            <div id="toolsTab" class="tab-content p-4 space-y-5">
                
                <div class="grid grid-cols-3 gap-3">
                    <button onclick="addText()" class="bg-slate-50 active:bg-slate-100 text-slate-700 py-3 rounded-xl font-medium text-[11px] border border-slate-200 flex flex-col items-center gap-1 transition-colors">
                        <i class="fa-solid fa-font text-lg text-indigo-500"></i> টেক্সট যোগ
                    </button>
                    <label class="bg-slate-50 active:bg-slate-100 text-slate-700 py-3 rounded-xl font-medium text-[11px] border border-slate-200 flex flex-col items-center gap-1 transition-colors cursor-pointer">
                        <i class="fa-regular fa-image text-lg text-emerald-500"></i> ছবি আপলোড
                        <input type="file" id="imageLoader" class="hidden" accept="image/*">
                    </label>
                    <button onclick="deleteObject()" class="bg-red-50 active:bg-red-100 text-red-600 py-3 rounded-xl font-medium text-[11px] border border-red-100 flex flex-col items-center gap-1 transition-colors">
                        <i class="fa-regular fa-trash-can text-lg"></i> মুছুন
                    </button>
                </div>

                <div class="p-3 bg-indigo-50 rounded-xl border border-indigo-100 flex items-center justify-between">
                    <div>
                        <h4 class="text-xs font-bold text-indigo-800">টেম্পলেট ব্যাকগ্রাউন্ড</h4>
                        <p class="text-[9px] text-indigo-600">পুরো ক্যানভাসের রঙ বদলান</p>
                    </div>
                    <div class="relative w-10 h-10 rounded-lg overflow-hidden border-2 border-white shadow-sm">
                        <input type="color" id="bgColorPicker" onchange="changeBgColor(this.value)" class="absolute -top-2 -left-2 w-16 h-16 cursor-pointer">
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-semibold text-gray-400 uppercase tracking-wider mb-2 block pl-1">শেইপ লাইব্রেরি</label>
                    <div class="flex gap-2 overflow-x-auto pb-2 scroll-smooth" style="scrollbar-width: none;">
                        <button onclick="addShape('rect')" class="p-3 bg-white border border-gray-200 rounded-xl shadow-sm text-gray-500 active:bg-gray-50 flex-shrink-0 w-12 flex justify-center"><i class="fa-solid fa-square"></i></button>
                        <button onclick="addShape('circle')" class="p-3 bg-white border border-gray-200 rounded-xl shadow-sm text-gray-500 active:bg-gray-50 flex-shrink-0 w-12 flex justify-center"><i class="fa-solid fa-circle"></i></button>
                        <button onclick="addShape('triangle')" class="p-3 bg-white border border-gray-200 rounded-xl shadow-sm text-gray-500 active:bg-gray-50 flex-shrink-0 w-12 flex justify-center"><i class="fa-solid fa-caret-up text-lg"></i></button>
                        <button onclick="addShape('star')" class="p-3 bg-white border border-gray-200 rounded-xl shadow-sm text-gray-500 active:bg-gray-50 flex-shrink-0 w-12 flex justify-center"><i class="fa-solid fa-star"></i></button>
                        <button onclick="addShape('pentagon')" class="p-3 bg-white border border-gray-200 rounded-xl shadow-sm text-gray-500 active:bg-gray-50 flex-shrink-0 w-12 flex justify-center"><i class="fa-solid fa-shapes"></i></button>
                        <button onclick="addShape('line')" class="p-3 bg-white border border-gray-200 rounded-xl shadow-sm text-gray-500 active:bg-gray-50 flex-shrink-0 w-12 flex justify-center"><i class="fa-solid fa-minus"></i></button>
                    </div>
                </div>

                <div id="noSelectionPanel" class="flex flex-col items-center justify-center py-5 text-center bg-gray-50 rounded-xl border border-dashed border-gray-200">
                    <div class="bg-white p-2 rounded-full shadow-sm mb-2"><i class="fa-solid fa-hand-pointer text-indigo-300"></i></div>
                    <p class="text-[10px] text-gray-400 max-w-[200px]">বিস্তারিত এডিট করতে যেকোনো লেখা বা শেইপে ক্লিক করুন।</p>
                </div>

                <div id="editPanel" class="hidden space-y-5">
                    
                    <div id="textOnlyFeatures" class="space-y-4">
                        <div>
                            <label class="text-[11px] font-semibold text-indigo-600 uppercase tracking-wider mb-1 block pl-1"><i class="fa-solid fa-keyboard"></i> লেখা এডিট করুন</label>
                            <textarea id="externalTextInput" class="w-full custom-textarea rounded-xl p-3 text-sm bg-gray-50 text-gray-800" rows="2" placeholder="টেক্সট লিখুন..."></textarea>
                        </div>

                        <div class="px-1">
                            <div class="flex justify-between items-center mb-1">
                                <label class="text-[10px] font-semibold text-gray-500 uppercase tracking-wider">টেক্সট সাইজ</label>
                                <span id="fontSizeDisplay" class="text-[10px] text-gray-400 font-mono">60</span>
                            </div>
                            <input type="range" id="fontSizeSlider" min="20" max="250" value="60" oninput="changeFontSize(this.value)" onchange="saveHistory()" class="w-full h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-indigo-600">
                        </div>

                        <div id="fontFeature">
                            <label class="text-[11px] font-semibold text-gray-500 uppercase tracking-wider mb-2 block pl-1">ফন্ট স্টাইল</label>
                            <div id="fontListContainer" class="grid grid-cols-2 gap-2 max-h-40 overflow-y-auto px-1 pb-2"></div>
                        </div>
                    </div>

                    <div id="sharedProperties" class="p-3.5 bg-slate-50 rounded-xl border border-slate-100 space-y-4">
                        
                        <div>
                            <label class="text-[10px] font-semibold text-gray-500 uppercase tracking-wider mb-2 block">গ্রেডিয়েন্ট কালার (স্টাইলিশ ফিল)</label>
                            <div class="flex gap-2 overflow-x-auto pb-1" style="scrollbar-width: none;">
                                <button onclick="applyGradient('#ff9a9e', '#fecfef')" class="grad-btn w-8 h-8 rounded-full shadow-sm border border-white flex-shrink-0" style="background: linear-gradient(135deg, #ff9a9e, #fecfef);"></button>
                                <button onclick="applyGradient('#f6d365', '#fda085')" class="grad-btn w-8 h-8 rounded-full shadow-sm border border-white flex-shrink-0" style="background: linear-gradient(135deg, #f6d365, #fda085);"></button>
                                <button onclick="applyGradient('#84fab0', '#8fd3f4')" class="grad-btn w-8 h-8 rounded-full shadow-sm border border-white flex-shrink-0" style="background: linear-gradient(135deg, #84fab0, #8fd3f4);"></button>
                                <button onclick="applyGradient('#a18cd1', '#fbc2eb')" class="grad-btn w-8 h-8 rounded-full shadow-sm border border-white flex-shrink-0" style="background: linear-gradient(135deg, #a18cd1, #fbc2eb);"></button>
                                <button onclick="applyGradient('#ff0844', '#ffb199')" class="grad-btn w-8 h-8 rounded-full shadow-sm border border-white flex-shrink-0" style="background: linear-gradient(135deg, #ff0844, #ffb199);"></button>
                                <button onclick="applyGradient('#30cfd0', '#330867')" class="grad-btn w-8 h-8 rounded-full shadow-sm border border-white flex-shrink-0" style="background: linear-gradient(135deg, #30cfd0, #330867);"></button>
                            </div>
                        </div>

                        <div class="flex justify-between items-center gap-3">
                            <div class="flex-1">
                                <label class="text-[10px] font-semibold text-gray-500 uppercase tracking-wider mb-1 block">সলিড কালার</label>
                                <div class="relative w-full h-8 rounded-lg overflow-hidden border border-gray-200 shadow-sm">
                                    <input type="color" id="colorPicker" onchange="changeColor(this.value)" class="absolute -top-2 -left-2 w-16 h-16 cursor-pointer">
                                </div>
                            </div>
                            <div class="flex-1">
                                <label class="text-[10px] font-semibold text-gray-500 uppercase tracking-wider mb-1 block">বর্ডার কালার</label>
                                <div class="relative w-full h-8 rounded-lg overflow-hidden border border-gray-200 shadow-sm">
                                    <input type="color" id="strokeColorPicker" onchange="changeStrokeColor(this.value)" class="absolute -top-2 -left-2 w-16 h-16 cursor-pointer">
                                </div>
                            </div>
                        </div>
                        
                        <div class="px-1">
                            <div class="flex justify-between items-center mb-1">
                                <label class="text-[10px] font-semibold text-gray-500 uppercase tracking-wider">বর্ডার মোটা/চিকন</label>
                                <span id="strokeWidthDisplay" class="text-[10px] text-gray-400 font-mono">0 px</span>
                            </div>
                            <input type="range" id="strokeWidthSlider" min="0" max="20" value="0" oninput="changeStrokeWidth(this.value)" onchange="saveHistory()" class="w-full h-1 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-indigo-600">
                        </div>

                        <div class="px-1 pb-2">
                            <div class="flex justify-between items-center mb-1">
                                <label class="text-[10px] font-semibold text-gray-500 uppercase tracking-wider">ট্রান্সপারেন্সি</label>
                                <span id="opacityDisplay" class="text-[10px] text-gray-400 font-mono">100%</span>
                            </div>
                            <input type="range" id="opacitySlider" min="0" max="1" step="0.05" value="1" oninput="changeOpacity(this.value)" onchange="saveHistory()" class="w-full h-1 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-indigo-600">
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        const CANVAS_WIDTH = 900;
        const CANVAS_HEIGHT = 1200;

        // --- Fabric Initialization ---
        // Changed to perPixelTargetFind: false for easier selection on mobile
        const canvas = new fabric.Canvas('bannerCanvas', {
            width: CANVAS_WIDTH,
            height: CANVAS_HEIGHT,
            backgroundColor: '#ffffff',
            preserveObjectStacking: true,
            selection: false
        });

        // Layering: Bring to front on click
        canvas.on('mouse:down', function(options) {
            const obj = options.target;
            if (obj && obj.selectable) {
                obj.bringToFront();
                canvas.setActiveObject(obj);
                canvas.requestRenderAll();
                saveHistory();
            }
        });

        // --- Undo/Redo Engine ---
        let historyData = [];
        let historyIndex = -1;
        let isTrackingHistory = false;

        function saveHistory() {
            if (!isTrackingHistory) return;
            historyData = historyData.slice(0, historyIndex + 1);
            historyData.push(JSON.stringify(canvas.toJSON()));
            historyIndex++;
            updateHistoryButtons();
        }

        function updateHistoryButtons() {
            document.getElementById('undoBtn').disabled = historyIndex <= 0;
            document.getElementById('redoBtn').disabled = historyIndex >= historyData.length - 1;
        }

        function undo() {
            if (historyIndex > 0) {
                isTrackingHistory = false;
                historyIndex--;
                canvas.loadFromJSON(historyData[historyIndex], function() {
                    canvas.renderAll();
                    isTrackingHistory = true;
                    updateHistoryButtons();
                });
            }
        }

        function redo() {
            if (historyIndex < historyData.length - 1) {
                isTrackingHistory = false;
                historyIndex++;
                canvas.loadFromJSON(historyData[historyIndex], function() {
                    canvas.renderAll();
                    isTrackingHistory = true;
                    updateHistoryButtons();
                });
            }
        }

        canvas.on('object:modified', saveHistory);
        canvas.on('object:added', saveHistory);
        canvas.on('object:removed', saveHistory);

        // --- Text Editor & Resizing ---
        const textInput = document.getElementById('externalTextInput');
        const fontSizeSlider = document.getElementById('fontSizeSlider');
        const fontSizeDisplay = document.getElementById('fontSizeDisplay');
        
        canvas.on('object:added', function(e) {
            if(e.target.type === 'i-text') e.target.set({ editable: false });
        });

        textInput.addEventListener('input', function(e) {
            const obj = canvas.getActiveObject();
            if (obj && obj.type === 'i-text') {
                obj.set('text', e.target.value);
                canvas.requestRenderAll();
            }
        });
        textInput.addEventListener('change', saveHistory);

        function changeFontSize(value) {
            const obj = canvas.getActiveObject();
            if (obj && obj.type === 'i-text') {
                obj.set('fontSize', parseInt(value));
                fontSizeDisplay.innerText = value;
                canvas.requestRenderAll();
            }
        }

        function resizeCanvas() {
            const wrapper = document.getElementById('canvasWrapper');
            const padding = 20; 
            const scaleX = (wrapper.clientWidth - padding) / CANVAS_WIDTH;
            const scaleY = (wrapper.clientHeight - padding) / CANVAS_HEIGHT;
            const scale = Math.min(scaleX, scaleY); 
            canvas.setZoom(scale);
            canvas.setWidth(CANVAS_WIDTH * scale);
            canvas.setHeight(CANVAS_HEIGHT * scale);
        }
        window.addEventListener('resize', resizeCanvas);
        setTimeout(resizeCanvas, 100);

        // --- Change Background Color Function ---
        function changeBgColor(color) {
            isTrackingHistory = false;
            canvas.backgroundColor = color;
            
            // Also update the base rectangle if it exists (Template background)
            const objects = canvas.getObjects();
            if (objects.length > 0 && objects[0].type === 'rect' && !objects[0].selectable) {
                objects[0].set('fill', color);
            }
            
            canvas.requestRenderAll();
            isTrackingHistory = true;
            saveHistory();
        }

        // --- Shapes Library ---
        function addShape(type) {
            const center = canvas.getCenter();
            const commonProps = { left: center.left, top: center.top, originX: 'center', originY: 'center', fill: '#cbd5e1', stroke: '#111827', strokeWidth: 0, opacity: 1 };
            let shape;
            if (type === 'rect') shape = new fabric.Rect({ ...commonProps, width: 200, height: 200, rx: 15, ry: 15 });
            else if (type === 'circle') shape = new fabric.Circle({ ...commonProps, radius: 100 });
            else if (type === 'triangle') shape = new fabric.Triangle({ ...commonProps, width: 200, height: 200 });
            else if (type === 'star') shape = new fabric.Polygon([{x: 100, y: 10}, {x: 40, y: 198}, {x: 190, y: 78}, {x: 10, y: 78}, {x: 160, y: 198}], { ...commonProps });
            else if (type === 'pentagon') shape = new fabric.Polygon([{x: 100, y: 0}, {x: 200, y: 75}, {x: 160, y: 200}, {x: 40, y: 200}, {x: 0, y: 75}], { ...commonProps });
            else if (type === 'line') shape = new fabric.Line([0, 0, 300, 0], { ...commonProps, stroke: '#111827', strokeWidth: 8, fill: '' });

            if (shape) {
                canvas.add(shape);
                shape.bringToFront();
                canvas.setActiveObject(shape);
                saveHistory();
            }
        }

        // --- Advanced Styling Functions ---
        function changeColor(color) {
            const obj = canvas.getActiveObject();
            if (obj) { obj.set("fill", color); canvas.requestRenderAll(); saveHistory(); }
        }
        function changeStrokeColor(color) {
            const obj = canvas.getActiveObject();
            if (obj) { obj.set("stroke", color); canvas.requestRenderAll(); saveHistory(); }
        }
        function changeStrokeWidth(value) {
            const obj = canvas.getActiveObject();
            if (obj) { 
                obj.set("strokeWidth", parseInt(value)); 
                document.getElementById('strokeWidthDisplay').innerText = value + ' px';
                canvas.requestRenderAll(); 
            }
        }
        function changeOpacity(value) {
            const obj = canvas.getActiveObject();
            if (obj) { 
                obj.set("opacity", parseFloat(value)); 
                document.getElementById('opacityDisplay').innerText = Math.round(value * 100) + '%';
                canvas.requestRenderAll(); 
            }
        }
        function applyGradient(color1, color2) {
            const obj = canvas.getActiveObject();
            if (!obj) return;
            let grad = new fabric.Gradient({
                type: 'linear', gradientUnits: 'percentage',
                coords: { x1: 0, y1: 0, x2: 1, y2: 1 },
                colorStops: [ { offset: 0, color: color1 }, { offset: 1, color: color2 } ]
            });
            obj.set('fill', grad);
            canvas.requestRenderAll();
            saveHistory();
        }

        // --- FIX: Advanced Relative Image Upload ---
        document.getElementById('imageLoader').addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function (event) {
                const targetObj = canvas.getActiveObject();
                
                fabric.Image.fromURL(event.target.result, function(img) {
                    isTrackingHistory = false;

                    // If a valid mask shape is selected (Circle, Rect, Triangle)
                    if (targetObj && targetObj.selectable && (targetObj.type === 'circle' || targetObj.type === 'rect' || targetObj.type === 'triangle' || targetObj.type === 'polygon')) {
                        
                        // Calculate bounding dimensions based on scale
                        let boundWidth = targetObj.width * targetObj.scaleX;
                        let boundHeight = targetObj.height * targetObj.scaleY;
                        if(targetObj.type === 'circle') boundWidth = boundHeight = targetObj.radius * 2 * targetObj.scaleX;
                        
                        // Set Image base scale to fit the shape bounds
                        let imgScale = Math.max(boundWidth / img.width, boundHeight / img.height);
                        
                        img.set({
                            left: targetObj.left, top: targetObj.top,
                            originX: targetObj.originX, originY: targetObj.originY,
                            scaleX: imgScale, scaleY: imgScale,
                            selectable: true, evented: true // Force selection availability
                        });

                        // Create RELATIVE ClipPath (Solves selection bug)
                        let clipShape;
                        let invScaleX = 1 / imgScale;
                        let invScaleY = 1 / imgScale;

                        if(targetObj.type === 'circle') {
                            clipShape = new fabric.Circle({ radius: (boundWidth/2) * invScaleX, originX: 'center', originY: 'center' });
                        } else if(targetObj.type === 'rect') {
                            clipShape = new fabric.Rect({ width: boundWidth * invScaleX, height: boundHeight * invScaleY, rx: targetObj.rx * invScaleX, ry: targetObj.ry * invScaleY, originX: 'center', originY: 'center' });
                        } else if(targetObj.type === 'triangle') {
                            clipShape = new fabric.Triangle({ width: boundWidth * invScaleX, height: boundHeight * invScaleY, originX: 'center', originY: 'center' });
                        }

                        if(clipShape) {
                            img.set({ clipPath: clipShape });
                        }

                        canvas.remove(targetObj);
                        canvas.add(img);
                        img.bringToFront();
                        canvas.setActiveObject(img);

                    } else {
                        // Regular image insert
                        const scale = (CANVAS_WIDTH * 0.4) / img.width; 
                        img.set({ left: CANVAS_WIDTH/2, top: CANVAS_HEIGHT/2, originX: 'center', originY: 'center', scaleX: scale, scaleY: scale });
                        canvas.add(img);
                        img.bringToFront();
                        canvas.setActiveObject(img);
                    }

                    e.target.value = ''; 
                    isTrackingHistory = true; 
                    saveHistory(); 
                });
            }
            reader.readAsDataURL(file);
        });

        // --- Templates Logic ---
        function initTemplates() {
            const list = document.getElementById('templateList');
            if (window.bannerTemplates) {
                window.bannerTemplates.forEach(template => {
                    const btn = document.createElement('button');
                    btn.className = "flex flex-col bg-white border border-slate-200 rounded-xl overflow-hidden active:scale-95 transition-transform shadow-sm hover:shadow-md text-left";
                    btn.onclick = () => loadTemplate(template.id);
                    let previewHTML = '';
                    let textCount = 0;
                    template.data.objects.forEach(obj => {
                        if (obj.type === 'circle') previewHTML += `<div style="width: 40px; height: 40px; border-radius: 50%; background-color: ${obj.fill === 'transparent' ? 'transparent' : '#ffffff'}; border: 2px solid ${obj.stroke || 'transparent'}; margin: 5px auto;"></div>`;
                        else if (obj.type === 'i-text' && textCount < 3) { previewHTML += `<div style="color: ${obj.fill}; font-size: 8px; font-weight: bold; margin-top: 3px; text-align: center; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 0 4px;">${obj.text}</div>`; textCount++; }
                    });
                    if(previewHTML === '') previewHTML = `<div class="w-10 h-10 rounded-full bg-white/30 mb-2"></div><div class="w-2/3 h-1.5 bg-white/50 rounded-full"></div>`;
                    btn.innerHTML = `
                        <div style="background-color: ${template.bgColor}" class="w-full aspect-[3/4] flex flex-col items-center justify-center p-2 relative overflow-hidden">${previewHTML}</div>
                        <div class="p-2.5 w-full bg-white border-t border-slate-100">
                            <span class="text-[9px] font-bold text-indigo-500 uppercase tracking-wide">ID: ${template.id}</span>
                            <h3 class="text-[11px] font-semibold text-gray-800 mt-0.5 truncate">${template.name}</h3>
                        </div>
                    `;
                    list.appendChild(btn);
                });
                loadTemplate(1); 
            }
        }
        window.onload = initTemplates;
        function loadTemplate(id) {
            const template = window.bannerTemplates.find(t => t.id === id);
            if (!template) return;
            isTrackingHistory = false;
            canvas.loadFromJSON(JSON.stringify(template.data), () => {
                canvas.getObjects().forEach(obj => { if(obj.type === 'i-text') obj.set({ editable: false }); });
                
                // Set external BG color picker to template background
                document.getElementById('bgColorPicker').value = template.bgColor || '#ffffff';
                
                canvas.requestRenderAll();
                openTab('toolsTab');
                onSelectionCleared();
                historyData = [JSON.stringify(canvas.toJSON())]; historyIndex = 0; isTrackingHistory = true; updateHistoryButtons();
            });
        }

        // --- Advance Fonts & UI ---
        const fontCollection = [
            { name: 'আনেক বাংলা', family: 'Anek Bangla' }, { name: 'বালু দা ২', family: 'Baloo Da 2' },
            { name: 'গালাদা', family: 'Galada' }, { name: 'হিন্দ শিলিগুড়ি', family: 'Hind Siliguri' },
            { name: 'তীরো বাংলা', family: 'Tiro Bangla' }, { name: 'মিনা', family: 'Mina' },
            { name: 'নোটো সান্স', family: 'Noto Sans Bengali' }, { name: 'Poppins', family: 'Poppins' },
            { name: 'Pacifico', family: 'Pacifico' }, { name: 'Caveat', family: 'Caveat' },
            { name: 'Dancing Script', family: 'Dancing Script' }, { name: 'Lobster', family: 'Lobster' }
        ];
        function initFonts() {
            const container = document.getElementById('fontListContainer');
            fontCollection.forEach(font => {
                const div = document.createElement('div');
                div.className = "font-item cursor-pointer border border-slate-200 rounded-lg py-2.5 px-2 text-center text-[11px] transition-colors text-slate-700 truncate";
                div.style.fontFamily = `'${font.family}', sans-serif`;
                div.innerText = font.name;
                div.onclick = () => {
                    document.querySelectorAll('.font-item').forEach(el => el.classList.remove('selected'));
                    div.classList.add('selected');
                    const activeObj = canvas.getActiveObject();
                    if(activeObj && activeObj.type === 'i-text') { activeObj.set('fontFamily', font.family); canvas.requestRenderAll(); saveHistory(); }
                };
                container.appendChild(div);
            });
        }
        initFonts();
        function openTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            const btnClassInactive = "flex-1 pb-3 text-sm font-semibold text-gray-400 hover:text-gray-600 transition-colors border-b-2 border-transparent";
            const btnClassActive = "flex-1 pb-3 text-sm font-semibold text-indigo-600 border-b-2 border-indigo-600 transition-colors";
            document.getElementById('templatesTabBtn').className = btnClassInactive;
            document.getElementById('toolsTabBtn').className = btnClassInactive;
            document.getElementById(tabId + 'Btn').className = btnClassActive;
        }

        // --- Dynamic Display Panel on Selection ---
        canvas.on('selection:created', onObjectSelected);
        canvas.on('selection:updated', onObjectSelected);
        canvas.on('selection:cleared', onSelectionCleared);

        function onObjectSelected(e) {
            if (canvas.getActiveObjects().length > 1) { onSelectionCleared(); return; }
            const obj = canvas.getActiveObject();
            document.getElementById('noSelectionPanel').classList.add('hidden');
            document.getElementById('editPanel').classList.remove('hidden');
            
            // Set Sliders
            document.getElementById('opacitySlider').value = obj.opacity !== undefined ? obj.opacity : 1;
            document.getElementById('opacityDisplay').innerText = Math.round((obj.opacity !== undefined ? obj.opacity : 1) * 100) + '%';
            document.getElementById('strokeWidthSlider').value = obj.strokeWidth || 0;
            document.getElementById('strokeWidthDisplay').innerText = (obj.strokeWidth || 0) + ' px';
            
            if (obj.stroke && typeof obj.stroke === 'string' && !obj.stroke.startsWith('url')) {
                document.getElementById('strokeColorPicker').value = obj.stroke;
            } else { document.getElementById('strokeColorPicker').value = '#111827'; }
            
            // Text vs Shape logic
            if (obj.type === 'i-text') {
                document.getElementById('textOnlyFeatures').classList.remove('hidden');
                textInput.value = obj.text;
                fontSizeSlider.value = obj.fontSize;
                fontSizeDisplay.innerText = obj.fontSize;
                if (obj.fill && typeof obj.fill === 'string' && !obj.fill.startsWith('url')) {
                    document.getElementById('colorPicker').value = obj.fill;
                }
            } else {
                document.getElementById('textOnlyFeatures').classList.add('hidden');
                if (obj.fill && typeof obj.fill === 'string' && !obj.fill.startsWith('url')) {
                    document.getElementById('colorPicker').value = obj.fill;
                }
            }
        }
        function onSelectionCleared() {
            document.getElementById('editPanel').classList.add('hidden');
            document.getElementById('noSelectionPanel').classList.remove('hidden');
        }
        function addText() {
            const center = canvas.getCenter();
            const text = new fabric.IText('আপনার লেখা', { 
                left: center.left, top: center.top, originX: 'center', originY: 'center',
                fontFamily: 'Hind Siliguri', fontSize: 60, fill: '#1e293b', editable: false
            });
            canvas.add(text);
            text.bringToFront();
            canvas.setActiveObject(text);
            saveHistory();
        }
        function deleteObject() {
            const activeObjects = canvas.getActiveObjects();
            if (activeObjects.length) {
                activeObjects.forEach(obj => canvas.remove(obj));
                canvas.discardActiveObject(); saveHistory();
            } else { alert('প্রথমে ক্যানভাস থেকে কিছু সিলেক্ট করুন'); }
        }
        function downloadBanner() {
            canvas.discardActiveObject(); canvas.requestRenderAll();
            const dataURL = canvas.toDataURL({ format: 'jpeg', quality: 1, multiplier: 2 }); 
            const link = document.createElement('a'); link.href = dataURL; link.download = `BannerPro_${new Date().getTime()}.jpg`; link.click();
        }
    </script>
</body>
</html>
