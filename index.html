<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProBanner - Banner Maker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .canvas-container { margin: 0 auto; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="bg-gray-100 h-screen overflow-hidden text-gray-800">

    <div id="homeScreen" class="h-full w-full flex flex-col bg-white overflow-y-auto">
        <header class="p-6 flex justify-between items-center shadow-sm">
            <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-purple-600">ProBanner</h1>
            <button onclick="openEditor()" class="bg-blue-600 text-white px-6 py-2 rounded-full font-medium hover:bg-blue-700 transition">Create Blank</button>
        </header>

        <div class="flex flex-col items-center justify-center mt-12 px-4">
            <h2 class="text-4xl font-bold mb-6 text-center">What will you design today?</h2>
            <div class="relative w-full max-w-2xl">
                <input type="text" placeholder="Search for templates (e.g., YouTube Banner, Facebook Post)..." class="w-full pl-12 pr-4 py-4 rounded-full border-2 border-gray-200 focus:border-blue-500 focus:outline-none shadow-sm text-lg">
                <i class="fas fa-search absolute left-5 top-5 text-gray-400 text-xl"></i>
            </div>
        </div>

        <div class="max-w-6xl mx-auto w-full px-6 mt-16">
            <h3 class="text-xl font-semibold mb-4">Categories</h3>
            <div class="flex gap-4 overflow-x-auto pb-4">
                <button class="px-6 py-3 bg-gray-100 rounded-lg hover:bg-gray-200 whitespace-nowrap"><i class="fas fa-laptop mr-2 text-blue-500"></i>Web Banner</button>
                <button class="px-6 py-3 bg-gray-100 rounded-lg hover:bg-gray-200 whitespace-nowrap"><i class="fab fa-youtube mr-2 text-red-500"></i>Thumbnail</button>
                <button class="px-6 py-3 bg-gray-100 rounded-lg hover:bg-gray-200 whitespace-nowrap"><i class="fab fa-facebook mr-2 text-blue-700"></i>FB Cover</button>
                <button class="px-6 py-3 bg-gray-100 rounded-lg hover:bg-gray-200 whitespace-nowrap"><i class="fab fa-instagram mr-2 text-pink-500"></i>Insta Post</button>
            </div>

            <h3 class="text-xl font-semibold mt-10 mb-4">Trending Templates</h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-gray-200 h-48 rounded-xl cursor-pointer hover:shadow-lg transition flex items-center justify-center" onclick="openEditor()">
                    <span class="text-gray-500">Tech Banner</span>
                </div>
                <div class="bg-gray-200 h-48 rounded-xl cursor-pointer hover:shadow-lg transition flex items-center justify-center" onclick="openEditor()">
                    <span class="text-gray-500">Sale Promo</span>
                </div>
                <div class="bg-gray-200 h-48 rounded-xl cursor-pointer hover:shadow-lg transition flex items-center justify-center" onclick="openEditor()">
                    <span class="text-gray-500">Event Poster</span>
                </div>
            </div>
        </div>
    </div>

    <div id="editorScreen" class="h-full w-full flex flex-col hidden bg-gray-100">
        <div class="h-16 bg-white border-b flex items-center justify-between px-6 shadow-sm z-10">
            <div class="flex items-center gap-4">
                <button onclick="closeEditor()" class="text-gray-500 hover:text-gray-800"><i class="fas fa-arrow-left text-xl"></i></button>
                <h1 class="text-xl font-bold text-gray-800">Untitled Banner</h1>
            </div>
            
            <div class="flex items-center gap-4">
                <button class="text-gray-600 hover:text-blue-600 p-2" title="Undo"><i class="fas fa-undo"></i></button>
                <button class="text-gray-600 hover:text-blue-600 p-2" title="Redo"><i class="fas fa-redo"></i></button>
                <button class="bg-gray-100 text-gray-700 px-4 py-2 rounded-md hover:bg-gray-200 font-medium">Save</button>
                <button onclick="exportBanner()" class="bg-gradient-to-r from-blue-600 to-purple-600 text-white px-5 py-2 rounded-md hover:opacity-90 font-medium shadow-md">
                    <i class="fas fa-download mr-2"></i>Export
                </button>
            </div>
        </div>

        <div class="flex-1 flex overflow-hidden relative">
            
            <div class="flex-1 flex justify-center items-center bg-gray-100 overflow-auto p-8" id="canvas-wrapper">
                <canvas id="bannerCanvas"></canvas>
            </div>

            <div id="propertiesPanel" class="absolute top-4 right-4 bg-white p-4 rounded-lg shadow-lg hidden flex-col gap-3 z-10">
                <h4 class="text-sm font-semibold text-gray-500 uppercase">Properties</h4>
                <div class="flex items-center gap-2">
                    <label class="text-sm">Color:</label>
                    <input type="color" id="itemColor" onchange="changeColor(this.value)" class="w-8 h-8 rounded cursor-pointer border-none">
                </div>
                <div class="flex items-center gap-2">
                    <label class="text-sm">Opacity:</label>
                    <input type="range" id="itemOpacity" min="0" max="1" step="0.1" value="1" onchange="changeOpacity(this.value)" class="w-24">
                </div>
                <button onclick="deleteObject()" class="text-red-500 text-sm flex items-center gap-1 mt-2 hover:bg-red-50 p-1 rounded">
                    <i class="fas fa-trash"></i> Delete
                </button>
            </div>
        </div>

        <div class="h-20 bg-white border-t flex items-center justify-center gap-8 shadow-md z-10 px-4 overflow-x-auto">
            <button onclick="addText()" class="flex flex-col items-center text-gray-600 hover:text-blue-600 p-2 transition">
                <i class="fas fa-font text-2xl mb-1"></i>
                <span class="text-xs font-medium">Text</span>
            </button>
            
            <input type="file" id="imageInput" class="hidden" accept="image/*" onchange="addImage(event)">
            <button onclick="document.getElementById('imageInput').click()" class="flex flex-col items-center text-gray-600 hover:text-blue-600 p-2 transition">
                <i class="fas fa-image text-2xl mb-1"></i>
                <span class="text-xs font-medium">Image</span>
            </button>
            
            <button onclick="addShape('rect')" class="flex flex-col items-center text-gray-600 hover:text-blue-600 p-2 transition">
                <i class="fas fa-square text-2xl mb-1"></i>
                <span class="text-xs font-medium">Square</span>
            </button>

            <button onclick="addShape('circle')" class="flex flex-col items-center text-gray-600 hover:text-blue-600 p-2 transition">
                <i class="fas fa-circle text-2xl mb-1"></i>
                <span class="text-xs font-medium">Circle</span>
            </button>

            <div class="w-px h-10 bg-gray-300 mx-2"></div> <div class="flex flex-col items-center justify-center">
                <input type="color" id="bgColor" onchange="changeBgColor(this.value)" value="#ffffff" class="w-8 h-8 rounded cursor-pointer border-0 p-0">
                <span class="text-xs font-medium text-gray-600 mt-1">Background</span>
            </div>
        </div>
    </div>

    <script>
        // Screen Navigation
        const homeScreen = document.getElementById('homeScreen');
        const editorScreen = document.getElementById('editorScreen');
        
        function openEditor() {
            homeScreen.classList.add('hidden');
            editorScreen.classList.remove('hidden');
            initCanvas(); // Initialize canvas when editor opens
        }

        function closeEditor() {
            editorScreen.classList.add('hidden');
            homeScreen.classList.remove('hidden');
        }

        // Fabric.js Canvas Initialization
        let canvas;
        function initCanvas() {
            if(!canvas) {
                canvas = new fabric.Canvas('bannerCanvas', {
                    width: 800,
                    height: 450, // 16:9 ratio
                    backgroundColor: '#ffffff'
                });

                // Event listener to show/hide properties panel when object is selected
                canvas.on('selection:created', showProperties);
                canvas.on('selection:updated', showProperties);
                canvas.on('selection:cleared', hideProperties);
            }
        }

        // --- Tools Functions ---

        function addText() {
            const text = new fabric.IText('Double Click to Edit', {
                left: 100,
                top: 100,
                fontFamily: 'Inter',
                fill: '#333333',
                fontSize: 40
            });
            canvas.add(text);
            canvas.setActiveObject(text);
        }

        function addShape(type) {
            let shape;
            if(type === 'rect') {
                shape = new fabric.Rect({
                    left: 150, top: 150, fill: '#3b82f6', width: 100, height: 100, rx: 10, ry: 10
                });
            } else if (type === 'circle') {
                shape = new fabric.Circle({
                    left: 150, top: 150, fill: '#ec4899', radius: 50
                });
            }
            canvas.add(shape);
            canvas.setActiveObject(shape);
        }

        function addImage(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(f) {
                const data = f.target.result;
                fabric.Image.fromURL(data, function(img) {
                    img.scaleToWidth(300);
                    canvas.add(img);
                    canvas.centerObject(img);
                    canvas.setActiveObject(img);
                });
            };
            reader.readAsDataURL(file);
        }

        function changeBgColor(color) {
            canvas.backgroundColor = color;
            canvas.renderAll();
        }

        // --- Properties Panel Functions ---
        const propPanel = document.getElementById('propertiesPanel');
        const colorPicker = document.getElementById('itemColor');
        const opacitySlider = document.getElementById('itemOpacity');

        function showProperties(e) {
            const activeObj = e.selected[0];
            propPanel.classList.remove('hidden');
            propPanel.classList.add('flex');
            
            if(activeObj.fill) colorPicker.value = activeObj.fill;
            opacitySlider.value = activeObj.opacity || 1;
        }

        function hideProperties() {
            propPanel.classList.add('hidden');
            propPanel.classList.remove('flex');
        }

        function changeColor(color) {
            const activeObj = canvas.getActiveObject();
            if(activeObj) {
                if(activeObj.type === 'i-text') {
                    activeObj.set('fill', color);
                } else {
                    activeObj.set('fill', color);
                }
                canvas.renderAll();
            }
        }

        function changeOpacity(val) {
            const activeObj = canvas.getActiveObject();
            if(activeObj) {
                activeObj.set('opacity', parseFloat(val));
                canvas.renderAll();
            }
        }

        function deleteObject() {
            const activeObjects = canvas.getActiveObjects();
            if (activeObjects.length) {
                canvas.discardActiveObject();
                activeObjects.forEach(function(object) {
                    canvas.remove(object);
                });
            }
        }

        // --- Export Function ---
        function exportBanner() {
            // Deselect objects so bounding boxes don't show in export
            canvas.discardActiveObject();
            canvas.renderAll();

            const dataURL = canvas.toDataURL({
                format: 'png',
                quality: 1
            });
            const link = document.createElement('a');
            link.download = 'my-banner.png';
            link.href = dataURL;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // Add support for keyboard Delete key
        window.addEventListener('keydown', function(e) {
            if(e.key === 'Delete' || e.key === 'Backspace') {
                // Prevent deleting if editing text
                if(canvas.getActiveObject() && !canvas.getActiveObject().isEditing) {
                    deleteObject();
                }
            }
        });
    </script>
</body>
</html>
