<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BannerPro | Premium Canvas Editor</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Anek+Bangla:wght@400;700&family=Baloo+Da+2:wght@500;700&family=Galada&family=Hind+Siliguri:wght@400;600;700&family=Mina:wght@400;700&family=Noto+Sans+Bengali:wght@400;700&family=Tiro+Bangla:ital@0;1&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

    <script src="templates.js"></script>

    <style>
        body { font-family: 'Poppins', 'Hind Siliguri', sans-serif; height: 100vh; display: flex; flex-direction: column; background-color: #f1f5f9; overflow: hidden; touch-action: manipulation; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        
        /* Smooth UI Transitions */
        .tab-content { display: none; opacity: 0; transition: opacity 0.3s ease; }
        .tab-content.active { display: block; opacity: 1; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .font-item.selected { border-color: #4f46e5; background-color: #eef2ff; color: #4338ca; font-weight: 600; }
        
        /* Premium Canvas Shadow */
        .canvas-container { margin: 0 auto; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1); border-radius: 4px; overflow: hidden; touch-action: none; }
        
        /* Undo/Redo Disabled State */
        .history-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        
        /* Bottom Sheet Feel */
        .bottom-panel { border-top-left-radius: 20px; border-top-right-radius: 20px; box-shadow: 0 -4px 20px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="text-gray-800 flex flex-col h-screen">

    <header class="bg-white px-4 py-3 flex justify-between items-center z-20 shrink-0 shadow-sm">
        <div class="flex items-center gap-2">
            <div class="bg-indigo-600 p-1.5 rounded-md flex items-center justify-center text-white">
                <i class="fa-solid fa-layer-group text-sm"></i>
            </div>
            <h1 class="text-xl font-bold text-gray-800 tracking-tight">ব্যানার<span class="text-indigo-600">প্রো</span></h1>
        </div>
        
        <div class="flex items-center gap-4">
            <div class="flex gap-3 bg-gray-100 px-3 py-1.5 rounded-full">
                <button id="undoBtn" onclick="undo()" class="history-btn text-gray-700 text-lg active:scale-90 transition-transform" disabled><i class="fa-solid fa-arrow-rotate-left"></i></button>
                <div class="w-px h-5 bg-gray-300 self-center"></div>
                <button id="redoBtn" onclick="redo()" class="history-btn text-gray-700 text-lg active:scale-90 transition-transform" disabled><i class="fa-solid fa-arrow-rotate-right"></i></button>
            </div>
            <button onclick="downloadBanner()" class="bg-indigo-600 hover:bg-indigo-700 active:scale-95 text-white px-4 py-2 rounded-full font-medium transition-all text-sm flex items-center gap-1.5 shadow-md shadow-indigo-200">
                <i class="fa-solid fa-cloud-arrow-down"></i> সেভ
            </button>
        </div>
    </header>

    <main class="flex-none flex items-center justify-center p-3 relative bg-slate-200" style="height: 48vh;">
        <div id="canvasWrapper" class="relative w-full h-full flex items-center justify-center">
            <canvas id="bannerCanvas"></canvas>
        </div>
    </main>

    <div class="flex-1 flex flex-col bg-white bottom-panel z-10 overflow-hidden relative -mt-3 pt-2">
        
        <div class="flex px-4 pt-2 border-b border-gray-100">
            <button id="templatesTabBtn" onclick="openTab('templatesTab')" class="flex-1 pb-3 text-sm font-semibold text-indigo-600 border-b-2 border-indigo-600 transition-colors">
                <i class="fa-regular fa-clone mr-1"></i> টেমপ্লেট
            </button>
            <button id="toolsTabBtn" onclick="openTab('toolsTab')" class="flex-1 pb-3 text-sm font-semibold text-gray-400 hover:text-gray-600 transition-colors">
                <i class="fa-solid fa-pen-nib mr-1"></i> এডিট টুলস
            </button>
        </div>

        <div class="flex-1 overflow-y-auto pb-6 custom-scroll">
            
            <div id="templatesTab" class="tab-content active p-4">
                <div id="templateList" class="grid grid-cols-2 gap-4">
                    </div>
            </div>

            <div id="toolsTab" class="tab-content p-4 space-y-6">
                
                <div class="grid grid-cols-3 gap-3">
                    <button onclick="addText()" class="bg-slate-50 active:bg-slate-100 text-slate-700 py-3.5 rounded-xl font-medium text-xs border border-slate-200 flex flex-col items-center gap-1.5 transition-colors">
                        <i class="fa-solid fa-font text-lg text-indigo-500"></i> টেক্সট যোগ
                    </button>
                    <label class="bg-slate-50 active:bg-slate-100 text-slate-700 py-3.5 rounded-xl font-medium text-xs border border-slate-200 flex flex-col items-center gap-1.5 transition-colors cursor-pointer">
                        <i class="fa-regular fa-image text-lg text-emerald-500"></i> ছবি আপলোড
                        <input type="file" id="imageLoader" class="hidden" accept="image/*">
                    </label>
                    <button onclick="deleteObject()" class="bg-red-50 active:bg-red-100 text-red-600 py-3.5 rounded-xl font-medium text-xs border border-red-100 flex flex-col items-center gap-1.5 transition-colors">
                        <i class="fa-regular fa-trash-can text-lg"></i> মুছে ফেলুন
                    </button>
                </div>

                <div id="noSelectionPanel" class="flex flex-col items-center justify-center py-8 text-center bg-gray-50 rounded-xl border border-dashed border-gray-200">
                    <div class="bg-white p-3 rounded-full shadow-sm mb-2"><i class="fa-solid fa-hand-pointer text-indigo-300 text-xl"></i></div>
                    <h3 class="text-sm font-semibold text-gray-700 mb-1">কিছু সিলেক্ট করা নেই</h3>
                    <p class="text-xs text-gray-400 max-w-[200px]">এডিট করতে ক্যানভাসের ওপরের যেকোনো লেখা বা ছবিতে ক্লিক করুন।</p>
                </div>

                <div id="textEditPanel" class="hidden space-y-5">
                    
                    <div class="p-4 bg-slate-50 rounded-xl border border-slate-100 space-y-4">
                        <div class="flex justify-between items-center gap-4">
                            <div class="flex-1">
                                <label class="text-[11px] font-semibold text-gray-500 uppercase tracking-wider mb-1.5 block">রঙ পরিবর্তন</label>
                                <div class="relative w-full h-10 rounded-lg overflow-hidden border border-gray-200 shadow-sm">
                                    <input type="color" id="colorPicker" onchange="changeColor(this.value)" class="absolute -top-2 -left-2 w-16 h-16 cursor-pointer">
                                </div>
                            </div>
                            <div class="text-properties flex-1">
                                <label class="text-[11px] font-semibold text-gray-500 uppercase tracking-wider mb-1.5 block">এলাইনমেন্ট</label>
                                <div class="flex gap-1 bg-white border border-gray-200 rounded-lg p-1 shadow-sm">
                                    <button onclick="changeAlignment('left')" class="flex-1 py-1.5 rounded bg-white text-gray-600 active:bg-gray-100"><i class="fa-solid fa-align-left"></i></button>
                                    <button onclick="changeAlignment('center')" class="flex-1 py-1.5 rounded bg-white text-gray-600 active:bg-gray-100"><i class="fa-solid fa-align-center"></i></button>
                                    <button onclick="changeAlignment('right')" class="flex-1 py-1.5 rounded bg-white text-gray-600 active:bg-gray-100"><i class="fa-solid fa-align-right"></i></button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="text-properties">
                        <label class="text-[11px] font-semibold text-gray-500 uppercase tracking-wider mb-2 block pl-1">ফন্ট স্টাইল</label>
                        <div id="fontListContainer" class="grid grid-cols-2 gap-2 max-h-40 overflow-y-auto px-1 pb-2">
                            </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        const CANVAS_WIDTH = 900;
        const CANVAS_HEIGHT = 1200;

        // --- Fabric Initialization ---
        const canvas = new fabric.Canvas('bannerCanvas', {
            width: CANVAS_WIDTH,
            height: CANVAS_HEIGHT,
            backgroundColor: '#ffffff',
            preserveObjectStacking: true
        });

        // --- Responsive Resizing ---
        function resizeCanvas() {
            const wrapper = document.getElementById('canvasWrapper');
            const padding = 20; 
            const scaleX = (wrapper.clientWidth - padding) / CANVAS_WIDTH;
            const scaleY = (wrapper.clientHeight - padding) / CANVAS_HEIGHT;
            const scale = Math.min(scaleX, scaleY); 

            canvas.setZoom(scale);
            canvas.setWidth(CANVAS_WIDTH * scale);
            canvas.setHeight(CANVAS_HEIGHT * scale);
        }
        window.addEventListener('resize', resizeCanvas);
        setTimeout(resizeCanvas, 100);

        // --- Advanced Undo/Redo Engine ---
        let historyData = [];
        let historyIndex = -1;
        let isTrackingHistory = false; // Lock flag to prevent loops

        function saveHistory() {
            if (!isTrackingHistory) return;
            // Remove future history if we modify after undoing
            historyData = historyData.slice(0, historyIndex + 1);
            historyData.push(JSON.stringify(canvas.toJSON()));
            historyIndex++;
            updateHistoryButtons();
        }

        function updateHistoryButtons() {
            document.getElementById('undoBtn').disabled = historyIndex <= 0;
            document.getElementById('redoBtn').disabled = historyIndex >= historyData.length - 1;
        }

        function undo() {
            if (historyIndex > 0) {
                isTrackingHistory = false; // Turn off tracking while loading
                historyIndex--;
                canvas.loadFromJSON(historyData[historyIndex], function() {
                    canvas.renderAll();
                    isTrackingHistory = true;
                    updateHistoryButtons();
                });
            }
        }

        function redo() {
            if (historyIndex < historyData.length - 1) {
                isTrackingHistory = false;
                historyIndex++;
                canvas.loadFromJSON(historyData[historyIndex], function() {
                    canvas.renderAll();
                    isTrackingHistory = true;
                    updateHistoryButtons();
                });
            }
        }

        canvas.on('object:modified', saveHistory);
        canvas.on('object:added', saveHistory);
        canvas.on('object:removed', saveHistory);

        // --- Single Click Text Editing Fix for Mobile ---
        canvas.on('mouse:down', function(options) {
            const obj = options.target;
            if (obj && obj.type === 'i-text') {
                canvas.setActiveObject(obj);
                obj.enterEditing();
                obj.hiddenTextarea.focus(); // Force keyboard open
                canvas.requestRenderAll();
            }
        });

        // --- Render Templates with Details ---
        function initTemplates() {
            const list = document.getElementById('templateList');
            if (window.bannerTemplates) {
                window.bannerTemplates.forEach(template => {
                    const btn = document.createElement('button');
                    btn.className = "flex flex-col bg-white border border-slate-200 rounded-xl overflow-hidden active:scale-95 transition-transform shadow-sm hover:shadow-md text-left";
                    btn.onclick = () => loadTemplate(template.id);
                    
                    // Detail-rich Template Card
                    btn.innerHTML = `
                        <div style="background-color: ${template.bgColor}" class="w-full aspect-[3/4] flex flex-col items-center justify-center p-3 relative">
                            <div class="w-12 h-12 rounded-full border-2 border-white/50 mb-4 shadow-sm"></div>
                            <div class="w-3/4 h-2 bg-white/80 rounded-full mb-2"></div>
                            <div class="w-1/2 h-1.5 bg-white/50 rounded-full"></div>
                        </div>
                        <div class="p-3 w-full bg-white">
                            <span class="text-[10px] font-bold text-indigo-500 uppercase tracking-wide">ID: ${template.id}</span>
                            <h3 class="text-sm font-semibold text-gray-800 mt-0.5 truncate">${template.name}</h3>
                        </div>
                    `;
                    list.appendChild(btn);
                });
                loadTemplate(1); 
            }
        }
        window.onload = initTemplates;

        function loadTemplate(id) {
            const template = window.bannerTemplates.find(t => t.id === id);
            if (!template) return;
            
            isTrackingHistory = false; // Stop tracking during template load
            canvas.loadFromJSON(JSON.stringify(template.data), () => {
                canvas.requestRenderAll();
                openTab('toolsTab');
                onSelectionCleared();
                
                // Reset history for new template
                historyData = [JSON.stringify(canvas.toJSON())];
                historyIndex = 0;
                isTrackingHistory = true;
                updateHistoryButtons();
            });
        }

        // --- Fonts Setup ---
        const fonts = [
            { name: 'আনেক বাংলা', family: 'Anek Bangla' },
            { name: 'বালু দা ২', family: 'Baloo Da 2' },
            { name: 'গালাদা', family: 'Galada' },
            { name: 'হিন্দ শিলিগুড়ি', family: 'Hind Siliguri' },
            { name: 'তীরো বাংলা', family: 'Tiro Bangla' },
            { name: 'মিনা', family: 'Mina' },
            { name: 'পপিন্স (Eng)', family: 'Poppins' }
        ];

        function initFonts() {
            const container = document.getElementById('fontListContainer');
            fonts.forEach(font => {
                const div = document.createElement('div');
                div.className = "font-item cursor-pointer border border-slate-200 rounded-lg py-2.5 px-2 text-center text-sm transition-colors text-slate-600";
                div.style.fontFamily = `'${font.family}', sans-serif`;
                div.innerText = font.name;
                div.onclick = () => {
                    document.querySelectorAll('.font-item').forEach(el => el.classList.remove('selected'));
                    div.classList.add('selected');
                    const activeObj = canvas.getActiveObject();
                    if(activeObj && activeObj.type === 'i-text') {
                        activeObj.set('fontFamily', font.family);
                        canvas.requestRenderAll();
                        saveHistory(); // Manual trigger
                    }
                };
                container.appendChild(div);
            });
        }
        initFonts();

        // --- UI Events Based on Selection ---
        canvas.on('selection:created', onObjectSelected);
        canvas.on('selection:updated', onObjectSelected);
        canvas.on('selection:cleared', onSelectionCleared);

        function onObjectSelected(e) {
            const obj = e.target;
            document.getElementById('noSelectionPanel').classList.add('hidden');
            document.getElementById('textEditPanel').classList.remove('hidden');
            
            if (obj.type === 'i-text') {
                document.querySelectorAll('.text-properties').forEach(el => el.style.display = 'block');
                document.getElementById('colorPicker').value = obj.fill;
            } else {
                document.querySelectorAll('.text-properties').forEach(el => el.style.display = 'none');
                if (obj.fill && typeof obj.fill === 'string' && !obj.fill.startsWith('url')) {
                    document.getElementById('colorPicker').value = obj.fill;
                }
            }
        }

        function onSelectionCleared() {
            document.getElementById('textEditPanel').classList.add('hidden');
            document.getElementById('noSelectionPanel').classList.remove('hidden');
            document.querySelectorAll('.font-item').forEach(el => el.classList.remove('selected'));
        }

        function addText() {
            const text = new fabric.IText('আপনার লেখা', { 
                left: CANVAS_WIDTH/2, top: CANVAS_HEIGHT/2, originX: 'center', originY: 'center',
                fontFamily: 'Hind Siliguri', fontSize: 60, fill: '#1e293b'
            });
            canvas.add(text);
            canvas.setActiveObject(text);
        }

        // --- Advanced Image Upload (Absolute ClipPath) ---
        // এই লজিকের ফলে আপলোড করা ছবিকে বৃত্তের ভেতর ইচ্ছামতো সাইজ ও পজিশন করা যাবে
        document.getElementById('imageLoader').addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (event) {
                const targetCircle = canvas.getActiveObject();
                
                fabric.Image.fromURL(event.target.result, function(img) {
                    isTrackingHistory = false; // Pause history to prevent multiple entries

                    // ১. যদি ইউজার গোল বৃত্ত সিলেক্ট করে ছবি আপলোড করে
                    if (targetCircle && targetCircle.type === 'circle') {
                        let radius = targetCircle.radius * targetCircle.scaleX;
                        let center = targetCircle.getCenterPoint();

                        // বৃত্তাকার মাস্ক তৈরি করা (absolutePositioned: true হচ্ছে ম্যাজিক ট্রিক)
                        let clipPath = new fabric.Circle({
                            radius: radius,
                            left: center.x,
                            top: center.y,
                            originX: 'center',
                            originY: 'center',
                            absolutePositioned: true 
                        });

                        // ছবিটিকে অন্তত বৃত্তের সাইজে স্কেল করা
                        let scale = Math.max((radius * 2) / img.width, (radius * 2) / img.height);
                        
                        img.set({
                            left: center.x,
                            top: center.y,
                            originX: 'center',
                            originY: 'center',
                            scaleX: scale,
                            scaleY: scale,
                            clipPath: clipPath
                        });

                        canvas.remove(targetCircle); // পুরোনো বৃত্ত মুছে ফেলা
                        canvas.add(img);
                        canvas.setActiveObject(img);
                    } 
                    // ২. যদি কিছু সিলেক্ট না করে ছবি আপলোড করে (ফ্রি ইমেজ)
                    else {
                        const scale = (CANVAS_WIDTH * 0.4) / img.width; 
                        img.set({ 
                            left: CANVAS_WIDTH/2, top: CANVAS_HEIGHT/2, 
                            originX: 'center', originY: 'center', 
                            scaleX: scale, scaleY: scale
                        });
                        canvas.add(img);
                        canvas.setActiveObject(img);
                    }

                    e.target.value = ''; // Input reset
                    
                    isTrackingHistory = true; // Resume tracking
                    saveHistory(); // Save the final state
                });
            }
            reader.readAsDataURL(file);
        });

        function changeColor(color) {
            const obj = canvas.getActiveObject();
            if (obj) { obj.set("fill", color); canvas.requestRenderAll(); saveHistory(); }
        }

        function changeAlignment(align) {
            const obj = canvas.getActiveObject();
            if (obj && obj.type === 'i-text') { obj.set("textAlign", align); canvas.requestRenderAll(); saveHistory(); }
        }

        function deleteObject() {
            const activeObjects = canvas.getActiveObjects();
            if (activeObjects.length) {
                activeObjects.forEach(obj => canvas.remove(obj));
                canvas.discardActiveObject();
                saveHistory();
            } else {
                alert('প্রথমে ক্যানভাস থেকে কিছু সিলেক্ট করুন');
            }
        }

        function downloadBanner() {
            canvas.discardActiveObject();
            canvas.requestRenderAll();
            // High Resolution Export
            const dataURL = canvas.toDataURL({ format: 'jpeg', quality: 1, multiplier: 2 }); 
            const link = document.createElement('a');
            link.href = dataURL;
            link.download = `BannerPro_${new Date().getTime()}.jpg`;
            link.click();
        }

        function openTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            
            const btnClassInactive = "flex-1 pb-3 text-sm font-semibold text-gray-400 hover:text-gray-600 transition-colors border-b-2 border-transparent";
            const btnClassActive = "flex-1 pb-3 text-sm font-semibold text-indigo-600 border-b-2 border-indigo-600 transition-colors";
            
            document.getElementById('templatesTabBtn').className = btnClassInactive;
            document.getElementById('toolsTabBtn').className = btnClassInactive;
            document.getElementById(tabId + 'Btn').className = btnClassActive;
        }
    </script>
</body>
</html>
