        const CANVAS_HEIGHT = 628;

        const canvas = new fabric.Canvas('bannerCanvas', {
            width: CANVAS_WIDTH,
            height: CANVAS_HEIGHT,
            backgroundColor: '#ffffff',
            preserveObjectStacking: true
        });

        // ক্যানভাসকে রেসপন্সিভ করা
        function resizeCanvas() {
            const wrapper = document.getElementById('canvasWrapper');
            const container = wrapper.parentNode;
            const containerWidth = container.clientWidth - 64; // 64px padding
            const containerHeight = container.clientHeight - 64;
            
            const scaleX = containerWidth / CANVAS_WIDTH;
            const scaleY = containerHeight / CANVAS_HEIGHT;
            const scale = Math.min(scaleX, scaleY, 1); // 1 = Don't scale up

            canvas.setZoom(scale);
            canvas.setWidth(CANVAS_WIDTH * scale);
            canvas.setHeight(CANVAS_HEIGHT * scale);
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Object Selection Listener
        canvas.on('selection:created', onObjectSelected);
        canvas.on('selection:updated', onObjectSelected);
        canvas.on('selection:cleared', onSelectionCleared);

        function onObjectSelected(e) {
            const selectedObject = e.target;
            document.querySelectorAll('.text-properties').forEach(el => el.style.display = 'none');
            
            if (selectedObject.type === 'i-text') {
                document.querySelectorAll('.text-properties').forEach(el => el.style.display = 'block');
                document.getElementById('fontFamily').value = selectedObject.fontFamily;
                openTab('toolsTab');
            }
            
            // Update color picker
            document.getElementById('colorPicker').value = selectedObject.fill;
            document.getElementById('colorHex').textContent = selectedObject.fill;
            canvas.requestRenderAll();
        }

        function onSelectionCleared() {
            document.querySelectorAll('.text-properties').forEach(el => el.style.display = 'none');

                // SVG placeholder based on template colors
                const bgColor = template.data.objects[0].fill || '#cccccc';
                const mainTextColor = (template.data.objects[1] && template.data.objects[1].fill) ? template.data.objects[1].fill : '#ffffff';

                card.innerHTML = `
                    <div style="background-color: ${bgColor}" class="w-full aspect-[1.91/1] flex flex-col p-2 space-y-1">
                        <div style="background-color: ${mainTextColor}" class="w-2/3 h-2 rounded-sm opacity-60"></div>
                        <div style="background-color: ${mainTextColor}" class="w-full h-1.5 rounded-sm opacity-40"></div>
                        <div style="background-color: ${mainTextColor}" class="w-1/2 h-1 rounded-sm opacity-30"></div>
                    </div>
                    <div class="p-2.5">
                        <span class="text-sm font-semibold text-gray-800">${template.name}</span>
                    </div>
                `;
                list.appendChild(card);
            });
            // Load first template by default
            loadTemplate(bannerTemplates[0].id);
        }
        initTemplates();

        // টেমপ্লেট লোড করার ফাংশন
        function loadTemplate(id) {
            const template = bannerTemplates.find(t => t.id === id);
            if (!template) return;
            
            canvas.loadFromJSON(JSON.stringify(template.data), () => {
                canvas.requestRenderAll();
                openTab('toolsTab');
            });
        }

        // --- এডিটিং টুলস (EDITING TOOLS) ---

        // টেক্সট অ্যাড ফাংশন
        function addText() {
            const newText = new fabric.IText('আপনার টেক্সট লিখুন', { 
                left: CANVAS_WIDTH / 2, 
                top: CANVAS_HEIGHT / 2, 
                originX: 'center', 
                originY: 'center',
                fontFamily: 'Hind Siliguri',
                fontSize: 45,
                fill: '#000000',
                padding: 10
            });
            canvas.add(newText);
            canvas.setActiveObject(newText);
            newText.enterEditing();
        }

        // ছবি আপলোড ফাংশন
        document.getElementById('imageLoader').addEventListener('change', function (e) {
            const reader = new FileReader();
            reader.onload = function (event) {
                const imgObj = new Image();
                imgObj.src = event.target.result;
                imgObj.onload = function () {
                    const img = new fabric.Image(imgObj);
                    const scale = (CANVAS_HEIGHT * 0.5) / img.height; // Scale to 50% height
                    img.set({ 
                        left: CANVAS_WIDTH / 2, 
                        top: CANVAS_HEIGHT / 2, 
                        originX: 'center', 
                        originY: 'center',
                        scaleX: scale,
                        scaleY: scale
                    });
                    canvas.add(img);
                    canvas.setActiveObject(img);
                }
            }
            reader.readAsDataURL(e.target.files[0]);
        });

        // ফন্ট পরিবর্তন ফাংশন
        function changeFont(fontName) {
            const activeObject = canvas.getActiveObject();
            if (activeObject && activeObject.type === 'i-text') {
                activeObject.set("fontFamily", fontName);
                canvas.requestRenderAll();
            }
        }

        // রঙ পরিবর্তন ফাংশন
        function changeColor(color) {
            const activeObject = canvas.getActiveObject();
            if (activeObject) {
                activeObject.set("fill", color);
                document.getElementById('colorHex').textContent = color.toUpperCase();
                canvas.requestRenderAll();
            }
        }
        
        // অপাসিটি পরিবর্তন ফাংশন
        function changeOpacity(value) {
            const activeObject = canvas.getActiveObject();
            if (activeObject) {
                activeObject.set("opacity", parseFloat(value));
                canvas.requestRenderAll();
            }
        }
        
        // টেক্সট এলাইনমেন্ট ফাংশন
        function changeAlignment(align) {
            const activeObject = canvas.getActiveObject();
            if (activeObject && activeObject.type === 'i-text') {
                activeObject.set("textAlign", align);
                canvas.requestRenderAll();
            }
        }

        // অবজেক্ট ডিলিট ফাংশন
        function deleteObject() {
            const activeObjects = canvas.getActiveObjects();
            if (activeObjects.length > 0) {
                activeObjects.forEach(obj => canvas.remove(obj));
                canvas.discardActiveObject();
            } else {
                alert("প্রথমে একটি অংশ সিলেক্ট করুন!");
            }
        }

        // ডাউনলোড ফাংশন (হাই কোয়ালিটি)
        function downloadBanner() {
            // ১. সিলেকশন বক্স হাইড করা
            canvas.discardActiveObject();
            canvas.requestRenderAll();
            
            // ২. ডাউনলোড করা (Multiplier: 2 enhances quality)
            const dataURL = canvas.toDataURL({ format: 'png', quality: 1, multiplier: 1 }); // multiplier 1 based on actual 1200x628 size
            const link = document.createElement('a');
            link.href = dataURL;
            link.download = 'প্রফেশনাল-ব্যানার-pro.png';
            link.click();
        }

        // --- UI ট্যাবস কন্ট্রোল (UI TABS CONTROL) ---
        function openTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            
            // Update buttons style
            document.getElementById('templatesTabBtn').classList.remove('text-indigo-600', 'border-b-2', 'border-indigo-600');
            document.getElementById('templatesTabBtn').classList.add('text-gray-500');
            document.getElementById('toolsTabBtn').classList.remove('text-indigo-600', 'border-b-2', 'border-indigo-600');
            document.getElementById('toolsTabBtn').classList.add('text-gray-500');

            document.getElementById(tabId + 'Btn').classList.add('text-indigo-600', 'border-b-2', 'border-indigo-600');
            document.getElementById(tabId + 'Btn').classList.remove('text-gray-500');
        }

    </script>
</body>
</html>
