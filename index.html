<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProBanner - Banner Maker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; touch-action: manipulation; }
        .canvas-container { margin: 0 auto; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-100 h-[100dvh] w-full overflow-hidden text-gray-800 flex flex-col">

    <div id="homeScreen" class="absolute inset-0 flex flex-col bg-white overflow-y-auto z-10">
        <header class="p-4 md:p-6 flex justify-between items-center shadow-sm">
            <h1 class="text-2xl md:text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-purple-600">ProBanner</h1>
            <button onclick="openEditor()" class="bg-blue-600 text-white px-4 md:px-6 py-2 rounded-full font-medium hover:bg-blue-700 transition text-sm md:text-base">Create Blank</button>
        </header>

        <div class="flex flex-col items-center justify-center mt-8 px-4">
            <h2 class="text-2xl md:text-4xl font-bold mb-6 text-center">What will you design today?</h2>
            <div class="relative w-full max-w-2xl">
                <input type="text" placeholder="Search for templates..." class="w-full pl-12 pr-4 py-3 md:py-4 rounded-full border-2 border-gray-200 focus:border-blue-500 focus:outline-none shadow-sm text-base md:text-lg">
                <i class="fas fa-search absolute left-5 top-4 md:top-5 text-gray-400 text-xl"></i>
            </div>
        </div>

        <div class="max-w-6xl mx-auto w-full px-4 mt-10 pb-10">
            <h3 class="text-lg font-semibold mb-3">Categories</h3>
            <div class="flex gap-3 overflow-x-auto pb-2 custom-scrollbar">
                <button class="px-4 py-2 bg-gray-100 rounded-lg hover:bg-gray-200 whitespace-nowrap text-sm"><i class="fas fa-laptop mr-2 text-blue-500"></i>Web Banner</button>
                <button class="px-4 py-2 bg-gray-100 rounded-lg hover:bg-gray-200 whitespace-nowrap text-sm"><i class="fab fa-youtube mr-2 text-red-500"></i>Thumbnail</button>
                <button class="px-4 py-2 bg-gray-100 rounded-lg hover:bg-gray-200 whitespace-nowrap text-sm"><i class="fab fa-facebook mr-2 text-blue-700"></i>FB Cover</button>
            </div>

            <h3 class="text-lg font-semibold mt-8 mb-3">Trending Templates</h3>
            <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                <div class="bg-gray-200 h-32 md:h-48 rounded-xl cursor-pointer hover:shadow-lg transition flex items-center justify-center" onclick="openEditor()"><span class="text-gray-500 text-sm">Tech Banner</span></div>
                <div class="bg-gray-200 h-32 md:h-48 rounded-xl cursor-pointer hover:shadow-lg transition flex items-center justify-center" onclick="openEditor()"><span class="text-gray-500 text-sm">Sale Promo</span></div>
            </div>
        </div>
    </div>

    <div id="editorScreen" class="absolute inset-0 flex flex-col hidden bg-gray-100 z-20">
        <div class="h-14 md:h-16 flex-none bg-white border-b flex items-center justify-between px-3 md:px-6 shadow-sm z-30">
            <div class="flex items-center gap-2 md:gap-4">
                <button onclick="closeEditor()" class="text-gray-500 hover:text-gray-800 p-2"><i class="fas fa-arrow-left text-lg"></i></button>
                <h1 class="text-base md:text-xl font-bold text-gray-800 hidden md:block">Untitled Banner</h1>
            </div>
            
            <div class="flex items-center gap-2 md:gap-4">
                <button onclick="undo()" class="text-gray-600 hover:text-blue-600 p-2" title="Undo"><i class="fas fa-undo"></i></button>
                <button onclick="redo()" class="text-gray-600 hover:text-blue-600 p-2" title="Redo"><i class="fas fa-redo"></i></button>
                <button onclick="saveProject()" class="bg-gray-100 text-gray-700 px-3 py-1.5 rounded-md hover:bg-gray-200 font-medium text-sm">Save</button>
                <button onclick="exportBanner()" class="bg-gradient-to-r from-blue-600 to-purple-600 text-white px-3 md:px-5 py-1.5 md:py-2 rounded-md hover:opacity-90 font-medium shadow-md text-sm">
                    <i class="fas fa-download md:mr-2"></i><span class="hidden md:inline">Export</span>
                </button>
            </div>
        </div>

        <div class="flex-1 min-h-0 flex overflow-hidden relative w-full">
            
            <div class="flex-1 h-full flex justify-center items-center bg-gray-200 overflow-auto relative p-4" id="canvas-wrapper">
                <canvas id="bannerCanvas"></canvas>
                
                <div id="floatingAction" class="absolute hidden bg-white rounded-full shadow-lg px-2 py-1 flex gap-2 border border-gray-200 z-40 transform -translate-x-1/2 -translate-y-full mb-2">
                    <button onclick="confirmChanges()" class="text-green-500 hover:bg-green-50 rounded-full w-8 h-8 flex items-center justify-center transition" title="Save & Deselect">
                        <i class="fas fa-check"></i>
                    </button>
                    <button onclick="discardChanges()" class="text-red-500 hover:bg-red-50 rounded-full w-8 h-8 flex items-center justify-center transition" title="Discard & Deselect">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>

            <div id="propertiesPanel" class="absolute right-0 top-0 h-full w-64 bg-white border-l shadow-2xl hidden flex-col z-50 overflow-y-auto transform transition-transform">
                <div class="p-4 flex flex-col h-full">
                    <div class="flex justify-between items-center mb-4 border-b pb-2">
                        <h4 class="text-sm font-semibold text-gray-500 uppercase">Properties</h4>
                        <button onclick="hideProperties()" class="text-gray-400 hover:text-red-500"><i class="fas fa-times"></i></button>
                    </div>
                    
                    <div class="flex-1 overflow-y-auto pr-1">
                        <div class="mb-4">
                            <label class="text-sm font-medium block mb-1">Color</label>
                            <input type="color" id="itemColor" onchange="changeColor(this.value)" class="w-full h-8 rounded cursor-pointer">
                        </div>

                        <div class="mb-4 p-3 bg-gray-50 rounded border">
                            <label class="text-sm font-medium block mb-2">Apply Gradient</label>
                            <div class="flex gap-2 mb-2">
                                <input type="color" id="gradColor1" value="#ff0000" class="w-full h-8 cursor-pointer">
                                <input type="color" id="gradColor2" value="#0000ff" class="w-full h-8 cursor-pointer">
                            </div>
                            <button onclick="applyGradient()" class="w-full bg-gray-200 text-xs py-1.5 rounded hover:bg-gray-300 font-medium">Set Gradient</button>
                        </div>

                        <div class="mb-4">
                            <label class="text-sm font-medium flex justify-between">Opacity <span id="opVal">100%</span></label>
                            <input type="range" id="itemOpacity" min="0" max="1" step="0.05" value="1" onchange="changeOpacity(this.value)" oninput="document.getElementById('opVal').innerText=Math.round(this.value*100)+'%'" class="w-full">
                        </div>

                        <div class="mb-4">
                            <label class="text-sm font-medium block mb-1">Stroke (Color & Width)</label>
                            <div class="flex gap-2">
                                <input type="color" id="strokeColor" onchange="changeStroke(this.value, null)" class="w-10 h-8 cursor-pointer">
                                <input type="number" id="strokeWidth" value="0" min="0" max="20" onchange="changeStroke(null, this.value)" class="w-full border rounded px-2 text-sm">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="text-sm font-medium block mb-1">Size (Scale)</label>
                            <input type="range" id="itemScale" min="0.1" max="5" step="0.1" value="1" onchange="changeScale(this.value)" class="w-full">
                        </div>
                    </div>

                    <button onclick="deleteObject()" class="w-full mt-2 bg-red-50 text-red-600 py-2 rounded-md hover:bg-red-100 transition flex justify-center items-center gap-2 font-medium text-sm">
                        <i class="fas fa-trash"></i> Delete
                    </button>
                </div>
            </div>
        </div>

        <div class="h-16 md:h-20 flex-none bg-white border-t flex items-center justify-start md:justify-center gap-4 md:gap-6 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-30 px-4 overflow-x-auto pb-safe">
            <button onclick="addText()" class="flex flex-col items-center text-gray-600 hover:text-blue-600 p-2 transition min-w-[50px]">
                <i class="fas fa-font text-xl md:text-2xl mb-1"></i>
                <span class="text-[10px] md:text-xs font-medium">Text</span>
            </button>
            
            <input type="file" id="imageInput" class="hidden" accept="image/*" onchange="addImage(event)">
            <button onclick="document.getElementById('imageInput').click()" class="flex flex-col items-center text-gray-600 hover:text-blue-600 p-2 transition min-w-[50px]">
                <i class="fas fa-image text-xl md:text-2xl mb-1"></i>
                <span class="text-[10px] md:text-xs font-medium">Image</span>
            </button>
            
            <button onclick="addShape('rect')" class="flex flex-col items-center text-gray-600 hover:text-blue-600 p-2 transition min-w-[50px]">
                <i class="fas fa-square text-xl md:text-2xl mb-1"></i>
                <span class="text-[10px] md:text-xs font-medium">Square</span>
            </button>

            <button onclick="addShape('circle')" class="flex flex-col items-center text-gray-600 hover:text-blue-600 p-2 transition min-w-[50px]">
                <i class="fas fa-circle text-xl md:text-2xl mb-1"></i>
                <span class="text-[10px] md:text-xs font-medium">Circle</span>
            </button>

            <div class="w-px h-8 bg-gray-300 mx-1"></div>

            <div class="flex flex-col items-center justify-center min-w-[50px]">
                <input type="color" onchange="changeBgColor(this.value)" value="#ffffff" class="w-6 h-6 md:w-8 md:h-8 rounded cursor-pointer border-0 p-0">
                <span class="text-[10px] md:text-xs font-medium text-gray-600 mt-1">BG</span>
            </div>
        </div>
    </div>

    <script>
        const homeScreen = document.getElementById('homeScreen');
        const editorScreen = document.getElementById('editorScreen');
        
        function openEditor() {
            homeScreen.classList.add('hidden');
            editorScreen.classList.remove('hidden');
            initCanvas();
        }

        function closeEditor() {
            editorScreen.classList.add('hidden');
            homeScreen.classList.remove('hidden');
        }

        let canvas;
        let undoStack = [];
        let redoStack = [];
        let objectInitialState = null;
        let isProgrammaticSelection = false;

        function initCanvas() {
            if(!canvas) {
                // Responsive width for mobile
                let canvasWidth = window.innerWidth > 800 ? 800 : window.innerWidth - 40;
                let canvasHeight = canvasWidth * 0.5625; // 16:9 ratio

                canvas = new fabric.Canvas('bannerCanvas', {
                    width: canvasWidth, height: canvasHeight, backgroundColor: '#ffffff',
                    preserveObjectStacking: true
                });

                canvas.on('selection:created', onObjectSelected);
                canvas.on('selection:updated', onObjectSelected);
                canvas.on('object:moving', updateFloatingPosition);
                canvas.on('object:scaling', updateFloatingPosition);
                canvas.on('object:rotating', updateFloatingPosition);
                canvas.on('selection:cleared', onSelectionCleared);

                saveHistory();
            }
        }

        function saveHistory() {
            if(redoStack.length > 0) redoStack = [];
            undoStack.push(JSON.stringify(canvas));
        }

        function undo() {
            if (undoStack.length > 1) {
                redoStack.push(undoStack.pop());
                loadCanvasState(undoStack[undoStack.length - 1]);
            }
        }

        function redo() {
            if (redoStack.length > 0) {
                const nextState = redoStack.pop();
                undoStack.push(nextState);
                loadCanvasState(nextState);
            }
        }

        function loadCanvasState(jsonStr) {
            isProgrammaticSelection = true;
            canvas.loadFromJSON(jsonStr, function() {
                canvas.renderAll();
                isProgrammaticSelection = false;
            });
        }

        const floatingAction = document.getElementById('floatingAction');

        function onObjectSelected(e) {
            if(isProgrammaticSelection) return;
            const obj = canvas.getActiveObject();
            if(!obj) return;
            
            if(e.type === 'selection:created') {
                objectInitialState = JSON.stringify(obj.toObject());
            }

            showProperties(obj);
            updateFloatingPosition();
            floatingAction.classList.remove('hidden');
        }

        function updateFloatingPosition() {
            const obj = canvas.getActiveObject();
            if(!obj) return;
            
            const objBound = obj.getBoundingRect();
            const wrapperOffset = document.getElementById('canvas-wrapper').getBoundingClientRect();
            const canvasOffset = document.querySelector('.canvas-container').getBoundingClientRect();
            
            let topPos = (canvasOffset.top - wrapperOffset.top) + objBound.top - 15;
            let leftPos = (canvasOffset.left - wrapperOffset.left) + objBound.left + (objBound.width / 2);

            floatingAction.style.top = `${topPos}px`;
            floatingAction.style.left = `${leftPos}px`;
        }

        function onSelectionCleared() {
            // Only hide floating menu, keep properties open if they want, or close it
            floatingAction.classList.add('hidden');
            objectInitialState = null;
        }

        function confirmChanges() {
            saveHistory();
            canvas.discardActiveObject();
            canvas.renderAll();
            hideProperties();
        }

        function discardChanges() {
            const obj = canvas.getActiveObject();
            if(obj && objectInitialState) {
                const prevData = JSON.parse(objectInitialState);
                obj.set(prevData);
                canvas.renderAll();
            }
            canvas.discardActiveObject();
            canvas.renderAll();
            hideProperties();
        }

        function addText() {
            const text = new fabric.IText('Your Text', {
                left: canvas.width/2 - 50, top: canvas.height/2 - 20, fontFamily: 'Inter', fill: '#333333', fontSize: 30
            });
            canvas.add(text);
            canvas.setActiveObject(text);
        }

        function addShape(type) {
            let shape;
            if(type === 'rect') shape = new fabric.Rect({ left: canvas.width/2 - 40, top: canvas.height/2 - 40, fill: '#3b82f6', width: 80, height: 80, rx: 8, ry: 8 });
            else if (type === 'circle') shape = new fabric.Circle({ left: canvas.width/2 - 40, top: canvas.height/2 - 40, fill: '#ec4899', radius: 40 });
            canvas.add(shape);
            canvas.setActiveObject(shape);
        }

        function addImage(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(f) {
                const data = f.target.result;
                fabric.Image.fromURL(data, function(img) {
                    img.scaleToWidth(canvas.width / 2);
                    img.set({ selectable: true, evented: true }); 
                    canvas.add(img);
                    canvas.centerObject(img);
                    canvas.setActiveObject(img);
                    saveHistory();
                });
            };
            if(file) reader.readAsDataURL(file);
            e.target.value = ''; 
        }

        function changeBgColor(color) {
            canvas.backgroundColor = color;
            canvas.renderAll();
            saveHistory();
        }

        const propPanel = document.getElementById('propertiesPanel');

        function showProperties(activeObj) {
            propPanel.classList.remove('hidden');
            propPanel.classList.add('flex');
            
            if(typeof activeObj.fill === 'string') document.getElementById('itemColor').value = activeObj.fill;
            document.getElementById('itemOpacity').value = activeObj.opacity || 1;
            document.getElementById('opVal').innerText = Math.round((activeObj.opacity || 1)*100)+'%';
            document.getElementById('strokeWidth').value = activeObj.strokeWidth || 0;
            if(activeObj.stroke) document.getElementById('strokeColor').value = activeObj.stroke;
            document.getElementById('itemScale').value = activeObj.scaleX || 1;
        }

        function hideProperties() {
            propPanel.classList.add('hidden');
            propPanel.classList.remove('flex');
        }

        function changeColor(color) {
            const activeObj = canvas.getActiveObject();
            if(activeObj) { activeObj.set('fill', color); canvas.renderAll(); }
        }

        function applyGradient() {
            const activeObj = canvas.getActiveObject();
            const color1 = document.getElementById('gradColor1').value;
            const color2 = document.getElementById('gradColor2').value;
            
            if(activeObj) {
                const grad = new fabric.Gradient({
                    type: 'linear', gradientUnits: 'pixels', coords: { x1: 0, y1: 0, x2: activeObj.width, y2: activeObj.height },
                    colorStops:[ { offset: 0, color: color1 }, { offset: 1, color: color2 } ]
                });
                activeObj.set('fill', grad); canvas.renderAll();
            } else {
                const grad = new fabric.Gradient({
                    type: 'linear', gradientUnits: 'pixels', coords: { x1: 0, y1: 0, x2: canvas.width, y2: canvas.height },
                    colorStops:[ { offset: 0, color: color1 }, { offset: 1, color: color2 } ]
                });
                canvas.backgroundColor = grad; canvas.renderAll(); saveHistory();
            }
        }

        function changeOpacity(val) {
            const activeObj = canvas.getActiveObject();
            if(activeObj) { activeObj.set('opacity', parseFloat(val)); canvas.renderAll(); }
        }

        function changeStroke(color, width) {
            const activeObj = canvas.getActiveObject();
            if(activeObj) {
                if(color !== null) activeObj.set('stroke', color);
                if(width !== null) activeObj.set('strokeWidth', parseInt(width));
                canvas.renderAll();
            }
        }

        function changeScale(val) {
            const activeObj = canvas.getActiveObject();
            if(activeObj) {
                activeObj.scale(parseFloat(val)); canvas.renderAll(); updateFloatingPosition();
            }
        }

        function deleteObject() {
            const activeObjects = canvas.getActiveObjects();
            if (activeObjects.length) {
                canvas.discardActiveObject();
                activeObjects.forEach(function(object) { canvas.remove(object); });
                saveHistory();
                hideProperties();
            }
        }

        function saveProject() {
            alert("Project saved logically!");
            saveHistory();
        }

        function exportBanner() {
            canvas.discardActiveObject(); 
            canvas.renderAll();
            const dataURL = canvas.toDataURL({ format: 'png', quality: 1, multiplier: 2 }); 
            const link = document.createElement('a');
            link.download = 'ProBanner-Design.png';
            link.href = dataURL;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
