<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProBanner - Professional Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; touch-action: manipulation; background-color: #f1f5f9; }
        .canvas-container { margin: 0 auto; box-shadow: 0 12px 35px rgba(0,0,0,0.08); border-radius: 8px; overflow: hidden; background: white; }
        
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: 2px solid white; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.15); }
        
        input[type=range] { -webkit-appearance: none; background: transparent; width: 100%; outline: none; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: #4f46e5; cursor: pointer; margin-top: -5px; box-shadow: 0 2px 5px rgba(79, 70, 229, 0.4); border: 2px solid white; transition: transform 0.1s; }
        input[type=range]::-webkit-slider-thumb:active { transform: scale(1.2); }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 6px; cursor: pointer; background: #e2e8f0; border-radius: 4px; }
    </style>
</head>
<body class="h-[100dvh] w-full overflow-hidden text-gray-800 flex flex-col selection:bg-indigo-100 relative">

    <div id="homeScreen" class="absolute inset-0 bg-white z-50 overflow-y-auto flex flex-col transition-opacity duration-300">
        <header class="p-4 md:p-6 flex justify-between items-center shadow-sm border-b">
            <h1 class="text-2xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-purple-600">ProBanner</h1>
            <button onclick="openEditor()" class="bg-indigo-600 text-white px-5 py-2 rounded-full font-semibold hover:bg-indigo-700 transition shadow-md text-sm">Create Blank</button>
        </header>

        <div class="flex flex-col items-center justify-center mt-10 px-4">
            <h2 class="text-3xl md:text-4xl font-extrabold mb-6 text-center text-gray-800">What will you design today?</h2>
            <div class="relative w-full max-w-2xl">
                <input type="text" placeholder="Search for templates..." class="w-full pl-12 pr-4 py-3 md:py-4 rounded-full border-2 border-gray-200 focus:border-indigo-500 focus:outline-none shadow-sm text-base">
                <i class="fas fa-search absolute left-5 top-4 md:top-5 text-gray-400 text-xl"></i>
            </div>
        </div>

        <div class="max-w-6xl mx-auto w-full px-4 mt-12 pb-10">
            <h3 class="text-lg font-bold mb-4 text-gray-700">Categories</h3>
            <div class="flex gap-3 overflow-x-auto pb-2 hide-scroll">
                <button class="px-5 py-2.5 bg-gray-50 border border-gray-100 rounded-xl hover:bg-indigo-50 hover:border-indigo-100 whitespace-nowrap text-sm font-semibold transition shadow-sm"><i class="fas fa-laptop mr-2 text-indigo-500"></i>Web Banner</button>
                <button class="px-5 py-2.5 bg-gray-50 border border-gray-100 rounded-xl hover:bg-indigo-50 hover:border-indigo-100 whitespace-nowrap text-sm font-semibold transition shadow-sm"><i class="fab fa-youtube mr-2 text-red-500"></i>Thumbnail</button>
                <button class="px-5 py-2.5 bg-gray-50 border border-gray-100 rounded-xl hover:bg-indigo-50 hover:border-indigo-100 whitespace-nowrap text-sm font-semibold transition shadow-sm"><i class="fab fa-facebook mr-2 text-blue-600"></i>FB Cover</button>
            </div>

            <h3 class="text-lg font-bold mt-10 mb-4 text-gray-700">Start with a Blank Canvas</h3>
            <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                <div class="bg-gradient-to-br from-indigo-50 to-purple-50 border border-indigo-100 h-32 md:h-48 rounded-2xl cursor-pointer hover:shadow-lg transition flex flex-col items-center justify-center group" onclick="openEditor()">
                    <i class="fas fa-plus text-3xl text-indigo-400 mb-2 group-hover:scale-110 transition"></i>
                    <span class="text-indigo-600 font-bold text-sm">Custom Banner</span>
                </div>
            </div>
        </div>
    </div>

    <div id="editorScreen" class="absolute inset-0 flex flex-col bg-gray-100 z-20 hidden opacity-0 transition-opacity duration-300">
        
        <header class="h-14 bg-white/95 backdrop-blur-md border-b flex items-center justify-between px-3 md:px-4 shadow-sm shrink-0 z-30">
            <div class="flex items-center gap-2 md:gap-3">
                <button onclick="closeEditor()" class="text-gray-500 hover:text-indigo-600 w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center"><i class="fas fa-arrow-left"></i></button>
                <h1 class="text-sm font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-purple-600 hidden md:block">ProBanner Editor</h1>
            </div>
            
            <div class="flex items-center gap-1 sm:gap-3">
                <button onclick="undo()" class="text-gray-500 hover:text-indigo-600 w-8 h-8 flex items-center justify-center rounded-full active:bg-gray-100 transition"><i class="fas fa-undo text-sm"></i></button>
                <button onclick="redo()" class="text-gray-500 hover:text-indigo-600 w-8 h-8 flex items-center justify-center rounded-full active:bg-gray-100 transition"><i class="fas fa-redo text-sm"></i></button>
                <div class="w-px h-5 bg-gray-200 mx-1"></div>
                <button onclick="exportBanner()" class="bg-indigo-600 text-white px-4 py-1.5 rounded-full hover:bg-indigo-700 font-semibold shadow-md shadow-indigo-200 text-sm transition">Export</button>
            </div>
        </header>

        <main id="workspace" class="flex-1 relative flex justify-center items-center overflow-hidden w-full p-4 bg-[#eef2f6]">
            <canvas id="bannerCanvas"></canvas>
            
            <div id="floatingAction" class="absolute hidden bg-white rounded-full shadow-2xl p-1.5 flex gap-2 border border-gray-100 z-50 transition-all scale-95">
                <button onclick="confirmChanges()" class="w-9 h-9 rounded-full bg-green-50 text-green-600 flex items-center justify-center hover:bg-green-500 hover:text-white transition"><i class="fas fa-check text-base"></i></button>
                <button onclick="discardChanges()" class="w-9 h-9 rounded-full bg-red-50 text-red-500 flex items-center justify-center hover:bg-red-500 hover:text-white transition"><i class="fas fa-times text-base"></i></button>
            </div>
        </main>

        <div id="propertiesPanel" class="h-auto py-3 bg-white border-t flex items-center px-4 gap-5 overflow-x-auto hide-scroll shrink-0 shadow-[0_-15px_30px_rgba(0,0,0,0.05)] transition-transform duration-300 translate-y-full absolute bottom-[72px] w-full z-20">
            
            <div id="propColor" class="flex-col items-center shrink-0 hidden">
                <span class="text-[9px] font-extrabold text-gray-400 mb-1.5 uppercase tracking-widest">Color</span>
                <input type="color" id="itemColor" onchange="changeColor(this.value)" class="w-8 h-8 cursor-pointer bg-transparent">
            </div>

            <div id="propShapeImage" class="flex-col items-center shrink-0 hidden">
                <span class="text-[9px] font-extrabold text-indigo-500 mb-1.5 uppercase tracking-widest">Image Fill</span>
                <input type="file" id="shapeImgInput" class="hidden" accept="image/*" onchange="fillShapeWithImage(event)">
                <button onclick="document.getElementById('shapeImgInput').click()" class="w-8 h-8 bg-indigo-50 text-indigo-600 rounded flex items-center justify-center hover:bg-indigo-100 border border-indigo-100"><i class="fas fa-image text-sm"></i></button>
            </div>

            <div id="propPatternControls" class="flex items-center gap-4 shrink-0 hidden bg-indigo-50/50 p-2 rounded-lg border border-indigo-50">
                <div class="flex-col shrink-0 w-20">
                    <span class="text-[9px] font-extrabold text-indigo-600 uppercase tracking-wider mb-1 block">Zoom <span id="scaleVal">1x</span></span>
                    <input type="range" id="itemPatternScale" min="0.1" max="4" step="0.1" value="1" oninput="changePatternProps('scale', this.value)" class="w-full accent-indigo-500">
                </div>
                <div class="flex-col shrink-0 w-20">
                    <span class="text-[9px] font-extrabold text-indigo-600 uppercase tracking-wider mb-1 block">Move X</span>
                    <input type="range" id="itemPatternX" min="-300" max="300" step="5" value="0" oninput="changePatternProps('x', this.value)" class="w-full accent-indigo-500">
                </div>
                <div class="flex-col shrink-0 w-20">
                    <span class="text-[9px] font-extrabold text-indigo-600 uppercase tracking-wider mb-1 block">Move Y</span>
                    <input type="range" id="itemPatternY" min="-300" max="300" step="5" value="0" oninput="changePatternProps('y', this.value)" class="w-full accent-indigo-500">
                </div>
            </div>

            <div id="divSeparator" class="w-px h-8 bg-gray-200 shrink-0 hidden"></div>

            <div id="propOpacity" class="flex-col shrink-0 w-24 hidden">
                <div class="flex justify-between w-full mb-1">
                    <span class="text-[9px] font-extrabold text-gray-400 uppercase tracking-widest">Opacity</span>
                    <span id="opVal" class="text-[9px] font-bold text-indigo-600">100%</span>
                </div>
                <input type="range" id="itemOpacity" min="0" max="1" step="0.05" value="1" onchange="changeOpacity(this.value)" oninput="document.getElementById('opVal').innerText=Math.round(this.value*100)+'%'" class="w-full">
            </div>

            <div id="propStroke" class="flex items-center gap-3 shrink-0 hidden bg-gray-50 p-1.5 rounded-lg border border-gray-100">
                <div class="flex-col items-center">
                    <span class="text-[9px] font-extrabold text-gray-400 mb-1 uppercase tracking-widest block text-center">Border Color</span>
                    <input type="color" id="strokeColor" onchange="changeStroke(this.value, null)" class="w-6 h-6 cursor-pointer bg-transparent mx-auto block">
                </div>
                <div class="flex-col w-20">
                    <div class="flex justify-between w-full mb-1">
                        <span class="text-[9px] font-extrabold text-gray-400 uppercase tracking-widest">Size</span>
                        <span id="strokeVal" class="text-[9px] font-bold text-gray-600">0</span>
                    </div>
                    <input type="range" id="strokeWidth" min="0" max="40" step="1" value="0" oninput="changeStroke(null, this.value); document.getElementById('strokeVal').innerText=this.value" class="w-full accent-gray-500">
                </div>
            </div>

            <div id="propDelete" class="flex-col items-center shrink-0 pr-4 hidden ml-auto">
                <span class="text-[9px] font-extrabold text-red-400 mb-1.5 uppercase tracking-widest">Delete</span>
                <button onclick="deleteObject()" class="text-red-500 bg-red-50 hover:bg-red-500 hover:text-white w-8 h-8 rounded-full flex items-center justify-center transition shadow-sm border border-red-100">
                    <i class="fas fa-trash-alt text-xs"></i>
                </button>
            </div>
        </div>

        <div class="h-[72px] bg-white border-t shrink-0 z-30 pb-safe relative overflow-hidden shadow-[0_-5px_25px_rgba(0,0,0,0.04)]">
            <nav id="mainMenu" class="absolute inset-0 flex items-center justify-around px-2 transition-transform duration-300 transform translate-x-0">
                <button onclick="addText()" class="flex flex-col items-center text-gray-500 hover:text-indigo-600 p-2 w-16 transition group">
                    <div class="w-10 h-10 rounded-2xl bg-gray-50 group-hover:bg-indigo-50 flex items-center justify-center mb-1 transition-all"><i class="fas fa-font text-lg"></i></div>
                    <span class="text-[10px] font-bold">Text</span>
                </button>
                <input type="file" id="imageInput" class="hidden" accept="image/*" onchange="addImage(event)">
                <button onclick="document.getElementById('imageInput').click()" class="flex flex-col items-center text-gray-500 hover:text-indigo-600 p-2 w-16 transition group">
                    <div class="w-10 h-10 rounded-2xl bg-gray-50 group-hover:bg-indigo-50 flex items-center justify-center mb-1 transition-all"><i class="fas fa-image text-lg"></i></div>
                    <span class="text-[10px] font-bold">Image</span>
                </button>
                <button onclick="toggleShapeMenu(true)" class="flex flex-col items-center text-gray-500 hover:text-indigo-600 p-2 w-16 transition group">
                    <div class="w-10 h-10 rounded-2xl bg-gray-50 group-hover:bg-indigo-50 flex items-center justify-center mb-1 transition-all"><i class="fas fa-shapes text-lg"></i></div>
                    <span class="text-[10px] font-bold">Shapes</span>
                </button>
                <div class="flex flex-col items-center text-gray-500 p-2 w-16 relative group">
                    <input type="color" onchange="changeBgColor(this.value)" value="#ffffff" class="w-10 h-10 rounded-2xl cursor-pointer border-0 p-0 absolute top-2 opacity-0 z-10">
                    <div class="w-10 h-10 rounded-2xl bg-gradient-to-tr from-cyan-400 to-indigo-500 mb-1 flex items-center justify-center text-white transition transform group-hover:scale-110 shadow-sm border border-white"><i class="fas fa-fill-drip text-sm"></i></div>
                    <span class="text-[10px] font-bold">Background</span>
                </div>
            </nav>

            <nav id="shapeMenu" class="absolute inset-0 flex items-center justify-start gap-3 px-4 transition-transform duration-300 transform translate-x-full bg-white overflow-x-auto hide-scroll">
                <button onclick="toggleShapeMenu(false)" class="flex flex-col items-center text-gray-400 hover:text-gray-800 p-2 shrink-0 transition">
                    <div class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center mb-1"><i class="fas fa-arrow-left text-base"></i></div>
                    <span class="text-[10px] font-bold">Back</span>
                </button>
                <div class="w-px h-8 bg-gray-200 shrink-0"></div>
                <button onclick="addShape('rect')" class="hover:scale-110 shrink-0 transition p-2"><i class="fas fa-square text-3xl text-blue-500 shadow-sm rounded"></i></button>
                <button onclick="addShape('circle')" class="hover:scale-110 shrink-0 transition p-2"><i class="fas fa-circle text-3xl text-pink-500 shadow-sm rounded-full"></i></button>
                <button onclick="addShape('triangle')" class="hover:scale-110 shrink-0 transition p-2"><i class="fas fa-caret-up text-4xl text-yellow-500"></i></button>
                <button onclick="addShape('star')" class="hover:scale-110 shrink-0 transition p-2"><i class="fas fa-star text-3xl text-purple-500 drop-shadow-sm"></i></button>
                <button onclick="addShape('hexagon')" class="hover:scale-110 shrink-0 transition p-2"><i class="fas fa-cube text-3xl text-emerald-500 drop-shadow-sm"></i></button>
            </nav>
        </div>
    </div>

    <script>
        let canvas, undoStack = [], redoStack = [], objectInitialState = null, isProgrammaticSelection = false;

        const homeScreen = document.getElementById('homeScreen');
        const editorScreen = document.getElementById('editorScreen');
        const workspace = document.getElementById('workspace');
        const floatingAction = document.getElementById('floatingAction');
        const propertiesPanel = document.getElementById('propertiesPanel');
        const mainMenu = document.getElementById('mainMenu');
        const shapeMenu = document.getElementById('shapeMenu');

        // Navigation
        function openEditor() {
            homeScreen.classList.add('opacity-0');
            setTimeout(() => {
                homeScreen.classList.add('hidden');
                editorScreen.classList.remove('hidden');
                setTimeout(() => editorScreen.classList.remove('opacity-0'), 50);
                initCanvas();
            }, 300);
        }

        function closeEditor() {
            editorScreen.classList.add('opacity-0');
            setTimeout(() => {
                editorScreen.classList.add('hidden');
                homeScreen.classList.remove('hidden');
                setTimeout(() => homeScreen.classList.remove('opacity-0'), 50);
            }, 300);
        }

        function initCanvas() {
            if(!canvas) {
                let canvasWidth = window.innerWidth > 800 ? 800 : window.innerWidth - 32;
                let canvasHeight = canvasWidth * 0.5625;

                canvas = new fabric.Canvas('bannerCanvas', {
                    width: canvasWidth, height: canvasHeight, backgroundColor: '#ffffff', preserveObjectStacking: true
                });

                canvas.on('selection:created', handleSelection);
                canvas.on('selection:updated', handleSelection);
                canvas.on('object:moving', updateFloatingPosition);
                canvas.on('object:scaling', updateFloatingPosition);
                canvas.on('object:rotating', updateFloatingPosition);
                canvas.on('selection:cleared', handleDeselection);
                saveHistory();
            }
        }

        function hexToRgba(hex, alpha) {
            let r = parseInt(hex.slice(1, 3), 16) || 0, g = parseInt(hex.slice(3, 5), 16) || 0, b = parseInt(hex.slice(5, 7), 16) || 0;
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        function toggleShapeMenu(show) {
            if(show) {
                mainMenu.classList.replace('translate-x-0', '-translate-x-full');
                shapeMenu.classList.replace('translate-x-full', 'translate-x-0');
            } else {
                shapeMenu.classList.replace('translate-x-0', 'translate-x-full');
                mainMenu.classList.replace('-translate-x-full', 'translate-x-0');
            }
        }

        // History
        function saveHistory() { if(redoStack.length > 0) redoStack = []; undoStack.push(JSON.stringify(canvas)); }
        function undo() { if (undoStack.length > 1) { redoStack.push(undoStack.pop()); loadCanvasState(undoStack[undoStack.length - 1]); } }
        function redo() { if (redoStack.length > 0) { const next = redoStack.pop(); undoStack.push(next); loadCanvasState(next); } }
        function loadCanvasState(json) { isProgrammaticSelection = true; canvas.loadFromJSON(json, function() { canvas.renderAll(); isProgrammaticSelection = false; }); }

        // Selection
        function handleSelection() {
            if(isProgrammaticSelection) return;
            const obj = canvas.getActiveObject();
            if(!obj) return;
            objectInitialState = JSON.stringify(obj.toObject());
            configureSmartProperties(obj);
            propertiesPanel.classList.remove('translate-y-full');
            floatingAction.classList.remove('hidden');
            updateFloatingPosition();
        }

        function handleDeselection() {
            floatingAction.classList.add('hidden');
            propertiesPanel.classList.add('translate-y-full');
            objectInitialState = null;
        }

        function updateFloatingPosition() {
            const obj = canvas.getActiveObject();
            if(!obj) return;
            const bound = obj.getBoundingRect();
            const canvasOffset = document.querySelector('.canvas-container').getBoundingClientRect();
            const workspaceOffset = workspace.getBoundingClientRect();
            let topPos = (canvasOffset.top - workspaceOffset.top) + bound.top - 55;
            let leftPos = (canvasOffset.left - workspaceOffset.left) + bound.left + (bound.width / 2);
            if (topPos < 10) topPos = 10;
            floatingAction.style.top = `${topPos}px`;
            floatingAction.style.left = `${leftPos}px`;
            floatingAction.style.transform = `translateX(-50%)`;
        }

        function configureSmartProperties(obj) {
            const isText = obj.type === 'i-text';
            const isImage = obj.type === 'image';
            const isShape = ['rect', 'circle', 'triangle', 'polygon'].includes(obj.type);
            const hasPattern = obj.patternImgUrl !== undefined; // Check if custom pattern applied

            // Reset UI
            ['propColor', 'propShapeImage', 'propPatternControls', 'divSeparator', 'propOpacity', 'propStroke', 'propDelete'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
                document.getElementById(id).classList.remove('flex');
            });

            if(isText) {
                document.getElementById('propColor').classList.replace('hidden', 'flex');
                document.getElementById('propStroke').classList.replace('hidden', 'flex');
                document.getElementById('divSeparator').classList.replace('hidden', 'block');
            } else if (isShape) {
                document.getElementById('propColor').classList.replace('hidden', 'flex');
                document.getElementById('propShapeImage').classList.replace('hidden', 'flex');
                
                if(hasPattern) {
                    document.getElementById('propPatternControls').classList.replace('hidden', 'flex');
                    document.getElementById('itemPatternScale').value = obj.patternScale || 1;
                    document.getElementById('scaleVal').innerText = (obj.patternScale || 1) + 'x';
                    document.getElementById('itemPatternX').value = obj.patternOffsetX || 0;
                    document.getElementById('itemPatternY').value = obj.patternOffsetY || 0;
                }
                
                document.getElementById('propStroke').classList.replace('hidden', 'flex');
                document.getElementById('divSeparator').classList.replace('hidden', 'block');
            }
            
            document.getElementById('propOpacity').classList.replace('hidden', 'flex');
            document.getElementById('propDelete').classList.replace('hidden', 'flex');

            // Values Update
            if(typeof obj.baseFillColor === 'string') document.getElementById('itemColor').value = obj.baseFillColor;
            else if(typeof obj.fill === 'string' && obj.fill.startsWith('#')) document.getElementById('itemColor').value = obj.fill;
            
            document.getElementById('itemOpacity').value = obj.customOpacity !== undefined ? obj.customOpacity : 1;
            document.getElementById('opVal').innerText = Math.round((obj.customOpacity !== undefined ? obj.customOpacity : 1)*100)+'%';
            
            document.getElementById('strokeWidth').value = obj.strokeWidth || 0;
            document.getElementById('strokeVal').innerText = obj.strokeWidth || 0;
            if(obj.stroke) document.getElementById('strokeColor').value = obj.stroke;
        }

        function confirmChanges() { saveHistory(); canvas.discardActiveObject(); canvas.renderAll(); }
        function discardChanges() { const obj = canvas.getActiveObject(); if(obj && objectInitialState) obj.set(JSON.parse(objectInitialState)); canvas.discardActiveObject(); canvas.renderAll(); }

        // Tools
        function addText() { const text = new fabric.IText('Your Text', { left: canvas.width/2 - 60, top: canvas.height/2 - 20, fontFamily: 'Inter', fill: '#1e293b', fontSize: 36, fontWeight: '800' }); canvas.add(text); canvas.setActiveObject(text); }

        function addShape(type) {
            let shape; const cx = canvas.width/2 - 40, cy = canvas.height/2 - 40;
            if(type === 'rect') shape = new fabric.Rect({ left: cx, top: cy, fill: '#3b82f6', width: 80, height: 80, rx: 12, ry: 12 });
            else if (type === 'circle') shape = new fabric.Circle({ left: cx, top: cy, fill: '#ec4899', radius: 45 });
            else if (type === 'triangle') shape = new fabric.Triangle({ left: cx, top: cy, fill: '#eab308', width: 80, height: 80 });
            else if (type === 'star') shape = new fabric.Polygon([{x: 40, y: 0}, {x: 49, y: 28}, {x: 78, y: 28}, {x: 54, y: 46}, {x: 63, y: 73}, {x: 40, y: 56}, {x: 17, y: 73}, {x: 26, y: 46}, {x: 2, y: 28}, {x: 31, y: 28}], { left: cx, top: cy, fill: '#a855f7' });
            else if (type === 'hexagon') shape = new fabric.Polygon([{x: 40, y: 0}, {x: 80, y: 20}, {x: 80, y: 60}, {x: 40, y: 80}, {x: 0, y: 60}, {x: 0, y: 20}], { left: cx, top: cy, fill: '#10b981' });
            
            shape.set({ baseFillColor: shape.fill, customOpacity: 1, strokeWidth: 0 });
            canvas.add(shape); canvas.setActiveObject(shape); toggleShapeMenu(false);
        }

        function addImage(e) {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(f) {
                fabric.Image.fromURL(f.target.result, function(img) {
                    img.scaleToWidth(canvas.width / 2.5);
                    img.set({ selectable: true, evented: true, rx: 10, ry: 10, customOpacity: 1 });
                    canvas.add(img); canvas.centerObject(img); canvas.setActiveObject(img); saveHistory();
                });
            }; reader.readAsDataURL(file); e.target.value = ''; 
        }

        function changeBgColor(color) { canvas.backgroundColor = color; canvas.renderAll(); saveHistory(); }

        // --- SHAPE PATTERN LOGIC (Position, Scale, Opacity) ---
        function fillShapeWithImage(e) {
            const file = e.target.files[0]; if(!file) return;
            const obj = canvas.getActiveObject();
            if(!obj || !['rect', 'circle', 'triangle', 'polygon'].includes(obj.type)) return;

            const reader = new FileReader();
            reader.onload = function(f) {
                obj.set({
                    patternImgUrl: f.target.result,
                    patternScale: 1, patternOffsetX: 0, patternOffsetY: 0
                });
                applyPatternToShape(obj);
                saveHistory();
            };
            reader.readAsDataURL(file); e.target.value = ''; 
        }

        function changePatternProps(prop, val) {
            const obj = canvas.getActiveObject();
            if(obj && obj.patternImgUrl) {
                if(prop === 'scale') { obj.set('patternScale', parseFloat(val)); document.getElementById('scaleVal').innerText = val + 'x'; }
                if(prop === 'x') obj.set('patternOffsetX', parseInt(val));
                if(prop === 'y') obj.set('patternOffsetY', parseInt(val));
                applyPatternToShape(obj);
            }
        }

        function applyPatternToShape(obj) {
            if(!obj.patternImgUrl) return;
            const imgEl = new Image();
            imgEl.src = obj.patternImgUrl;
            imgEl.onload = function() {
                // Apply Opacity to pattern source image using an offscreen canvas
                let op = obj.customOpacity !== undefined ? obj.customOpacity : 1;
                let tempCanvas = document.createElement('canvas');
                tempCanvas.width = imgEl.width; tempCanvas.height = imgEl.height;
                let ctx = tempCanvas.getContext('2d');
                ctx.globalAlpha = op;
                ctx.drawImage(imgEl, 0, 0);

                let scale = obj.patternScale || 1;
                // Base scale so image roughly fits shape initially
                let baseScale = (obj.width / imgEl.width) * scale;

                const pattern = new fabric.Pattern({
                    source: tempCanvas,
                    repeat: 'no-repeat'
                });
                
                // Matrix: [scaleX, skewX, skewY, scaleY, translateX, translateY]
                pattern.matrix = [baseScale, 0, 0, baseScale, obj.patternOffsetX || 0, obj.patternOffsetY || 0];
                obj.set('fill', pattern);
                obj.set('opacity', 1); // Keep stroke full opacity
                
                configureSmartProperties(obj); // Reveal sliders
                canvas.renderAll();
            };
        }

        // --- Smart Properties Updates ---
        function changeColor(hex) {
            const obj = canvas.getActiveObject();
            if(obj) { 
                obj.set('patternImgUrl', undefined); // Remove pattern if color clicked
                obj.set('baseFillColor', hex);
                let op = obj.customOpacity !== undefined ? obj.customOpacity : 1;
                obj.set('fill', op < 1 ? hexToRgba(hex, op) : hex);
                obj.set('opacity', 1);
                configureSmartProperties(obj);
                canvas.renderAll(); 
            }
        }

        function changeOpacity(val) {
            const obj = canvas.getActiveObject(); if(!obj) return;
            obj.set('customOpacity', parseFloat(val));
            
            if (obj.type === 'image' || obj.type === 'i-text') {
                obj.set('opacity', parseFloat(val));
            } else if (obj.patternImgUrl) {
                applyPatternToShape(obj); // Re-draw pattern with new opacity
            } else {
                let baseColor = obj.baseFillColor || obj.fill;
                if(typeof baseColor === 'string' && baseColor.startsWith('#')) {
                    obj.set('fill', hexToRgba(baseColor, parseFloat(val)));
                    obj.set('opacity', 1); 
                }
            }
            canvas.renderAll();
        }

        function changeStroke(color, width) {
            const obj = canvas.getActiveObject();
            if(obj) {
                if(color !== null) { obj.set('stroke', color); if(!obj.strokeWidth) obj.set('strokeWidth', 2); }
                if(width !== null) obj.set('strokeWidth', parseInt(width));
                canvas.renderAll();
            }
        }

        function deleteObject() {
            const activeObjects = canvas.getActiveObjects();
            if (activeObjects.length) { canvas.discardActiveObject(); activeObjects.forEach(obj => canvas.remove(obj)); saveHistory(); handleDeselection(); }
        }

        function exportBanner() {
            canvas.discardActiveObject(); canvas.renderAll();
            const dataURL = canvas.toDataURL({ format: 'png', quality: 1, multiplier: 3 }); 
            const link = document.createElement('a'); link.download = 'ProBanner-HighRes.png';
            link.href = dataURL; document.body.appendChild(link); link.click(); document.body.removeChild(link);
        }
    </script>
</body>
</html>
