<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BannerPro | Premium Canvas Editor</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Anek+Bangla:wght@400;700&family=Baloo+Da+2:wght@500;700&family=Galada&family=Hind+Siliguri:wght@400;600;700&family=Mina:wght@400;700&family=Noto+Sans+Bengali:wght@400;700&family=Tiro+Bangla:ital@0;1&family=Poppins:wght@400;600&family=Roboto:wght@400;700&family=Open+Sans:wght@400;700&family=Montserrat:wght@400;700&family=Lato:wght@400;700&family=Oswald:wght@400;700&family=Raleway:wght@400;700&family=Playfair+Display:wght@400;700&family=Merriweather:wght@400;700&family=Nunito:wght@400;700&family=Ubuntu:wght@400;700&family=Rubik:wght@400;700&family=Work+Sans:wght@400;700&family=Lora:wght@400;700&family=Fira+Sans:wght@400;700&family=Quicksand:wght@400;700&family=Dancing+Script:wght@400;700&family=Pacifico&family=Caveat:wght@400;700&family=Satisfy&family=Courgette&family=Great+Vibes&family=Lobster&family=Righteous&display=swap" rel="stylesheet">

    <script src="templates.js"></script>

    <style>
        body { font-family: 'Poppins', 'Hind Siliguri', sans-serif; height: 100vh; display: flex; flex-direction: column; background-color: #f1f5f9; overflow: hidden; touch-action: manipulation; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        
        .tab-content { display: none; opacity: 0; transition: opacity 0.3s ease; }
        .tab-content.active { display: block; opacity: 1; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .font-item.selected { border-color: #4f46e5; background-color: #eef2ff; color: #4338ca; font-weight: 600; }
        .canvas-container { margin: 0 auto; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); border-radius: 4px; overflow: hidden; touch-action: none; }
        .history-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .bottom-panel { border-top-left-radius: 20px; border-top-right-radius: 20px; box-shadow: 0 -4px 20px rgba(0,0,0,0.08); }
        .custom-textarea { resize: none; border: 2px solid #e2e8f0; transition: border-color 0.2s; }
        .custom-textarea:focus { border-color: #6366f1; outline: none; }
        
        /* Gradient Button Hover */
        .grad-btn:active { transform: scale(0.9); transition: transform 0.1s; }
    </style>
</head>
<body class="text-gray-800 flex flex-col h-screen">

    <header class="bg-white px-4 py-3 flex justify-between items-center z-20 shrink-0 shadow-sm">
        <div class="flex items-center gap-2">
            <div class="bg-indigo-600 p-1.5 rounded-md flex items-center justify-center text-white">
                <i class="fa-solid fa-layer-group text-sm"></i>
            </div>
            <h1 class="text-xl font-bold text-gray-800 tracking-tight">ব্যানার<span class="text-indigo-600">প্রো</span></h1>
        </div>
        
        <div class="flex items-center gap-3">
            <div class="flex gap-2 bg-gray-100 px-3 py-1.5 rounded-full">
                <button id="undoBtn" onclick="undo()" class="history-btn text-gray-700 text-lg active:scale-90 transition-transform" disabled><i class="fa-solid fa-arrow-rotate-left"></i></button>
                <div class="w-px h-5 bg-gray-300 self-center"></div>
                <button id="redoBtn" onclick="redo()" class="history-btn text-gray-700 text-lg active:scale-90 transition-transform" disabled><i class="fa-solid fa-arrow-rotate-right"></i></button>
            </div>
            <button onclick="downloadBanner()" class="bg-indigo-600 hover:bg-indigo-700 active:scale-95 text-white px-4 py-2 rounded-full font-medium transition-all text-sm flex items-center gap-1.5 shadow-md shadow-indigo-200">
                <i class="fa-solid fa-cloud-arrow-down"></i> সেভ
            </button>
        </div>
    </header>

    <main class="flex-none flex items-center justify-center p-3 relative bg-slate-200" style="height: 45vh;">
        <div id="canvasWrapper" class="relative w-full h-full flex items-center justify-center">
            <canvas id="bannerCanvas"></canvas>
        </div>
    </main>

    <div class="flex-1 flex flex-col bg-white bottom-panel z-10 overflow-hidden relative -mt-3 pt-2">
        
        <div class="flex px-4 pt-2 border-b border-gray-100 shrink-0">
            <button id="templatesTabBtn" onclick="openTab('templatesTab')" class="flex-1 pb-3 text-sm font-semibold text-indigo-600 border-b-2 border-indigo-600 transition-colors">
                <i class="fa-regular fa-clone mr-1"></i> টেমপ্লেট
            </button>
            <button id="toolsTabBtn" onclick="openTab('toolsTab')" class="flex-1 pb-3 text-sm font-semibold text-gray-400 hover:text-gray-600 transition-colors">
                <i class="fa-solid fa-pen-nib mr-1"></i> এডিট টুলস
            </button>
        </div>

        <div class="flex-1 overflow-y-auto pb-6">
            
            <div id="templatesTab" class="tab-content active p-4">
                <div id="templateList" class="grid grid-cols-2 gap-4"></div>
            </div>

            <div id="toolsTab" class="tab-content p-4 space-y-4">
                
                <div class="grid grid-cols-3 gap-3">
                    <button onclick="addText()" class="bg-slate-50 active:bg-slate-100 text-slate-700 py-2.5 rounded-xl font-medium text-[11px] border border-slate-200 flex flex-col items-center gap-1 transition-colors">
                        <i class="fa-solid fa-font text-lg text-indigo-500"></i> টেক্সট
                    </button>
                    <label class="bg-slate-50 active:bg-slate-100 text-slate-700 py-2.5 rounded-xl font-medium text-[11px] border border-slate-200 flex flex-col items-center gap-1 transition-colors cursor-pointer">
                        <i class="fa-regular fa-image text-lg text-emerald-500"></i> ছবি
                        <input type="file" id="imageLoader" class="hidden" accept="image/*">
                    </label>
                    <button onclick="deleteObject()" class="bg-red-50 active:bg-red-100 text-red-600 py-2.5 rounded-xl font-medium text-[11px] border border-red-100 flex flex-col items-center gap-1 transition-colors">
                        <i class="fa-regular fa-trash-can text-lg"></i> মুছুন
                    </button>
                </div>

                <div>
                    <label class="text-[10px] font-semibold text-gray-400 uppercase tracking-wider mb-2 block pl-1">শেইপ যোগ করুন</label>
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="addShape('rect')" class="p-2 bg-white border border-gray-200 rounded-lg shadow-sm text-gray-500 active:bg-gray-50 flex justify-center"><i class="fa-solid fa-square"></i></button>
                        <button onclick="addShape('circle')" class="p-2 bg-white border border-gray-200 rounded-lg shadow-sm text-gray-500 active:bg-gray-50 flex justify-center"><i class="fa-solid fa-circle"></i></button>
                        <button onclick="addShape('triangle')" class="p-2 bg-white border border-gray-200 rounded-lg shadow-sm text-gray-500 active:bg-gray-50 flex justify-center"><i class="fa-solid fa-caret-up text-lg"></i></button>
                    </div>
                </div>

                <div id="noSelectionPanel" class="flex flex-col items-center justify-center py-4 text-center bg-gray-50 rounded-xl border border-dashed border-gray-200">
                    <div class="bg-white p-2 rounded-full shadow-sm mb-2"><i class="fa-solid fa-hand-pointer text-indigo-300"></i></div>
                    <p class="text-[11px] text-gray-400 max-w-[200px]">এডিট করতে যেকোনো লেখা বা শেইপে ক্লিক করুন।</p>
                </div>

                <div id="editPanel" class="hidden space-y-4">
                    
                    <div id="textOnlyFeatures" class="space-y-4">
                        <div>
                            <label class="text-[11px] font-semibold text-indigo-500 uppercase tracking-wider mb-1 block pl-1"><i class="fa-solid fa-keyboard"></i> লেখা এডিট করুন</label>
                            <textarea id="externalTextInput" class="w-full custom-textarea rounded-xl p-3 text-sm bg-gray-50 text-gray-800" rows="2" placeholder="টেক্সট লিখুন..."></textarea>
                        </div>
                        
                        <div class="px-1">
                            <div class="flex justify-between items-center mb-1">
                                <label class="text-[10px] font-semibold text-gray-500 uppercase tracking-wider">টেক্সট সাইজ</label>
                                <span id="fontSizeDisplay" class="text-[10px] text-gray-400 font-mono">60</span>
                            </div>
                            <input type="range" id="fontSizeSlider" min="20" max="250" value="60" oninput="changeFontSize(this.value)" onchange="saveHistory()" class="w-full h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-indigo-600">
                        </div>
                    </div>

                    <div class="p-3 bg-slate-50 rounded-xl border border-slate-100">
                        <div class="flex justify-between items-center gap-4 mb-3">
                            <div class="flex-1">
                                <label class="text-[10px] font-semibold text-gray-500 uppercase tracking-wider mb-1 block">সলিড কালার</label>
                                <div class="relative w-full h-8 rounded-lg overflow-hidden border border-gray-200 shadow-sm">
                                    <input type="color" id="colorPicker" onchange="changeColor(this.value)" class="absolute -top-2 -left-2 w-16 h-16 cursor-pointer">
                                </div>
                            </div>
                            <div id="alignmentFeature" class="flex-1">
                                <label class="text-[10px] font-semibold text-gray-500 uppercase tracking-wider mb-1 block">এলাইনমেন্ট</label>
                                <div class="flex gap-1 bg-white border border-gray-200 rounded-lg p-1 shadow-sm h-8">
                                    <button onclick="changeAlignment('left')" class="flex-1 rounded bg-white text-gray-600 active:bg-gray-100 flex items-center justify-center"><i class="fa-solid fa-align-left text-[10px]"></i></button>
                                    <button onclick="changeAlignment('center')" class="flex-1 rounded bg-white text-gray-600 active:bg-gray-100 flex items-center justify-center"><i class="fa-solid fa-align-center text-[10px]"></i></button>
                                    <button onclick="changeAlignment('right')" class="flex-1 rounded bg-white text-gray-600 active:bg-gray-100 flex items-center justify-center"><i class="fa-solid fa-align-right text-[10px]"></i></button>
                                </div>
                            </div>
                        </div>

                        <div>
                            <label class="text-[10px] font-semibold text-gray-500 uppercase tracking-wider mb-1.5 block">গ্রেডিয়েন্ট কালার</label>
                            <div class="flex gap-2 overflow-x-auto pb-1" style="scrollbar-width: none;">
                                <button onclick="applyGradient('#ff9a9e', '#fecfef')" class="grad-btn w-8 h-8 rounded-full shadow-sm border border-white flex-shrink-0" style="background: linear-gradient(135deg, #ff9a9e, #fecfef);"></button>
                                <button onclick="applyGradient('#f6d365', '#fda085')" class="grad-btn w-8 h-8 rounded-full shadow-sm border border-white flex-shrink-0" style="background: linear-gradient(135deg, #f6d365, #fda085);"></button>
                                <button onclick="applyGradient('#84fab0', '#8fd3f4')" class="grad-btn w-8 h-8 rounded-full shadow-sm border border-white flex-shrink-0" style="background: linear-gradient(135deg, #84fab0, #8fd3f4);"></button>
                                <button onclick="applyGradient('#a18cd1', '#fbc2eb')" class="grad-btn w-8 h-8 rounded-full shadow-sm border border-white flex-shrink-0" style="background: linear-gradient(135deg, #a18cd1, #fbc2eb);"></button>
                                <button onclick="applyGradient('#ff0844', '#ffb199')" class="grad-btn w-8 h-8 rounded-full shadow-sm border border-white flex-shrink-0" style="background: linear-gradient(135deg, #ff0844, #ffb199);"></button>
                                <button onclick="applyGradient('#30cfd0', '#330867')" class="grad-btn w-8 h-8 rounded-full shadow-sm border border-white flex-shrink-0" style="background: linear-gradient(135deg, #30cfd0, #330867);"></button>
                            </div>
                        </div>
                    </div>

                    <div id="fontFeature">
                        <label class="text-[11px] font-semibold text-gray-500 uppercase tracking-wider mb-2 block pl-1">ফন্ট স্টাইল পরিবর্তন করুন</label>
                        <div id="fontListContainer" class="grid grid-cols-2 gap-2 max-h-40 overflow-y-auto px-1 pb-2">
                            </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        const CANVAS_WIDTH = 900;
        const CANVAS_HEIGHT = 1200;

        const canvas = new fabric.Canvas('bannerCanvas', {
            width: CANVAS_WIDTH,
            height: CANVAS_HEIGHT,
            backgroundColor: '#ffffff',
            preserveObjectStacking: true
        });

        // --- Responsive Resizing ---
        function resizeCanvas() {
            const wrapper = document.getElementById('canvasWrapper');
            const padding = 20; 
            const scaleX = (wrapper.clientWidth - padding) / CANVAS_WIDTH;
            const scaleY = (wrapper.clientHeight - padding) / CANVAS_HEIGHT;
            const scale = Math.min(scaleX, scaleY); 
            canvas.setZoom(scale);
            canvas.setWidth(CANVAS_WIDTH * scale);
            canvas.setHeight(CANVAS_HEIGHT * scale);
        }
        window.addEventListener('resize', resizeCanvas);
        setTimeout(resizeCanvas, 100);

        // --- Perfect Undo/Redo Engine ---
        let historyData = [];
        let historyIndex = -1;
        let isTrackingHistory = false;

        function saveHistory() {
            if (!isTrackingHistory) return;
            historyData = historyData.slice(0, historyIndex + 1);
            historyData.push(JSON.stringify(canvas.toJSON()));
            historyIndex++;
            updateHistoryButtons();
        }

        function updateHistoryButtons() {
            document.getElementById('undoBtn').disabled = historyIndex <= 0;
            document.getElementById('redoBtn').disabled = historyIndex >= historyData.length - 1;
        }

        function undo() {
            if (historyIndex > 0) {
                isTrackingHistory = false;
                historyIndex--;
                canvas.loadFromJSON(historyData[historyIndex], function() {
                    canvas.renderAll();
                    isTrackingHistory = true;
                    updateHistoryButtons();
                });
            }
        }

        function redo() {
            if (historyIndex < historyData.length - 1) {
                isTrackingHistory = false;
                historyIndex++;
                canvas.loadFromJSON(historyData[historyIndex], function() {
                    canvas.renderAll();
                    isTrackingHistory = true;
                    updateHistoryButtons();
                });
            }
        }

        canvas.on('object:modified', saveHistory);
        canvas.on('object:added', saveHistory);
        canvas.on('object:removed', saveHistory);

        // --- Prevent Default Keyboard on Canvas ---
        canvas.on('object:added', function(e) {
            if(e.target.type === 'i-text') {
                e.target.set({ editable: false });
            }
        });

        // --- EXTERNAL TEXT EDITOR & SIZE SLIDER ---
        const textInput = document.getElementById('externalTextInput');
        const fontSizeSlider = document.getElementById('fontSizeSlider');
        const fontSizeDisplay = document.getElementById('fontSizeDisplay');
        
        textInput.addEventListener('input', function(e) {
            const obj = canvas.getActiveObject();
            if (obj && obj.type === 'i-text') {
                obj.set('text', e.target.value);
                canvas.requestRenderAll();
            }
        });
        textInput.addEventListener('change', saveHistory);

        function changeFontSize(value) {
            const obj = canvas.getActiveObject();
            if (obj && obj.type === 'i-text') {
                obj.set('fontSize', parseInt(value));
                fontSizeDisplay.innerText = value;
                canvas.requestRenderAll();
            }
        }

        // --- Add Shapes Logic ---
        function addShape(type) {
            let shape;
            const center = canvas.getCenter();
            const commonProps = { left: center.left, top: center.top, originX: 'center', originY: 'center', fill: '#cbd5e1' };

            if (type === 'rect') {
                shape = new fabric.Rect({ ...commonProps, width: 200, height: 200, rx: 10, ry: 10 });
            } else if (type === 'circle') {
                shape = new fabric.Circle({ ...commonProps, radius: 100 });
            } else if (type === 'triangle') {
                shape = new fabric.Triangle({ ...commonProps, width: 200, height: 200 });
            }

            if (shape) {
                canvas.add(shape);
                canvas.setActiveObject(shape);
                saveHistory();
            }
        }

        // --- Apply Gradients Logic ---
        function applyGradient(color1, color2) {
            const obj = canvas.getActiveObject();
            if (!obj) return;

            // Fabric 5 percentage-based gradient (responsive to object scaling)
            let grad = new fabric.Gradient({
                type: 'linear',
                gradientUnits: 'percentage',
                coords: { x1: 0, y1: 0, x2: 1, y2: 1 }, // Diagonal gradient
                colorStops: [
                    { offset: 0, color: color1 },
                    { offset: 1, color: color2 }
                ]
            });

            obj.set('fill', grad);
            canvas.requestRenderAll();
            saveHistory();
        }

        // --- Advanced Template Rendering ---
        function initTemplates() {
            const list = document.getElementById('templateList');
            if (window.bannerTemplates) {
                window.bannerTemplates.forEach(template => {
                    const btn = document.createElement('button');
                    btn.className = "flex flex-col bg-white border border-slate-200 rounded-xl overflow-hidden active:scale-95 transition-transform shadow-sm hover:shadow-md text-left";
                    btn.onclick = () => loadTemplate(template.id);
                    
                    let previewHTML = '';
                    let textCount = 0;
                    template.data.objects.forEach(obj => {
                        if (obj.type === 'circle') {
                            previewHTML += `<div style="width: 40px; height: 40px; border-radius: 50%; background-color: ${obj.fill === 'transparent' ? 'transparent' : '#ffffff'}; border: 2px solid ${obj.stroke || 'transparent'}; margin: 5px auto;"></div>`;
                        } else if (obj.type === 'i-text' && textCount < 3) {
                            previewHTML += `<div style="color: ${obj.fill}; font-size: 8px; font-weight: bold; margin-top: 3px; text-align: center; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 0 4px;">${obj.text}</div>`;
                            textCount++;
                        }
                    });
                    if(previewHTML === '') { previewHTML = `<div class="w-10 h-10 rounded-full bg-white/30 mb-2"></div><div class="w-2/3 h-1.5 bg-white/50 rounded-full"></div>`; }

                    btn.innerHTML = `
                        <div style="background-color: ${template.bgColor}" class="w-full aspect-[3/4] flex flex-col items-center justify-center p-2 relative overflow-hidden">${previewHTML}</div>
                        <div class="p-2.5 w-full bg-white border-t border-slate-100">
                            <span class="text-[9px] font-bold text-indigo-500 uppercase tracking-wide">ID: ${template.id}</span>
                            <h3 class="text-[11px] font-semibold text-gray-800 mt-0.5 truncate">${template.name}</h3>
                        </div>
                    `;
                    list.appendChild(btn);
                });
                loadTemplate(1); 
            }
        }
        window.onload = initTemplates;

        function loadTemplate(id) {
            const template = window.bannerTemplates.find(t => t.id === id);
            if (!template) return;
            
            isTrackingHistory = false;
            canvas.loadFromJSON(JSON.stringify(template.data), () => {
                canvas.getObjects().forEach(obj => { if(obj.type === 'i-text') obj.set({ editable: false }); });
                canvas.requestRenderAll();
                openTab('toolsTab');
                onSelectionCleared();
                historyData = [JSON.stringify(canvas.toJSON())];
                historyIndex = 0;
                isTrackingHistory = true;
                updateHistoryButtons();
            });
        }

        // --- 50+ Fonts Setup ---
        const fontCollection = [
            { name: 'আনেক বাংলা', family: 'Anek Bangla' }, { name: 'বালু দা ২', family: 'Baloo Da 2' },
            { name: 'গালাদা', family: 'Galada' }, { name: 'হিন্দ শিলিগুড়ি', family: 'Hind Siliguri' },
            { name: 'তীরো বাংলা', family: 'Tiro Bangla' }, { name: 'মিনা', family: 'Mina' },
            { name: 'নোটো সান্স', family: 'Noto Sans Bengali' }, { name: 'Poppins', family: 'Poppins' },
            { name: 'Roboto', family: 'Roboto' }, { name: 'Open Sans', family: 'Open Sans' },
            { name: 'Montserrat', family: 'Montserrat' }, { name: 'Lato', family: 'Lato' },
            { name: 'Oswald', family: 'Oswald' }, { name: 'Raleway', family: 'Raleway' },
            { name: 'Playfair Display', family: 'Playfair Display' }, { name: 'Merriweather', family: 'Merriweather' },
            { name: 'Nunito', family: 'Nunito' }, { name: 'Ubuntu', family: 'Ubuntu' },
            { name: 'Rubik', family: 'Rubik' }, { name: 'Work Sans', family: 'Work Sans' },
            { name: 'Lora', family: 'Lora' }, { name: 'Fira Sans', family: 'Fira Sans' },
            { name: 'Quicksand', family: 'Quicksand' }, { name: 'Pacifico', family: 'Pacifico' },
            { name: 'Caveat', family: 'Caveat' }, { name: 'Dancing Script', family: 'Dancing Script' },
            { name: 'Satisfy', family: 'Satisfy' }, { name: 'Courgette', family: 'Courgette' },
            { name: 'Great Vibes', family: 'Great Vibes' }, { name: 'Lobster', family: 'Lobster' },
            { name: 'Righteous', family: 'Righteous' }
        ];

        function initFonts() {
            const container = document.getElementById('fontListContainer');
            fontCollection.forEach(font => {
                const div = document.createElement('div');
                div.className = "font-item cursor-pointer border border-slate-200 rounded-lg py-2 px-2 text-center text-[11px] transition-colors text-slate-700 truncate";
                div.style.fontFamily = `'${font.family}', sans-serif`;
                div.innerText = font.name;
                div.onclick = () => {
                    document.querySelectorAll('.font-item').forEach(el => el.classList.remove('selected'));
                    div.classList.add('selected');
                    const activeObj = canvas.getActiveObject();
                    if(activeObj && activeObj.type === 'i-text') {
                        activeObj.set('fontFamily', font.family);
                        canvas.requestRenderAll();
                        saveHistory();
                    }
                };
                container.appendChild(div);
            });
        }
        initFonts();

        // --- UI Events Based on Selection (Dynamic Panel) ---
        canvas.on('selection:created', onObjectSelected);
        canvas.on('selection:updated', onObjectSelected);
        canvas.on('selection:cleared', onSelectionCleared);

        function onObjectSelected(e) {
            if (canvas.getActiveObjects().length > 1) { onSelectionCleared(); return; }

            const obj = canvas.getActiveObject();
            document.getElementById('noSelectionPanel').classList.add('hidden');
            document.getElementById('editPanel').classList.remove('hidden');
            
            // Set Color Picker Value if solid color
            if (obj.fill && typeof obj.fill === 'string' && !obj.fill.startsWith('url')) {
                document.getElementById('colorPicker').value = obj.fill;
            }

            if (obj && obj.type === 'i-text') {
                // Show Text specific tools
                document.getElementById('textOnlyFeatures').style.display = 'block';
                document.getElementById('alignmentFeature').style.display = 'block';
                document.getElementById('fontFeature').style.display = 'block';
                
                textInput.value = obj.text;
                fontSizeSlider.value = obj.fontSize;
                fontSizeDisplay.innerText = obj.fontSize;
                openTab('toolsTab');
            } else {
                // Hide Text specific tools for Shapes/Images
                document.getElementById('textOnlyFeatures').style.display = 'none';
                document.getElementById('alignmentFeature').style.display = 'none';
                document.getElementById('fontFeature').style.display = 'none';
                textInput.value = '';
            }
        }

        function onSelectionCleared() {
            document.getElementById('editPanel').classList.add('hidden');
            document.getElementById('noSelectionPanel').classList.remove('hidden');
            document.querySelectorAll('.font-item').forEach(el => el.classList.remove('selected'));
            textInput.value = '';
        }

        function addText() {
            const text = new fabric.IText('আপনার লেখা', { 
                left: CANVAS_WIDTH/2, top: CANVAS_HEIGHT/2, originX: 'center', originY: 'center',
                fontFamily: 'Hind Siliguri', fontSize: 60, fill: '#1e293b', editable: false
            });
            canvas.add(text);
            canvas.setActiveObject(text);
            saveHistory();
        }

        // --- Advanced Image Upload ---
        document.getElementById('imageLoader').addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (event) {
                const targetObj = canvas.getActiveObject();
                
                fabric.Image.fromURL(event.target.result, function(img) {
                    isTrackingHistory = false;

                    // Apply image to circle, rect, or triangle mask
                    if (targetObj && (targetObj.type === 'circle' || targetObj.type === 'rect' || targetObj.type === 'triangle')) {
                        let width = targetObj.width * targetObj.scaleX;
                        let height = targetObj.height * targetObj.scaleY;
                        if(targetObj.type === 'circle') {
                            width = targetObj.radius * 2 * targetObj.scaleX;
                            height = width;
                        }
                        let center = targetObj.getCenterPoint();

                        let clipPath;
                        if(targetObj.type === 'circle') {
                            clipPath = new fabric.Circle({ radius: width/2, left: center.x, top: center.y, originX: 'center', originY: 'center', absolutePositioned: true });
                        } else if(targetObj.type === 'rect') {
                            clipPath = new fabric.Rect({ width: width, height: height, left: center.x, top: center.y, originX: 'center', originY: 'center', rx: targetObj.rx, ry: targetObj.ry, absolutePositioned: true });
                        } else if(targetObj.type === 'triangle') {
                            clipPath = new fabric.Triangle({ width: width, height: height, left: center.x, top: center.y, originX: 'center', originY: 'center', absolutePositioned: true });
                        }

                        let scale = Math.max(width / img.width, height / img.height);
                        
                        img.set({
                            left: center.x, top: center.y, originX: 'center', originY: 'center', scaleX: scale, scaleY: scale, clipPath: clipPath
                        });

                        canvas.remove(targetObj);
                        canvas.add(img);
                        canvas.setActiveObject(img);
                    } 
                    else {
                        const scale = (CANVAS_WIDTH * 0.4) / img.width; 
                        img.set({ left: CANVAS_WIDTH/2, top: CANVAS_HEIGHT/2, originX: 'center', originY: 'center', scaleX: scale, scaleY: scale });
                        canvas.add(img);
                        canvas.setActiveObject(img);
                    }

                    e.target.value = ''; 
                    isTrackingHistory = true; 
                    saveHistory(); 
                });
            }
            reader.readAsDataURL(file);
        });

        function changeColor(color) {
            const obj = canvas.getActiveObject();
            if (obj) { obj.set("fill", color); canvas.requestRenderAll(); saveHistory(); }
        }

        function changeAlignment(align) {
            const obj = canvas.getActiveObject();
            if (obj && obj.type === 'i-text') { obj.set("textAlign", align); canvas.requestRenderAll(); saveHistory(); }
        }

        function deleteObject() {
            const activeObjects = canvas.getActiveObjects();
            if (activeObjects.length) {
                activeObjects.forEach(obj => canvas.remove(obj));
                canvas.discardActiveObject();
                saveHistory();
            } else {
                alert('প্রথমে ক্যানভাস থেকে কিছু সিলেক্ট করুন');
            }
        }

        function downloadBanner() {
            canvas.discardActiveObject();
            canvas.requestRenderAll();
            const dataURL = canvas.toDataURL({ format: 'jpeg', quality: 1, multiplier: 2 }); 
            const link = document.createElement('a');
            link.href = dataURL;
            link.download = `BannerPro_${new Date().getTime()}.jpg`;
            link.click();
        }

        function openTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            
            const btnClassInactive = "flex-1 pb-3 text-sm font-semibold text-gray-400 hover:text-gray-600 transition-colors border-b-2 border-transparent";
            const btnClassActive = "flex-1 pb-3 text-sm font-semibold text-indigo-600 border-b-2 border-indigo-600 transition-colors";
            
            document.getElementById('templatesTabBtn').className = btnClassInactive;
            document.getElementById('toolsTabBtn').className = btnClassInactive;
            document.getElementById(tabId + 'Btn').className = btnClassActive;
        }
    </script>
</body>
</html>
