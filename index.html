        ::-webkit-scrollbar { width: 0px; background: transparent; }

        .tab-content.active { display: block; }

        <div id="toolsTab" class="tab-content p-4 space-y-5">

            height: CANVAS_HEIGHT,

            selection: false // Disable group selection on mobile for easier tapping
        });

        // Perfect Mobile Resizing
        function resizeCanvas() {
            const wrapper = document.getElementById('canvasWrapper');
            const containerWidth = wrapper.clientWidth; 
            const containerHeight = wrapper.clientHeight;
            
            const scaleX = containerWidth / CANVAS_WIDTH;
            const scaleY = containerHeight / CANVAS_HEIGHT;
            const scale = Math.min(scaleX, scaleY); 

            canvas.setZoom(scale);
            canvas.setWidth(CANVAS_WIDTH * scale);
            canvas.setHeight(CANVAS_HEIGHT * scale);
        }
        window.addEventListener('resize', resizeCanvas);
        setTimeout(resizeCanvas, 200);

        // টেমপ্লেট লোড করা (Mobile Grid)
        function initTemplates() {
            const list = document.getElementById('templateList');
            bannerTemplates.forEach(template => {
                const btn = document.createElement('button');
                btn.className = "flex flex-col bg-white border border-gray-200 rounded-lg overflow-hidden active:bg-gray-50 shadow-sm";
                btn.onclick = () => loadTemplate(template.id);
                
                btn.innerHTML = `
                    <div style="background-color: ${template.bgColor}" class="w-full aspect-[3/4] flex items-center justify-center p-2 relative">
                        <div class="w-8 h-8 rounded-full border border-white/40"></div>
                        <div class="absolute bottom-4 w-1/2 h-1 bg-white/50 rounded"></div>
                    </div>
                    <div class="p-2 text-center w-full">
                        <span class="text-xs font-semibold text-gray-700">${template.name}</span>
                    </div>
                `;
                list.appendChild(btn);
            });
            loadTemplate(1);
        }
        initTemplates();

        function loadTemplate(id) {
            const template = bannerTemplates.find(t => t.id === id);
            if (!template) return;
            canvas.loadFromJSON(JSON.stringify(template.data), () => {
                canvas.requestRenderAll();
                openTab('toolsTab'); // Switch to tools tab after loading
                onSelectionCleared(); // Reset panels
            });
        }

            { name: 'তীরো বাংলা (ক্লাসিক)', family: 'Tiro Bangla' },
            { name: 'মিনা (সিম্পল)', family: 'Mina' },
            { name: 'ইংলিশ (মডার্ন)', family: 'Poppins' }
        ];

        function initFonts() {
            const container = document.getElementById('fontListContainer');
            fonts.forEach(font => {
                const div = document.createElement('div');
                div.className = "font-item cursor-pointer border rounded p-2 text-center text-sm active:bg-gray-100";
                div.style.fontFamily = `'${font.family}', sans-serif`;
                div.innerText = font.name;
                div.onclick = () => {
                    document.querySelectorAll('.font-item').forEach(el => el.classList.remove('selected'));
                    div.classList.add('selected');
                    const activeObj = canvas.getActiveObject();
                    if(activeObj && activeObj.type === 'i-text') {
                        activeObj.set('fontFamily', font.family);
                        canvas.requestRenderAll();
                    }
                };
                container.appendChild(div);
            });
        }
        initFonts();

        // Canvas Events
        canvas.on('selection:created', onObjectSelected);
        canvas.on('selection:updated', onObjectSelected);
        canvas.on('selection:cleared', onSelectionCleared);

        function onObjectSelected(e) {
            const obj = e.target;
            document.getElementById('noSelectionPanel').classList.add('hidden');
            
            if (obj.type === 'i-text') {
                document.getElementById('textEditPanel').classList.remove('hidden');
                document.getElementById('colorPicker').value = obj.fill;
            } else {
                document.getElementById('textEditPanel').classList.add('hidden');
            }
        }

        function onSelectionCleared() {
            document.getElementById('textEditPanel').classList.add('hidden');
            document.getElementById('noSelectionPanel').classList.remove('hidden');
            document.querySelectorAll('.font-item').forEach(el => el.classList.remove('selected'));
        }

        // Tools
        function addText() {
            const text = new fabric.IText('ডাবল ক্লিক করুন', { 
                left: CANVAS_WIDTH/2, top: CANVAS_HEIGHT/2, originX: 'center', originY: 'center',
                fontFamily: 'Hind Siliguri', fontSize: 60, fill: '#000000'
            });
            canvas.add(text);
            canvas.setActiveObject(text);
        }

        document.getElementById('imageLoader').addEventListener('change', function (e) {
            const reader = new FileReader();
            reader.onload = function (event) {
                const imgObj = new Image();
                imgObj.src = event.target.result;
                imgObj.onload = function () {
                    const img = new fabric.Image(imgObj);
                    const scale = (CANVAS_WIDTH * 0.4) / img.width; 
                    img.set({ left: CANVAS_WIDTH/2, top: CANVAS_HEIGHT/2, originX: 'center', originY: 'center', scaleX: scale, scaleY: scale });
                    canvas.add(img);
                    canvas.setActiveObject(img);
                }
            }
            reader.readAsDataURL(e.target.files[0]);
        });

        function changeColor(color) {
            const obj = canvas.getActiveObject();
            if (obj) { obj.set("fill", color); canvas.requestRenderAll(); }
        }

        function changeAlignment(align) {
            const obj = canvas.getActiveObject();
            if (obj && obj.type === 'i-text') { obj.set("textAlign", align); canvas.requestRenderAll(); }
        }

        function deleteObject() {
            const activeObjects = canvas.getActiveObjects();
            if (activeObjects.length) {
                activeObjects.forEach(obj => canvas.remove(obj));
                canvas.discardActiveObject();
            } else {
                alert('প্রথমে ক্যানভাস থেকে কিছু সিলেক্ট করুন');
            }
        }

        function downloadBanner() {
            canvas.discardActiveObject();
            canvas.requestRenderAll();
            const dataURL = canvas.toDataURL({ format: 'jpeg', quality: 0.9, multiplier: 2 }); 
            const link = document.createElement('a');
            link.href = dataURL;
            link.download = 'Mobile-Banner.jpg';
            link.click();
        }

        // Tabs
        function openTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            
            document.getElementById('templatesTabBtn').className = "flex-1 py-3 text-sm font-semibold text-gray-500 border-b-2 border-transparent";
            document.getElementById('toolsTabBtn').className = "flex-1 py-3 text-sm font-semibold text-gray-500 border-b-2 border-transparent";

            document.getElementById(tabId + 'Btn').className = "flex-1 py-3 text-sm font-semibold text-indigo-600 border-b-2 border-indigo-600";
        }
    </script>
</body>
</html>
